<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/assets/img/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Loading Dashboard — xPanda Ops</title>
  <script src="/logistics/logistics-header.js"></script>
  <link rel="stylesheet" href="/logistics/logistics-shared.css" />
  <style>
    .loading-dashboard { padding: 16px; max-width: 100%; }
    .ld-toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .ld-toolbar h2 { margin: 0; font-size: 20px; font-weight: 700; color: #111827; }
    .ld-view-toggle { display: flex; border: 1px solid #d1d5db; border-radius: 8px; overflow: hidden; }
    .ld-view-btn { padding: 6px 14px; font-size: 12px; font-weight: 600; border: none; background: #fff; color: #6b7280; cursor: pointer; }
    .ld-view-btn.active { background: #1e293b; color: #fff; }
    .ld-view-btn:focus { outline: none; }
    #bay-selector { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; }
    .ld-btn-pull { padding: 8px 16px; background: #1e293b; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .ld-btn-pull:hover { background: #334155; }
    .ld-section { margin-bottom: 20px; }
    .ld-section-title { font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px 0; }
    .ld-bays-scroll { overflow-x: auto; margin-bottom: 20px; padding-bottom: 8px; }
    .ld-bays-grid { display: flex; gap: 12px; min-width: max-content; }
    .ld-bay-col { width: 220px; min-width: 220px; background: #f9fafb; border-radius: 12px; border: 1px solid #e5e7eb; }
    .ld-bay-header { padding: 10px; border-bottom: 1px solid #e5e7eb; text-align: center; }
    .ld-bay-number { font-weight: 700; font-size: 14px; margin-bottom: 6px; color: #111827; }
    .ld-trailer-input { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; text-align: center; box-sizing: border-box; }
    .ld-bay-body { padding: 8px; min-height: 150px; }
    .ld-card { padding: 6px 8px; border-radius: 6px; margin-bottom: 6px; border: 1px solid transparent; }
    .ld-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; gap: 6px; }
    .ld-card-header strong { font-size: 12px; color: #111827; }
    .ld-card-subtext { font-size: 10px; color: #6b7280; margin-bottom: 2px; }
    .ld-inv-link { color: #1e40af; text-decoration: underline; cursor: pointer; }
    .ld-inv-link:hover { color: #1e3a8a; }
    .ld-status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .ld-card-meta { font-size: 10px; color: #6b7280; display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
    .ld-card-actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .ld-section-title { cursor: pointer; user-select: none; }
    .ld-section-chevron { display: inline-block; min-width: 14px; font-size: 12px; color: #6b7280; transition: transform 0.15s ease; }
    .ld-btn-advance { padding: 4px 10px; border: none; background: #1e293b; color: #fff; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .ld-btn-advance:hover { background: #334155; }
    .ld-btn-assign { padding: 4px 10px; border: 1px solid #3b82f6; background: #eff6ff; color: #1e40af; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .ld-btn-archive { padding: 4px 10px; border: 1px solid #d1d5db; background: #fff; color: #6b7280; border-radius: 6px; font-size: 11px; cursor: pointer; }
    .ld-btn-bol { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .ld-btn-bol:hover { background: #e0f2fe; }
    .ld-btn-photos { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .ld-btn-photos:hover { background: #fde68a; }
    .ld-empty { color: #9ca3af; font-size: 12px; text-align: center; padding: 16px; }
    .ld-empty-bay { color: #9ca3af; font-size: 12px; text-align: center; padding: 16px; }
    .ld-queue { display: flex; flex-wrap: wrap; gap: 8px; }
    .ld-transit-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .ld-queue .ld-card, .ld-transit-grid .ld-card { width: 230px; }
    /* Bay view */
    .ld-bay-single { max-width: 500px; margin: 0 auto; }
    .ld-bay-single-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .ld-bay-single-header h3 { margin: 0; font-size: 18px; font-weight: 700; }
    .ld-bay-group { margin-bottom: 16px; }
    .ld-bay-group-title { font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #e5e7eb; }
    /* Pull job modal */
    .ld-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    .ld-modal-backdrop[hidden] { display: none !important; }
    .ld-modal-card { background: #fff; border-radius: 12px; width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
    .ld-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #e5e7eb; }
    .ld-modal-header h3 { margin: 0; font-size: 16px; font-weight: 700; }
    .ld-modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #6b7280; }
    .ld-modal-body { padding: 16px; }
    .ld-modal-body label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .ld-modal-body input, .ld-modal-body select { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; }
    .ld-modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px; border-top: 1px solid #e5e7eb; }
    .ld-btn-cancel { padding: 8px 16px; border: 1px solid #d1d5db; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
    .ld-btn-confirm { padding: 8px 16px; background: #1e293b; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
    .ld-job-results { max-height: 250px; overflow-y: auto; }
    .ld-job-result { padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 6px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
    .ld-job-result:hover { background: #f3f4f6; }
    .ld-job-result.selected { background: #eff6ff; border-color: #3b82f6; }
    .ld-drop-zone { transition: background 0.15s; border-radius: 8px; padding: 4px; }
    .ld-drop-zone.ld-drop-hover { background: #dbeafe; }
    .ld-bay-body.ld-drop-hover { background: #dbeafe; }
    .ld-card[draggable="true"] { cursor: grab; user-select: none; -webkit-user-select: none; }
    .ld-card[draggable="true"]:active { cursor: grabbing; }
    @media (max-width: 768px) {
      .ld-bays-grid { flex-direction: column; min-width: unset; }
      .ld-bay-col { width: 100%; min-width: unset; }
      .ld-queue .ld-card, .ld-transit-grid .ld-card { width: 100%; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .loading-photo-thumb {
      position: relative;
      width: 80px; height: 80px;
      border-radius: 8px; overflow: hidden;
      border: 1px solid #d1d5db;
    }
    .loading-photo-thumb img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .loading-photo-thumb .remove-photo {
      position: absolute; top: 2px; right: 2px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.6); color: #fff;
      border: none; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<div class="loading-dashboard">
  <!-- Toolbar -->
  <div class="ld-toolbar">
    <h2>Loading Dashboard</h2>
    <div class="ld-view-toggle">
      <button id="view-overview" class="ld-view-btn active" onclick="setLdView('overview')">Overview</button>
      <button id="view-bay" class="ld-view-btn" onclick="setLdView('bay')">Loading Team View</button>
    </div>
    <select id="bay-selector" style="display:none;" onchange="selectBay(this.value)"></select>
    <button id="btn-pull-job" class="ld-btn-pull" onclick="openPullJobModal()" style="display:none;">+ Pull Job</button>
  </div>

  <!-- Overview mode -->
  <div id="ld-overview">
    <div class="ld-section" data-section-key="awaiting">
      <h3 class="ld-section-title" onclick="toggleSection('awaiting')" style="cursor:pointer; user-select:none; display:flex; align-items:center; gap:8px;">
        <span class="ld-section-chevron" id="ld-chevron-awaiting">▾</span>
        Awaiting Trailer Assignment
      </h3>
      <div id="ld-awaiting" class="ld-queue"></div>
    </div>
    <div class="ld-bays-scroll">
      <div id="ld-bays" class="ld-bays-grid"></div>
    </div>
    <div class="ld-section" data-section-key="transit">
      <h3 class="ld-section-title" onclick="toggleSection('transit')" style="cursor:pointer; user-select:none; display:flex; align-items:center; gap:8px;">
        <span class="ld-section-chevron" id="ld-chevron-transit">▾</span>
        In Transit
      </h3>
      <div id="ld-transit" class="ld-transit-grid"></div>
    </div>
    <div class="ld-section" data-section-key="delivered">
      <h3 class="ld-section-title" onclick="toggleSection('delivered')" style="cursor:pointer; user-select:none; display:flex; align-items:center; gap:8px;">
        <span class="ld-section-chevron" id="ld-chevron-delivered">▾</span>
        Delivered
      </h3>
      <div id="ld-delivered" class="ld-transit-grid"></div>
    </div>
  </div>

  <!-- Bay view -->
  <div id="ld-bay-view" style="display:none;">
    <div id="ld-single-bay"></div>
  </div>

  <!-- Bay list (entry point for Loading Team View) -->
  <div id="ld-bay-list" style="display:none;">
    <div id="ld-bay-list-content">
      <div class="ld-skeleton" style="padding:12px;">
        <div style="height:72px;background:#f3f4f6;border-radius:12px;margin-bottom:8px;animation:pulse 1.5s infinite;"></div>
        <div style="height:72px;background:#f3f4f6;border-radius:12px;margin-bottom:8px;animation:pulse 1.5s infinite;"></div>
        <div style="height:72px;background:#f3f4f6;border-radius:12px;margin-bottom:8px;animation:pulse 1.5s infinite;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Pull Job Modal -->
<div id="pull-job-modal" class="ld-modal-backdrop" hidden>
  <div class="ld-modal-card">
    <div class="ld-modal-header">
      <h3>Pull Job to Loading</h3>
      <button onclick="closePullJobModal()" class="ld-modal-close">✕</button>
    </div>
    <div class="ld-modal-body">
      <label>Search Jobs</label>
      <input type="text" id="pull-job-search" placeholder="Customer, PO, or INV #" oninput="searchJobsForPull(this.value)" autocomplete="off" />
      <div id="pull-job-results" class="ld-job-results"></div>
      <hr style="margin:12px 0;border:none;border-top:1px solid #e5e7eb;" />
      <label>Assign to</label>
      <select id="pull-job-bay">
        <option value="">Awaiting Queue (no bay)</option>
      </select>
    </div>
    <div class="ld-modal-footer">
      <button onclick="closePullJobModal()" class="ld-btn-cancel">Cancel</button>
      <button onclick="confirmPullJob()" class="ld-btn-confirm">Pull to Loading</button>
    </div>
  </div>
</div>

<!-- Assign Bay Modal -->
<div id="assign-bay-modal" class="ld-modal-backdrop" hidden>
  <div class="ld-modal-card" style="max-width:360px;">
    <div class="ld-modal-header">
      <h3>Assign to Bay</h3>
      <button onclick="closeAssignBayModal()" class="ld-modal-close">✕</button>
    </div>
    <div class="ld-modal-body">
      <label>Select Bay</label>
      <select id="assign-bay-select">
        <!-- populated dynamically -->
      </select>
    </div>
    <div class="ld-modal-footer">
      <button onclick="closeAssignBayModal()" class="ld-btn-cancel">Cancel</button>
      <button onclick="confirmAssignBay()" class="ld-btn-confirm">Assign</button>
    </div>
  </div>
</div>

<!-- Shipping Info Modal -->
<div id="ld-shipping-info-modal" class="ld-modal-backdrop" hidden onclick="if(event.target===this) closeShippingInfo()">
  <div class="ld-modal-card" style="max-width: 480px;">
    <div style="padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;">
      <h3 style="margin: 0; font-size: 16px; font-weight: 700; color: #111827;">Shipping Information</h3>
      <button onclick="closeShippingInfo()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #6b7280; padding: 0; line-height: 1;">×</button>
    </div>
    <div id="ld-shipping-info-body" style="padding: 16px 20px; font-size: 13px; color: #374151; line-height: 1.5;">
    </div>
  </div>
</div>

<!-- BOL View Modal -->
<div id="ld-bol-view-modal" class="ld-modal-backdrop" hidden onclick="if(event.target===this) closeBolViewModal()" style="z-index: 1000;">
  <div class="ld-modal-card" style="max-width: 95vw; width: 95vw; max-height: 95vh; height: 95vh; display: flex; flex-direction: column;">
    <div style="padding: 10px 16px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
      <h3 style="margin: 0; font-size: 16px; font-weight: 700; color: #111827;">Bill of Lading</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="ld-bol-download-btn" onclick="downloadBolFromViewer()" style="padding:6px 12px;background:#f3f4f6;color:#374151;border:1px solid #d1d5db;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;">Download</button>
        <button onclick="closeBolViewModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280; padding: 0; line-height: 1;">×</button>
      </div>
    </div>
    <iframe id="ld-bol-view-iframe" style="flex:1; width:100%; border:none; background:#525659;"></iframe>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="/logistics/bol-shared.js"></script>

<script>
let allBays = [];
let allAssignments = [];
let selectedBayId = null;
let currentLdView = window.innerWidth < 768 ? 'bay' : 'overview';
let pullJobSelectedId = null;
let pullJobSearchResults = [];

const LD_COLLAPSE_KEY = 'ld_section_collapsed_v1';

function loadCollapseState() {
  try {
    const raw = localStorage.getItem(LD_COLLAPSE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveCollapseState(state) {
  try { localStorage.setItem(LD_COLLAPSE_KEY, JSON.stringify(state)); } catch {}
}

function applyCollapseState() {
  const state = loadCollapseState();
  ['awaiting', 'transit', 'delivered'].forEach(key => {
    const section = document.querySelector(`.ld-section[data-section-key="${key}"]`);
    if (!section) return;
    const body = section.querySelector('.ld-queue, .ld-transit-grid');
    const chevron = document.getElementById(`ld-chevron-${key}`);
    const collapsed = !!state[key];
    if (body) body.style.display = collapsed ? 'none' : '';
    if (chevron) chevron.textContent = collapsed ? '▸' : '▾';
  });
}

function toggleSection(key) {
  const state = loadCollapseState();
  state[key] = !state[key];
  saveCollapseState(state);
  applyCollapseState();
}

const LD_STATUS_COLORS = {
  awaiting:    { bg: '#f3f4f6', border: '#9ca3af', text: '#374151', label: 'Awaiting' },
  not_started: { bg: '#fef3c7', border: '#f59e0b', text: '#92400e', label: 'Not Started' },
  loading:     { bg: '#dbeafe', border: '#3b82f6', text: '#1e40af', label: 'Loading' },
  loaded:      { bg: '#d1fae5', border: '#10b981', text: '#065f46', label: 'Loaded' },
  in_transit:  { bg: '#e0e7ff', border: '#6366f1', text: '#3730a3', label: 'In Transit' },
  delivered:   { bg: '#f0fdf4', border: '#22c55e', text: '#166534', label: 'Delivered' },
};

async function loadDashboard() {
  try {
    const [baysRes, assignRes] = await Promise.all([
      fetch('/api/loading-bays').then(r => r.json()),
      fetch('/api/loading-assignments').then(r => r.json()),
    ]);
    allBays = baysRes.bays || [];
    allAssignments = assignRes.assignments || [];
    renderDashboard();
  } catch (e) {
    console.error('Dashboard load failed:', e);
  }
}

function setLdView(view) {
  currentLdView = view;
  document.getElementById('view-overview').classList.toggle('active', view === 'overview');
  document.getElementById('view-bay').classList.toggle('active', view === 'bay');

  document.getElementById('ld-overview').style.display = view === 'overview' ? '' : 'none';

  if (view === 'bay') {
    document.getElementById('ld-bay-list').style.display = '';
    document.getElementById('ld-bay-view').style.display = 'none';
    document.getElementById('bay-selector').style.display = 'none';
    renderBayList();
  } else {
    document.getElementById('ld-bay-list').style.display = 'none';
    document.getElementById('ld-bay-view').style.display = 'none';
    document.getElementById('bay-selector').style.display = 'none';
  }
}

function renderDashboard() {
  if (currentLdView === 'overview') {
    renderOverview();
  } else {
    if (document.getElementById('ld-bay-view').style.display !== 'none') {
      renderBayView();
    } else {
      renderBayList();
    }
  }
  updatePullButtonVisibility();
}

function renderOverview() {
  const user = window.__xpandaUser;
  const isManager = user && (user.isAdministrator || user.permissions?.['logistics.loading.manage']?.edit);
  const awaiting = allAssignments.filter(a => a.loading_status === 'awaiting');
  document.getElementById('ld-awaiting').innerHTML = awaiting.length
    ? awaiting.map(a => renderAssignmentCard(a, false, false)).join('')
    : '<div class="ld-empty">No jobs awaiting assignment</div>';

  const baysHtml = allBays.map(bay => {
    const bayAssignments = allAssignments.filter(a =>
      a.bay_id === bay.id && ['not_started', 'loading', 'loaded'].includes(a.loading_status)
    );
    return `
      <div class="ld-bay-col" data-bay-id="${bay.id}">
        <div class="ld-bay-header">
          <div class="ld-bay-number">Bay ${bay.bay_number}</div>
          ${isManager
            ? `<input class="ld-trailer-input" type="text" placeholder="Trailer #"
                value="${escAttr(bay.trailer_number || '')}"
                onchange="updateBayTrailer('${bay.id}', this.value)" />`
            : bay.trailer_number
              ? `<span style="font-size:13px;color:#6b7280;">Trailer: ${esc(bay.trailer_number)}</span>`
              : ''}
        </div>
        <div class="ld-bay-body"
          ondragover="event.preventDefault(); this.style.background='#dbeafe';"
          ondragleave="this.style.background='';"
          ondrop="onBayDrop(event, '${bay.id}'); this.style.background='';">
          ${bayAssignments.length
            ? bayAssignments.map(a => renderAssignmentCard(a, false, false)).join('')
            : '<div class="ld-empty-bay">Empty</div>'}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('ld-bays').innerHTML = baysHtml;
  initTouchDragForOverview();

  const transit = allAssignments.filter(a => a.loading_status === 'in_transit');
  document.getElementById('ld-transit').innerHTML = transit.length
    ? transit.map(a => renderAssignmentCard(a, false, false)).join('')
    : '<div class="ld-empty">No trailers in transit</div>';

  const delivered = allAssignments.filter(a => a.loading_status === 'delivered');
  document.getElementById('ld-delivered').innerHTML = delivered.length
    ? delivered.map(a => renderAssignmentCard(a, false, true)).join('')
    : '<div class="ld-empty">No recent deliveries</div>';

  applyCollapseState();
}

function renderBayView() {
  const user = window.__xpandaUser;
  const isManager = user && (user.isAdministrator || user.permissions?.['logistics.loading.manage']?.edit);

  const sel = document.getElementById('bay-selector');
  sel.innerHTML = allBays.map(b =>
    `<option value="${b.id}" ${b.id === selectedBayId ? 'selected' : ''}>Bay ${b.bay_number}${b.trailer_number ? ' — TR# ' + b.trailer_number : ''}</option>`
  ).join('');

  if (!selectedBayId) return;

  const bay = allBays.find(b => b.id === selectedBayId);
  if (!bay) return;
  const bayAssignments = allAssignments.filter(a => a.bay_id === selectedBayId);

  const groups = [
    { status: 'not_started', label: 'Not Started', assignments: bayAssignments.filter(a => a.loading_status === 'not_started') },
    { status: 'loading',     label: 'Loading',     assignments: bayAssignments.filter(a => a.loading_status === 'loading') },
    { status: 'loaded',      label: 'Loaded',      assignments: bayAssignments.filter(a => a.loading_status === 'loaded') },
  ];

  const html = `
    <div class="ld-bay-single">
      <button onclick="backToBayList()" style="
        background:none;border:none;color:#3b82f6;font-size:14px;font-weight:600;
        cursor:pointer;padding:0;margin-bottom:12px;display:flex;align-items:center;gap:4px;
      ">← All Bays</button>
      <div class="ld-bay-single-header">
        <h3>Bay ${bay.bay_number}</h3>
        ${isManager
          ? `<input class="ld-trailer-input" type="text" placeholder="Trailer #" value="${escAttr(bay.trailer_number || '')}"
              onchange="updateBayTrailer('${bay.id}', this.value)" style="max-width:140px;" />`
          : bay.trailer_number
            ? `<span style="font-size:13px;color:#6b7280;">Trailer: ${esc(bay.trailer_number)}</span>`
            : ''
        }
      </div>
      ${groups.map(g => `
        <div class="ld-bay-group ld-drop-zone" data-target-status="${g.status}">
          <div class="ld-bay-group-title">${g.label} (${g.assignments.length})</div>
          ${g.assignments.length

          ${bay.trailer_number ? `<div style="font-size:13px;color:#6b7280;margin-top:2px;">Trailer: ${esc(bay.trailer_number)}</div>` : ''}

function renderAssignmentCard(a, showAssignBtn, showArchiveBtn) {
  const sc = LD_STATUS_COLORS[a.loading_status] || LD_STATUS_COLORS.awaiting;
  const next = getNextLoadingStatus(a.loading_status);
  const user = window.__xpandaUser;
  const isManager = user && (user.isAdministrator || user.permissions?.['logistics.loading.manage']?.edit);
  const dragAttrs = a.loading_status === 'awaiting'
    ? `draggable="true" ondragstart="onCardDragStart(event, '${a.id}')"`
    : '';

  return `
    <div class="ld-card" ${dragAttrs} style="border-left:4px solid ${sc.border};background:${sc.bg};" data-assignment-id="${a.id}">
      <div class="ld-card-header">
        <strong>
          ${a.invoice_number
            ? `<a href="#" class="ld-inv-link" onclick="event.preventDefault(); event.stopPropagation(); openShippingInfo('${esc(a.id)}'); return false;">INV# ${esc(a.invoice_number)}</a>`
            : 'No INV#'}
          ${(a.load_count || 1) > 1
            ? `<span style="font-weight:700;color:#6366f1;margin-left:6px;font-size:11px;">Load ${a.load_number || 1} of ${a.load_count}</span>`
            : ''}
        </strong>
        <span class="ld-status-badge" style="color:${sc.text};">${sc.label}</span>
      </div>
      <div class="ld-card-subtext" title="${escAttr(a.customer || 'Unknown')}">
        ${esc(truncate(a.customer || 'Unknown', 20))}
      </div>
      <div class="ld-card-meta">
        ${a.trailer_number ? `<span>Trailer: ${esc(a.trailer_number)}</span>` : ''}
        ${a.ship_to_city ? `<span>${esc(a.ship_to_city)}${a.ship_to_state ? ', ' + esc(a.ship_to_state) : ''}</span>` : ''}
      </div>
      <div class="ld-card-actions">
        ${a.loading_status === 'awaiting' && isManager
          ? `<button class="ld-btn-assign" onclick="openAssignBayModal('${a.id}')">Assign Bay</button>`
          : ''}
        ${next && a.loading_status !== 'awaiting'
          ? `<button class="ld-btn-advance" onclick="advanceStatus('${a.id}', '${next}')">${getAdvanceLabel(next)}</button>`
          : ''}
        ${a.loading_status !== 'awaiting'
          ? `<button class="ld-btn-bol" onclick="viewBolForJob('${a.job_id}')">View BOL</button>`
          : ''}
        <button class="ld-btn-photos" onclick="photoGallery.openLightbox({ jobId: '${a.job_id}' })">📷 Photos</button>
        ${showArchiveBtn ? `<button class="ld-btn-archive" onclick="archiveAssignment('${a.id}')">Archive</button>` : ''}
      </div>
    </div>
  `;
}

function getNextLoadingStatus(current) {
  const flow = ['awaiting', 'not_started', 'loading', 'loaded', 'in_transit', 'delivered'];
  const i = flow.indexOf(current);
  return i >= 0 && i < flow.length - 1 ? flow[i + 1] : null;
}

function getAdvanceLabel(nextStatus) {
  const labels = {
    not_started: 'Assign to Bay',
    loading: 'Start Loading',
    loaded: 'Mark Loaded',
    in_transit: 'Mark In Transit',
    delivered: 'Mark Delivered',
  };
  return labels[nextStatus] || 'Advance';
}

    const data = await res.json();
    if (data.ok) {

// Touch drag state
let touchDragEl = null;
let touchDragId = null;
let touchClone = null;
let touchStartY = 0;
let touchStartX = 0;
let touchMoved = false;

function initTouchDragForBayView() {
  const cards = document.querySelectorAll('#ld-single-bay .ld-card');
  cards.forEach(card => {
    card.setAttribute('draggable', 'true');

    card.addEventListener('dragstart', (e) => {
      touchDragId = card.dataset.assignmentId;
      e.dataTransfer.effectAllowed = 'move';
      card.style.opacity = '0.5';
      card.addEventListener('dragend', () => { card.style.opacity = '1'; }, { once: true });
    });

    card.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      touchDragEl = card;
      touchDragId = card.dataset.assignmentId;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }, { passive: true });
  });

  const zones = document.querySelectorAll('#ld-single-bay .ld-drop-zone');
  zones.forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.style.background = '#dbeafe';
    });
    zone.addEventListener('dragleave', () => { zone.style.background = ''; });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.style.background = '';
      if (touchDragId) {
        const targetStatus = zone.dataset.targetStatus;
        advanceStatus(touchDragId, targetStatus);
        touchDragId = null;
      }
    });
  });
}

function initTouchDragForOverview() {
  const awaitingCards = document.querySelectorAll('#ld-awaiting .ld-card[draggable="true"]');
  awaitingCards.forEach(card => {
    card.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      touchDragEl = card;
      touchDragId = card.dataset.assignmentId;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }, { passive: true });
  });
}

document.addEventListener('touchmove', (e) => {
  if (!touchDragEl) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!touchMoved && Math.abs(dy) < 10 && Math.abs(dx) < 10) return;
  touchMoved = true;

  if (!touchClone) {
    touchClone = touchDragEl.cloneNode(true);
    touchClone.style.cssText = `
      position:fixed; z-index:10001; pointer-events:none;
      width:${touchDragEl.offsetWidth}px; opacity:0.85;
      box-shadow:0 8px 24px rgba(0,0,0,0.2); transform:rotate(2deg);
    `;
    document.body.appendChild(touchClone);
    touchDragEl.style.opacity = '0.3';
  }
  touchClone.style.left = (e.touches[0].clientX - touchDragEl.offsetWidth / 2) + 'px';
  touchClone.style.top = (e.touches[0].clientY - 20) + 'px';

  document.querySelectorAll('.ld-drop-zone, .ld-bay-body').forEach(z => z.classList.remove('ld-drop-hover'));
  const elUnder = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
  const zone = elUnder?.closest('.ld-drop-zone') || elUnder?.closest('.ld-bay-body');
  if (zone) zone.classList.add('ld-drop-hover');
}, { passive: true });

document.addEventListener('touchend', () => {
  if (!touchDragEl) return;
  if (touchClone) {
    const hoveredZone = document.querySelector('.ld-drop-zone.ld-drop-hover');
    if (hoveredZone && touchDragId) {
      const targetStatus = hoveredZone.dataset.targetStatus;
      advanceStatus(touchDragId, targetStatus);
    }
    const hoveredBay = document.querySelector('.ld-bay-body.ld-drop-hover');
    if (hoveredBay && touchDragId) {
      const bayCol = hoveredBay.closest('.ld-bay-col');
      const bayId = bayCol?.dataset.bayId;
      if (bayId) {
        draggedAssignmentId = touchDragId;
        onBayDrop(new Event('drop'), bayId);
      }
    }
    touchClone.remove();
    touchClone = null;
  }
  if (touchDragEl) touchDragEl.style.opacity = '1';
  touchDragEl = null;
  touchDragId = null;
  touchMoved = false;
  document.querySelectorAll('.ld-drop-zone, .ld-bay-body').forEach(z => z.classList.remove('ld-drop-hover'));
});

async function confirmPullJob() {
  const modal = document.getElementById('pull-job-modal');
  const existingAssignmentId = modal.dataset.assignmentId;
  const bayId = document.getElementById('pull-job-bay').value || null;

  // If called from "Assign Bay" button, update existing assignment
  if (existingAssignmentId) {
    const res = await fetch('/api/loading-assignments', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: existingAssignmentId, bay_id: bayId, loading_status: 'not_started' }),
    });
    const data = await res.json();
    if (data.ok) { closePullJobModal(); loadDashboard(); }
    else alert(data.error || 'Failed to assign bay');
    return;
  }

  // Pull job flow
  if (!pullJobSelectedId) { alert('Select a job first'); return; }

  const res = await fetch('/api/loading-assignments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ job_id: pullJobSelectedId, bay_id: bayId }),
  });
  const data = await res.json();

  if (data.ok) {
    closePullJobModal();
    loadDashboard();
  } else {
    alert(data.error || 'Failed to pull job');
  }
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escAttr(s) {
  return String(s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function truncate(s, n) {
  if (s == null) return '';
  const str = String(s);
  return str.length > n ? str.slice(0, n) + '…' : str;
}

let currentBolBlobUrl = null;
let currentBolFilename = 'BOL.pdf';

async function viewBolForJob(jobId) {
  try {
    const res = await fetch('/api/bols?job_id=' + encodeURIComponent(jobId));
    const data = await res.json();

    if (!data.ok || !data.bols || data.bols.length === 0) {
      alert('No BOL found for this job. Generate a BOL first from the BOL Generator or Load Builder.');
      return;
    }

    const bol = data.bols[data.bols.length - 1];
    const result = await BolShared.generatePdf([bol], { previewOnly: true });

    if (currentBolBlobUrl) {
      try { URL.revokeObjectURL(currentBolBlobUrl); } catch {}
    }
    currentBolBlobUrl = result.blobUrl;
    currentBolFilename = `BOL_${bol.bol_number || bol.id || 'unknown'}.pdf`;

    document.getElementById('ld-bol-view-iframe').src = currentBolBlobUrl;
    document.getElementById('ld-bol-view-modal').hidden = false;
  } catch (e) {
    console.error('Failed to load BOL:', e);
    alert('Failed to load BOL. Please try again.');
  }
}

function closeBolViewModal() {
  document.getElementById('ld-bol-view-modal').hidden = true;
  document.getElementById('ld-bol-view-iframe').src = '';
  if (currentBolBlobUrl) {
    try { URL.revokeObjectURL(currentBolBlobUrl); } catch {}
    currentBolBlobUrl = null;
  }
}

function downloadBolFromViewer() {
  if (!currentBolBlobUrl) return;
  const a = document.createElement('a');
  a.href = currentBolBlobUrl;
  a.download = currentBolFilename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

  } else {

  document.getElementById('chk-paperwork-secured').checked = false;
  document.getElementById('changes-notes').value = '';
  document.getElementById('changes-notes-row').style.display = 'none';
  document.getElementById('loading-photo-previews').innerHTML = '';

  document.getElementById('loaded-checklist-modal').hidden = false;
}

function closeLoadedChecklist() {
  document.getElementById('loaded-checklist-modal').hidden = true;
  checklistAssignmentId = null;
  pendingPhotos = [];
}

function captureLoadingPhoto() {
  document.getElementById('loading-photo-capture').click();
}

function uploadLoadingPhoto() {
  document.getElementById('loading-photo-upload').click();
}

async function handleLoadingPhotoSelected(input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  for (const file of files) {
    try {
      const compressed = await compressPhoto(file, 1200, 0.6);
      pendingPhotos.push({ dataUrl: compressed, filename: file.name });
    } catch (e) {
      console.error('Photo compression failed:', e);
    }
  }

  renderPhotoPreview();
  input.value = '';
}

function compressPhoto(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width;
        let h = img.height;

        if (w > maxDim || h > maxDim) {
          if (w > h) {
            h = Math.round(h * (maxDim / w));
            w = maxDim;
          } else {
            w = Math.round(w * (maxDim / h));
            h = maxDim;
          }
        }

        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderPhotoPreview() {
  const container = document.getElementById('loading-photo-previews');
  container.innerHTML = pendingPhotos.map((p, i) => `
    <div class="loading-photo-thumb">
      <img src="${p.dataUrl}" alt="Photo ${i + 1}">
      <button class="remove-photo" onclick="removeLoadingPhoto(${i})">&#x2715;</button>
    </div>
  `).join('');
}

function removeLoadingPhoto(index) {
  pendingPhotos.splice(index, 1);
  renderPhotoPreview();
}

async function confirmLoadedChecklist() {
  const qtyVerified = document.getElementById('chk-qty-verified').checked;
  const paperworkSecured = document.getElementById('chk-paperwork-secured').checked;

  if (!qtyVerified) { alert('Please confirm all quantities have been counted and verified.'); return; }
  if (!paperworkSecured) { alert('Please confirm the paperwork was secured inside the trailer.'); return; }

  const changesIssues = document.getElementById('chk-changes-issues').checked;
  const changesNotes = changesIssues ? document.getElementById('changes-notes').value.trim() : '';

  const checklist = {
    qty_verified: true,
    changes_issues: changesIssues,
    changes_notes: changesNotes,
    paperwork_secured: true,
    completed_at: new Date().toISOString(),
  };

  const btn = document.getElementById('btn-confirm-loaded');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const res = await fetch('/api/loading-assignments', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: checklistAssignmentId,
        loading_status: 'loaded',
        ready_checklist: JSON.stringify(checklist),
      }),
    });
    const data = await res.json();
    if (!data.ok) {
      alert(data.error || 'Failed to mark as loaded');
      return;
    }

    const assignment = allAssignments.find(a => a.id === checklistAssignmentId);
    const jobId = assignment?.job_id;

    if (pendingPhotos.length > 0 && jobId) {
      for (const photo of pendingPhotos) {
        const base64 = photo.dataUrl.split(',')[1] || photo.dataUrl;
        try {
          await fetch('/api/loading-photos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              assignment_id: checklistAssignmentId,
              job_id: jobId,
              photo_data: base64,
              filename: photo.filename,
            }),
          });
        } catch (e) {
          console.error('Photo upload failed:', e);
        }
      }
    }

    closeLoadedChecklist();
    loadDashboard();

    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:10000;';
    toast.innerHTML = '<span style="color:#34d399;">&#x2713;</span> Marked as loaded';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);

  } catch (e) {
    console.error('Loaded checklist submission failed:', e);
    alert('Failed to submit checklist. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirm & Mark Loaded';
  }
}
</script>

<!-- Mark Loaded Checklist Modal -->
<div id="loaded-checklist-modal" class="ld-modal-backdrop" hidden>
  <div class="ld-modal-card" style="max-width:500px;">
    <div class="ld-modal-header">
      <h3>Loading Completion Checklist</h3>
      <button onclick="closeLoadedChecklist()" class="ld-modal-close">&#x2715;</button>
    </div>
    <div class="ld-modal-body">
      <p style="font-size:13px;color:#6b7280;margin:0 0 16px;">
        Confirm the following before marking this load as complete.
      </p>

      <label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;cursor:pointer;font-size:14px;color:#111827;">
        <input type="checkbox" id="chk-qty-verified" style="margin-top:3px;width:18px;height:18px;flex-shrink:0;">
        Have all quantities been counted and verified?
      </label>

      <label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;cursor:pointer;font-size:14px;color:#111827;">
        <input type="checkbox" id="chk-changes-issues" style="margin-top:3px;width:18px;height:18px;flex-shrink:0;" onchange="document.getElementById('changes-notes-row').style.display = this.checked ? '' : 'none';">
        Were there any changes or issues?
      </label>
      <div id="changes-notes-row" style="display:none;margin:0 0 16px 28px;">
        <textarea id="changes-notes" rows="3" placeholder="Describe changes or issues&#8230;"
          style="width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;box-sizing:border-box;resize:vertical;"></textarea>
      </div>

      <label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;cursor:pointer;font-size:14px;color:#111827;">
        <input type="checkbox" id="chk-paperwork-secured" style="margin-top:3px;width:18px;height:18px;flex-shrink:0;">
        Was the paperwork secured inside the trailer?
      </label>

      <div style="border-top:1px solid #e5e7eb;padding-top:16px;">
        <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px;">Photos (optional)</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
          <button type="button" onclick="captureLoadingPhoto()" class="ld-btn-advance" style="font-size:13px;">&#x1F4F7; Take Photo</button>
          <button type="button" onclick="uploadLoadingPhoto()" class="ld-btn-assign" style="font-size:13px;">&#x1F4C1; Upload from Library</button>
        </div>
        <input type="file" id="loading-photo-capture" accept="image/*" capture="environment" style="display:none;" onchange="handleLoadingPhotoSelected(this)">
        <input type="file" id="loading-photo-upload" accept="image/*" style="display:none;" onchange="handleLoadingPhotoSelected(this)" multiple>
        <div id="loading-photo-previews" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
      </div>
    </div>
    <div class="ld-modal-footer">
      <button onclick="closeLoadedChecklist()" class="ld-btn-cancel">Cancel</button>
      <button id="btn-confirm-loaded" onclick="confirmLoadedChecklist()" class="ld-btn-confirm">Confirm &amp; Mark Loaded</button>
    </div>
  </div>
</div>

</body>
</html>
