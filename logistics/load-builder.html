  const filtered = getFiltered();


  // ── Options bar: trailer type + runners (dropdowns), auto-downsize + force-sizes (toggles) ──
  const optLabel = (txt) => h('span', { className: 'lb-opt-label' }, txt);
  const optGroup = (...kids) => { const g = h('div', { className: 'flex items-center gap-8' }); kids.forEach(k => g.appendChild(k)); return g; };

  const typeCard = h('div', { className: 'card mb-18' });
  const optBar = h('div', { className: 'flex items-center flex-wrap', style: { gap: '20px' } });

  // Trailer type dropdown
  const typeSel = h('select', { className: 'inp', style: { width: 'auto', minWidth: '170px' }, onChange: e => { state.trailerType = e.target.value; state.manualRowsByTrailer = {}; state.editorTrailer = null; render(); } });
  Object.keys(TRAILER_TYPES).forEach(t => {
    const opt = h('option', { value: t }, t);
    if (state.trailerType === t) opt.selected = true;
    typeSel.appendChild(opt);
  });
  optBar.appendChild(optGroup(optLabel('TRAILER TYPE'), typeSel));

  // Runners dropdown
  const runnerSel = h('select', { className: 'inp', style: { width: 'auto', minWidth: '120px' }, onChange: e => { state.runnerHeight = parseInt(e.target.value, 10) || 0; state.manualRowsByTrailer = {}; state.editorTrailer = null; render(); } });
  [0, 3, 4].forEach(rh => {
    const opt = h('option', { value: String(rh) }, rh === 0 ? 'None' : `${rh}" Runners`);
    if (state.runnerHeight === rh) opt.selected = true;
    runnerSel.appendChild(opt);
  });
  optBar.appendChild(optGroup(optLabel('RUNNERS'), runnerSel));

  // Auto-downsize ON/OFF
  const downsizeGroup = optGroup(optLabel('AUTO-DOWNSIZE'));
  ['ON', 'OFF'].forEach(v => {
    const active = state.autoDownsize === (v === 'ON');
    downsizeGroup.appendChild(h('button', { className: `btn ${active ? 'btn-accent' : 'btn-white'}`, onClick: () => { state.autoDownsize = v === 'ON'; render(); } }, v));
  });
  optBar.appendChild(downsizeGroup);

  // Force sizes ON/OFF (replaces the Advanced disclosure)
  const forceGroup = optGroup(optLabel('FORCE SIZES'));
  ['ON', 'OFF'].forEach(v => {
    const active = state.forcedMode === (v === 'ON');
    forceGroup.appendChild(h('button', { className: `btn ${active ? 'btn-accent' : 'btn-white'}`, onClick: () => { state.forcedMode = v === 'ON'; render(); } }, v));
  });
  optBar.appendChild(forceGroup);

  // Dims readout (right-aligned)
  const bdft = Math.round((dims.length * dims.width * dims.height) / 144);
  optBar.appendChild(h('span', { style: { marginLeft: 'auto', color: 'var(--text-muted)', fontSize: '14px', fontWeight: 600 } }, `${dims.length}"L × ${dims.width}"W × ${dims.height}"H · ${bdft.toLocaleString()} BDFT`));
  typeCard.appendChild(optBar);

  // Condensed helper line
  const optHints = ['Auto-downsizes last trailer to 26ft Box Truck when it fits'];
  if (state.runnerHeight > 0) optHints.push(`Runner height deducted from stacking height (${dims.height}" → ${dims.height - state.runnerHeight}")`);
  typeCard.appendChild(h('div', { style: { marginTop: '10px', fontSize: '12px', color: 'var(--text-faint)', fontWeight: 600 } }, optHints.join('  ·  ')));

  // Force-sizes editor (inline, shown when ON)
  if (state.forcedMode) {
    const forcedBody = h('div', { style: { marginTop: '14px', display: 'grid', gap: '8px' } });
    state.forcedTrailers.forEach((ft, fti) => {
      const ftRow = h('div', { className: 'flex items-center gap-8 flex-wrap' });
      const typeSelect = h('select', { className: 'inp', style: { width: '200px', padding: '8px 10px' }, onChange: e => { state.forcedTrailers[fti].type = e.target.value; render(); } });
      Object.keys(TRAILER_TYPES).forEach(t => {
        const opt = h('option', { value: t }, t);
        if (ft.type === t) opt.selected = true;
        typeSelect.appendChild(opt);
      });
      ftRow.appendChild(typeSelect);
      const countInput = h('input', { type: 'number', min: '1', max: '10', className: 'inp', value: String(ft.count), style: { width: '70px', padding: '8px 10px' }, onInput: e => { state.forcedTrailers[fti].count = Math.max(1, Math.min(10, parseInt(e.target.value, 10) || 1)); } });
      ftRow.appendChild(countInput);
      ftRow.appendChild(h('span', { style: { fontSize: '13px', color: 'var(--text-muted)' } }, ft.count === 1 ? 'trailer' : 'trailers'));
      ftRow.appendChild(h('button', { className: 'btn btn-red-light', onClick: () => { state.forcedTrailers.splice(fti, 1); render(); } }, '×'));
      forcedBody.appendChild(ftRow);
    });
    forcedBody.appendChild(h('button', { className: 'btn btn-white', style: { marginTop: '4px' }, onClick: () => { state.forcedTrailers.push({ type: state.trailerType, count: 1 }); render(); } }, '+ ADD TRAILER'));
    typeCard.appendChild(forcedBody);
  }
  cont.appendChild(typeCard);

  // Master-detail SKU picker (rail + card grid). Reuses state.cart / state.search.
  const isSearching = !!state.search.trim();
  const { groups: mdGroups, catKeys: mdCatKeys } = groupByCategory(sorted);
  const activeCat = (state.activeCategory === 'All' || mdCatKeys.includes(state.activeCategory)) ? state.activeCategory : 'All';

  const buildSkuCard = (s) => {
    const inCart = state.cart.find(c => c.skuId === s.id);
    const perStack = Math.floor(dims.height / s.height);
    const card = h('div', { className: 'skp-card' + (inCart ? ' in-cart' : ''), style: { borderLeftColor: inCart ? s.color : 'transparent', background: inCart ? s.color + '14' : '' } });
    const top = h('div', { className: 'skp-card-top' });
    top.appendChild(h('div', { style: { width: '11px', height: '11px', background: s.color, borderRadius: '50%', flexShrink: '0' } }));
    top.appendChild(h('div', { className: 'skp-card-code' }, s.sku));
    card.appendChild(top);
    card.appendChild(h('div', { className: 'skp-card-name', title: s.name }, s.name));
    card.appendChild(h('div', { className: 'skp-card-meta' }, `${s.length}×${s.width}×${s.height}" · ${perStack}/stack`));
    const foot = h('div', { className: 'skp-card-foot' });
    if (inCart) {
      const actions = h('div', { className: 'skp-actions' });
      actions.appendChild(h('button', { className: 'btn btn-white', style: { padding: '4px 9px', fontSize: '15px', fontWeight: 800 }, onClick: () => { state.cart = state.cart.map(x => x.skuId === s.id ? { ...x, qty: Math.max(0, x.qty - 1) } : x).filter(x => x.qty > 0); render(); } }, '−'));
      const qtyInp = h('input', { type: 'number', min: '1', value: String(inCart.qty), className: 'qty-input-sm', style: { borderColor: s.color }, onChange: e => {
        const v = e.target.value;
        if (v === '' || v === '0') { state.cart = state.cart.filter(x => x.skuId !== s.id); }
        else { const n = parseInt(v, 10); if (!isNaN(n) && n >= 1) state.cart = state.cart.map(x => x.skuId === s.id ? { ...x, qty: n } : x); }
        render();
      }});
      actions.appendChild(qtyInp);
      actions.appendChild(h('button', { className: 'btn btn-white', style: { padding: '4px 9px', fontSize: '15px', fontWeight: 800 }, onClick: () => { const f = state.cart.find(x => x.skuId === s.id); if (f) f.qty++; else state.cart.push({ skuId: s.id, qty: 1 }); render(); } }, '+'));
      foot.appendChild(actions);
    } else {
      foot.appendChild(h('button', { className: 'btn btn-white', style: { padding: '5px 14px', fontSize: '13px' }, onClick: () => { state.cart.push({ skuId: s.id, qty: 1 }); render(); } }, '+ ADD'));
    }
    card.appendChild(foot);
    return card;
  };

  const md = h('div', { className: 'skp-md' });

  // Category rail (master)
  const rail = h('div', { className: 'skp-rail' });
  const inCartCount = (list) => list.reduce((n, s) => n + (state.cart.some(c => c.skuId === s.id) ? 1 : 0), 0);
  const mkRailItem = (key, label, list) => {
    const active = activeCat === key;
    const item = h('div', { className: 'skp-rail-item' + (active ? ' active' : ''), onClick: () => { state.activeCategory = key; render(); } });
    item.appendChild(h('span', { className: 'skp-rail-label' }, label));
    const right = h('span', { className: 'skp-rail-right' });
    right.appendChild(h('span', { className: 'skp-rail-count' }, String(list.length)));
    const picked = inCartCount(list);
    if (picked) right.appendChild(h('span', { className: 'skp-rail-dot', title: `${picked} in load` }));
    item.appendChild(right);
    return item;
  };
  rail.appendChild(mkRailItem('All', 'All SKUs', sorted));
  mdCatKeys.forEach(cat => rail.appendChild(mkRailItem(cat, cat, mdGroups[cat])));
  md.appendChild(rail);

  // Detail pane (search + card grid)
  const detail = h('div', { className: 'skp-detail' });
  detail.appendChild(h('input', { className: 'inp', value: state.search, placeholder: 'Search all SKUs…', style: { width: '100%', marginBottom: '12px' }, onInput: e => { state.search = e.target.value; render(); } }));

  const grid = h('div', { className: 'skp-grid' });
  if (isSearching) {
    if (!filtered.length) detail.appendChild(h('div', { className: 'skp-empty' }, 'No SKUs match your search.'));
    else filtered.forEach(s => grid.appendChild(buildSkuCard(s)));
  } else {
    const catSkus = activeCat === 'All' ? sorted : (mdGroups[activeCat] || []);
    if (!catSkus.length) {
      detail.appendChild(h('div', { className: 'skp-empty' }, 'No SKUs in this category.'));
    } else {
      catSkus.filter(s => !(s.parent_group || '')).forEach(s => grid.appendChild(buildSkuCard(s)));
      const parentMap = new Map();
      catSkus.filter(s => s.parent_group || '').forEach(s => { if (!parentMap.has(s.parent_group)) parentMap.set(s.parent_group, []); parentMap.get(s.parent_group).push(s); });
      parentMap.forEach((groupSkus, pgName) => {
        grid.appendChild(h('div', { className: 'skp-subgroup-label' }, pgName));
        [...groupSkus].sort((a, b) => a.height - b.height).forEach(s => grid.appendChild(buildSkuCard(s)));
      });
    }
  }
  detail.appendChild(grid);
  md.appendChild(detail);
  cont.appendChild(md);
  grid.scrollTop = _gridScroll;

  // Cart summary
  if (state.cart.length > 0) {
    const cartCard = h('div', { className: 'card skp-actionbar' });
    const cartHeader = h('div', { className: 'flex justify-between mb-12' });
    cartHeader.appendChild(h('span', { style: { color: 'var(--accent)', fontWeight: 800, fontSize: '13px' } }, 'LOAD LIST'));
    cartHeader.appendChild(h('button', { className: 'btn btn-white', onClick: () => { state.cart = []; render(); } }, 'CLEAR'));
    cartCard.appendChild(cartHeader);

    state.cart.forEach(c => {
      const s = sorted.find(x => x.id === c.skuId);
      if (!s) return;
      const row = h('div', { className: 'flex items-center gap-10', style: { padding: '9px 0', borderBottom: '1px solid var(--border-light)', fontSize: '14px' } });
      row.appendChild(h('div', { style: { width: '8px', height: '8px', background: s.color, borderRadius: '50%', flexShrink: '0' } }));
      const nameWrap = h('div', { style: { flex: 1, minWidth: 0 } });
      if (s.category) nameWrap.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-ghost)', fontWeight: 700, marginBottom: '1px' } }, s.category));
      nameWrap.appendChild(h('div', { style: { fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, s.name));
      row.appendChild(nameWrap);
      row.appendChild(h('span', { style: { color: 'var(--text-muted)', fontWeight: 600, whiteSpace: 'nowrap' } }, `${c.qty} pcs`));
      cartCard.appendChild(row);
    });

    const btnGrid = h('div', { className: 'calc-btn-grid' });
    btnGrid.appendChild(h('button', { className: 'btn btn-dark', style: { width: '100%', fontWeight: 800, fontSize: '16px', padding: '12px 0' }, onClick: () => { state.manualRowsByTrailer = {}; state.editorTrailer = null; state.tab = 'results'; render(); } }, 'CALCULATE LOAD'));
    btnGrid.appendChild(h('button', { className: 'btn btn-blue-light', style: { width: '100%', fontWeight: 800, fontSize: '16px', padding: '12px 0' }, onClick: () => { state.manualRowsByTrailer = {}; state.editorTrailer = null; state.variant++; state.tab = 'results'; render(); } }, 'RECALCULATE DIFFERENT'));
    cartCard.appendChild(btnGrid);
    cont.appendChild(cartCard);
  }
}

function renderSkusTab() {
  const cont = document.getElementById('tabSkus');
  cont.innerHTML = '';

  if (state.skuLoading) {
    cont.appendChild(h('div', { style: { color: 'var(--text-faint)', fontSize: '15px', padding: '40px', textAlign: 'center', fontWeight: 600 } }, 'Loading SKUs…'));
    return;
  }

  const sorted = getSortedSkus();
  const filtered = getFiltered();

  // Header
  const hdr = h('div', { className: 'flex justify-between items-center mb-14 gap-8 flex-wrap' });
  const left = h('div', { className: 'flex items-center gap-10' });
  left.appendChild(h('span', { style: { color: 'var(--accent)', fontWeight: 800, fontSize: '14px' } }, `SKU LIBRARY (${sorted.length})`));
  left.appendChild(h('span', { style: { fontSize: '12px', color: 'var(--text-ghost)', fontWeight: 700 } }, state.skuError ? 'LOCAL FALLBACK' : 'CLOUD SAVED'));
  hdr.appendChild(left);

  const right = h('div', { className: 'flex gap-8 flex-wrap' });
  right.appendChild(h('button', { className: 'btn btn-white', disabled: state.skuMutating, onClick: async () => { try { await navigator.clipboard.writeText(toCSV(sorted)); } catch (_) {} } }, 'COPY ALL'));
  right.appendChild(h('button', { className: `btn ${state.pasteMode ? 'btn-dark' : 'btn-white'}`, disabled: state.skuMutating, onClick: () => { state.pasteMode = !state.pasteMode; state.pasteErr = ''; state.pasteText = ''; render(); } }, state.pasteMode ? 'CANCEL' : 'PASTE IMPORT'));
  right.appendChild(h('button', { className: 'btn btn-red-light', disabled: state.skuMutating, onClick: () => { if (confirm('Reset to defaults?')) { resetSkus(); } } }, 'RESET'));
  right.appendChild(h('button', { className: 'btn btn-accent', disabled: state.skuMutating, onClick: () => {
    if (state.showForm && !state.editId) { state.showForm = false; state.formErr = ''; state.form = { name:'',sku:'',length:'',width:'',height:'',weight:'',notes:'', allowRotation: false, category: '' }; }
    else { state.showForm = true; state.editId = null; state.formErr = ''; }
    render();
  } }, state.showForm && !state.editId ? 'CANCEL' : '+ NEW SKU'));
  hdr.appendChild(right);
  cont.appendChild(hdr);

  if (state.skuError) {
    cont.appendChild(h('div', { style: { marginBottom: '14px', color: '#92400E', fontSize: '13px', border: '1px solid #FDE68A', background: '#FFFBEB', padding: '10px 12px', borderRadius: 'var(--radius)', fontWeight: 600 } }, `⚠ ${state.skuError}`));
  }
  if (state.skuMutating) {
    cont.appendChild(h('div', { style: { marginBottom: '14px', color: 'var(--text-faint)', fontSize: '13px', fontWeight: 600 } }, 'Saving…'));
  }

  // Search
  cont.appendChild(h('input', { className: 'inp', value: state.search, placeholder: 'Search library…', style: { width: '360px', maxWidth: '100%', marginBottom: '12px' }, onInput: e => { state.search = e.target.value; render(); } }));

  // Paste mode
  if (state.pasteMode) {
    const pasteCard = h('div', { className: 'card mb-14', style: { border: '2px solid var(--teal-border)' } });
    pasteCard.appendChild(h('div', { style: { color: 'var(--teal)', fontWeight: 800, fontSize: '13px', marginBottom: '6px' } }, 'PASTE SKU DATA'));
    pasteCard.appendChild(h('div', { style: { fontSize: '13px', color: 'var(--text-muted)', marginBottom: '10px', lineHeight: '1.7' }, innerHTML: 'Format: <strong>name, sku, length, width, height, weight, notes</strong>' }));
    const ta = h('textarea', { className: 'inp', value: state.pasteText, placeholder: '4in block, HB-04, 48, 24, 4, 1,', style: { height: '120px', resize: 'vertical' }, onInput: e => { state.pasteText = e.target.value; state.pasteErr = ''; } });
    pasteCard.appendChild(ta);
    if (state.pasteErr) pasteCard.appendChild(h('div', { style: { color: 'var(--red-dark)', fontSize: '13px', marginTop: '6px' } }, state.pasteErr));
    pasteCard.appendChild(h('button', { className: 'btn btn-teal', style: { marginTop: '10px' }, disabled: state.skuMutating, onClick: () => {
      const rows = fromCSV(state.pasteText, sorted.length);
      if (!rows.length) { state.pasteErr = 'No valid rows found.'; render(); return; }
      state.pasteText = ''; state.pasteMode = false; state.pasteErr = '';
      importSkus(rows);
    } }, 'IMPORT'));
    cont.appendChild(pasteCard);
  }

  // Form
  if (state.showForm) {
    const formCard = h('div', { className: 'card mb-20', style: { border: '2px solid var(--accent-light)' } });
    formCard.appendChild(h('div', { style: { color: 'var(--accent)', fontWeight: 800, fontSize: '14px', marginBottom: '14px' } }, state.editId ? 'EDIT SKU' : 'NEW SKU'));
    if (state.formErr) formCard.appendChild(h('div', { style: { marginBottom: '12px', color: 'var(--red-dark)', fontSize: '13px', border: '1px solid var(--red-border)', background: 'var(--red-bg)', padding: '10px 12px', borderRadius: 'var(--radius)' } }, state.formErr));

    const grid = h('div', { className: 'form-grid' });
    [['name','Name'],['sku','SKU Code'],['length','Length (in)'],['width','Width (in)'],['height','Height (in)'],['weight','Weight per piece']].forEach(([k, label]) => {
      const wrap = h('div');
      wrap.appendChild(h('div', { className: 'form-label' }, label));
      wrap.appendChild(h('input', { className: 'inp', value: state.form[k], onInput: e => { state.form[k] = e.target.value; state.formErr = ''; } }));
      grid.appendChild(wrap);
    });
    const bundleWrap = h('div');
    bundleWrap.appendChild(h('div', { className: 'form-label' }, 'BUNDLE QTY'));
    bundleWrap.appendChild(h('input', { type: 'number', min: '0', className: 'inp', value: String(state.form.bundleQty || 0), placeholder: '0 = no bundling', onInput: e => { state.form.bundleQty = parseInt(e.target.value, 10) || 0; state.formErr = ''; } }));
    grid.appendChild(bundleWrap);

    const notesWrap = h('div', { className: 'full-width' });
    notesWrap.appendChild(h('div', { className: 'form-label' }, 'NOTES'));
    notesWrap.appendChild(h('textarea', { className: 'inp', value: state.form.notes, style: { minHeight: '70px', resize: 'vertical' }, onInput: e => { state.form.notes = e.target.value; state.formErr = ''; } }));
    grid.appendChild(notesWrap);

    const catWrap = h('div');
    catWrap.appendChild(h('div', { className: 'form-label' }, 'CATEGORY'));
    const catList = h('datalist', { id: 'sku-cat-list' });
    ['Holey Board', 'Blocks', 'Sheets'].forEach(c => catList.appendChild(h('option', { value: c })));
    catWrap.appendChild(catList);
    catWrap.appendChild(h('input', { className: 'inp', list: 'sku-cat-list', value: state.form.category || '', placeholder: 'e.g. Holey Board', onInput: e => { state.form.category = e.target.value; state.formErr = ''; } }));
    grid.appendChild(catWrap);

    const rotWrap = h('div', { className: 'full-width', style: { paddingTop: '4px' } });
    const rotLabel = h('label', { style: { display: 'flex', alignItems: 'flex-start', gap: '10px', cursor: 'pointer' } });
    const rotCheckbox = h('input', { type: 'checkbox', onChange: e => { state.form.allowRotation = e.target.checked; } });
    rotCheckbox.checked = state.form.allowRotation === true;
    const rotTextWrap = h('div');
    rotTextWrap.appendChild(h('div', { style: { fontWeight: 700, fontSize: '14px', color: 'var(--text-mid)' } }, 'Allow rotation when loading'));
    rotTextWrap.appendChild(h('div', { style: { fontSize: '12px', color: 'var(--text-ghost)', marginTop: '3px', lineHeight: '1.5' } }, "When checked, the algorithm may rotate this SKU’s length and width for better trailer fit"));
    rotLabel.appendChild(rotCheckbox);
    rotLabel.appendChild(rotTextWrap);
    rotWrap.appendChild(rotLabel);
    grid.appendChild(rotWrap);

    formCard.appendChild(grid);

    const formBtns = h('div', { className: 'flex gap-8 mt-14' });
    formBtns.appendChild(h('button', { className: 'btn btn-accent', disabled: state.skuMutating, onClick: () => {
      const f = state.form;
      if (!f.name.trim()) { state.formErr = 'Name required.'; render(); return; }
      if (!f.sku.trim()) { state.formErr = 'SKU code required.'; render(); return; }
      if (!+f.length || !+f.width || !+f.height || !+f.weight) { state.formErr = 'All dimensions and weight must be positive.'; render(); return; }
      const payload = { name: f.name.trim(), sku: f.sku.trim(), length: +f.length, width: +f.width, height: +f.height, weight: +f.weight, notes: f.notes || '', allowRotation: f.allowRotation === true, category: (f.category || '').trim(), bundleQty: parseInt(f.bundleQty, 10) || 0 };
      const savedEditId = state.editId;
      state.showForm = false; state.editId = null; state.formErr = ''; state.form = { name:'',sku:'',length:'',width:'',height:'',weight:'',notes:'', allowRotation: false, category: '', bundleQty: 0 };
      if (savedEditId) updateSku(savedEditId, payload);
      else addSku({ ...payload, color: COLORS[state.skus.length % COLORS.length] });
    } }, state.editId ? 'SAVE CHANGES' : 'ADD SKU'));
    formBtns.appendChild(h('button', { className: 'btn btn-white', onClick: () => { state.showForm = false; state.editId = null; state.formErr = ''; state.form = { name:'',sku:'',length:'',width:'',height:'',weight:'',notes:'', allowRotation: false, category: '', bundleQty: 0 }; render(); } }, 'CANCEL'));
    formCard.appendChild(formBtns);
    cont.appendChild(formCard);
  }

  // SKU categorized list (manage view)
  const isSkuSearching = !!state.search.trim();
  const { groups: skuMgmtGroups, catKeys: skuMgmtCatKeys } = groupByCategory(filtered);
  const allSkuCatKeys = groupByCategory(sorted).catKeys;
  const skuAllCollapsed = allSkuCatKeys.length > 0 && allSkuCatKeys.every(c => !!state.collapsedCategories[c]);

  const skuListHeader = h('div', { className: 'flex justify-between items-center', style: { marginBottom: '8px' } });
  skuListHeader.appendChild(h('div'));
  skuListHeader.appendChild(h('button', { className: 'btn btn-white', style: { fontSize: '12px', padding: '5px 12px' }, onClick: () => {
    if (skuAllCollapsed) { state.collapsedCategories = {}; }
    else { const nc = {}; allSkuCatKeys.forEach(c => nc[c] = true); state.collapsedCategories = nc; }
    render();
  }}, skuAllCollapsed ? 'EXPAND ALL' : 'COLLAPSE ALL'));
  cont.appendChild(skuListHeader);

  const skuListWrap = h('div', { style: { marginBottom: '14px' } });
  skuMgmtCatKeys.forEach(cat => {
    const catSkus = skuMgmtGroups[cat];
    if (!catSkus || !catSkus.length) return;
    const isCollapsed = !isSkuSearching && !!state.collapsedCategories[cat];
    const catHdr = h('div', { className: 'sku-category-header', onClick: () => { if (!isSkuSearching) { state.collapsedCategories[cat] = !state.collapsedCategories[cat]; render(); } }});
    catHdr.appendChild(h('span', {}, isCollapsed ? '▶' : '▼'));
    catHdr.appendChild(h('span', {}, cat));
    catHdr.appendChild(h('span', { style: { color: 'var(--text-ghost)', fontWeight: 600, fontSize: '12px' } }, `(${catSkus.length})`));
    skuListWrap.appendChild(catHdr);
    if (!isCollapsed) {
      const catBody = h('div', { className: 'sku-category-body' });
      catSkus.forEach(s => {
        const row = h('div', { className: 'sku-row-manage' });
        row.appendChild(h('div', { style: { width: '12px', height: '12px', background: s.color, borderRadius: '50%', flexShrink: '0' } }));

          state.form = { name: s.name + ' Copy', sku: s.sku + '-2', length: String(s.length), width: String(s.width), height: String(s.height), weight: String(s.weight), notes: s.notes || '', allowRotation: s.allowRotation === true, category: s.category || '', bundleQty: s.bundleQty || 0 };
          state.editId = null; state.showForm = true; state.tab = 'skus'; state.formErr = ''; render();

function renderResultsTab() {
  const cont = document.getElementById('tabResults');
  cont.innerHTML = '';
  const dims = getDims();
  const sorted = getSortedSkus();

  if (!state.cart.length) {
    cont.appendChild(h('div', { className: 'card', style: { textAlign: 'center', color: 'var(--text-faint)', padding: '60px', fontSize: '16px' } }, 'NO ITEMS — GO TO LOAD TAB'));
    return;
  }

  const result = getResult();

  // Top buttons
  const topBtns = h('div', { className: 'flex gap-10 flex-wrap mb-14' });
  topBtns.appendChild(h('button', { className: 'btn btn-blue-light', onClick: () => { state.manualRowsByTrailer = {}; state.editorTrailer = null; state.variant++; render(); } }, 'RECALCULATE DIFFERENT'));
  topBtns.appendChild(h('button', { className: 'btn btn-white', onClick: () => { state.manualRowsByTrailer = {}; state.editorTrailer = null; state.variant = 0; render(); } }, 'RESET VARIANTS'));
  if (result.trailers.length > 0) topBtns.appendChild(h('button', { className: 'btn btn-dark', onClick: () => openBolModal(result) }, 'GENERATE BOLs'));
  topBtns.appendChild(h('button', { className: 'btn btn-white', onClick: saveLoad }, 'SAVE LOAD'));
  topBtns.appendChild(h('button', { className: 'btn btn-white', onClick: openLoadModal }, 'LOAD'));
  cont.appendChild(topBtns);

  // Runner quick-toggle
  const runnerToggle = h('div', { className: 'flex items-center gap-10 flex-wrap mb-14' });
  runnerToggle.appendChild(h('span', { style: { color: 'var(--text-muted)', fontWeight: 800, fontSize: '13px' } }, 'RUNNERS'));
  [0, 3, 4].forEach(rh => {
    const label = rh === 0 ? 'NONE' : `${rh}" RUNNERS`;
    runnerToggle.appendChild(h('button', { className: `btn ${state.runnerHeight === rh ? 'btn-accent' : 'btn-white'}`, onClick: () => { state.runnerHeight = rh; state.manualRowsByTrailer = {}; state.editorTrailer = null; render(); } }, label));
  });
  cont.appendChild(runnerToggle);

  // Stats
  const statsGrid = h('div', { className: 'stats-grid mb-20' });
  [["TRAILERS NEEDED", result.trailers.length, "var(--accent)"], ["TOTAL PIECES", result.totalUnits, "var(--teal)"], ["TOTAL STACKS", result.totalStacks, "var(--blue)"], ["MIXED STACKS", result.mixedStacks, "var(--purple)"]].forEach(([label, val, color]) => {
    const c = h('div', { className: 'card stat-card', style: { borderTopColor: color } });
    c.appendChild(h('div', { className: 'stat-label' }, label));
    c.appendChild(h('div', { className: 'stat-value', style: { color } }, String(val)));
    statsGrid.appendChild(c);
  });
  cont.appendChild(statsGrid);

  // Warnings
  if (result.warnings.length) {
    const warnCard = h('div', { className: 'card mb-18', style: { border: '2px solid var(--warn-border)', background: 'var(--warn-bg)' } });
    warnCard.appendChild(h('div', { style: { color: 'var(--warn-text)', fontWeight: 800, fontSize: '13px', marginBottom: '8px' } }, '⚠ LOAD WARNINGS'));
    result.warnings.forEach(w => warnCard.appendChild(h('div', { style: { color: 'var(--warn-text-dark)', fontSize: '14px', marginBottom: '4px' } }, `• ${w}`)));
    cont.appendChild(warnCard);
  }

  // Trailers
  result.trailers.forEach((trailer, ti) => {
    const trailerLabel = trailer.downsizedType || state.trailerType;
    const trailerDims = trailer.downsizedDims || dims;
    const usedPct = Math.min(100, (trailer.usedLength / trailerDims.length) * 100);
    const floorPct = Math.min(100, (trailer.usedFloorArea / (trailerDims.length * trailerDims.width)) * 100);
    const packList = buildPackingList(trailer);
    const isManual = !!state.manualRowsByTrailer[ti];

    const tCard = h('div', { className: 'card mb-18', style: { border: '1px solid var(--border)' } });

    // Trailer header
    const tHdr = h('div', { className: 'flex justify-between items-center mb-10 flex-wrap gap-10', style: { alignItems: 'flex-start' } });
    const tLeft = h('div');
    const titleRow = h('div', { className: 'flex items-center gap-10 flex-wrap' });
    titleRow.appendChild(h('span', { style: { color: 'var(--accent)', fontWeight: 900, fontSize: '18px' } }, `TRAILER ${ti + 1} — ${trailerLabel}`));
    titleRow.appendChild(h('span', { className: 'tag', style: { background: 'var(--blue-bg)', color: 'var(--blue-dark)' } }, `${trailer.totalStacks} stacks · ${trailer.totalUnits} pcs`));
    if (trailer.downsizedType) titleRow.appendChild(h('span', { className: 'tag', style: { background: '#FEF3C7', color: '#92400E' } }, 'AUTO-DOWNSIZED'));
    if (trailer.forcedType && trailer.forcedType !== state.trailerType) titleRow.appendChild(h('span', { className: 'tag', style: { background: '#EDE9FE', color: '#5B21B6' } }, `FORCED: ${trailer.forcedType}`));
    if (isManual) titleRow.appendChild(h('span', { className: 'tag', style: { background: 'var(--teal-bg)', color: 'var(--green-dark)' } }, 'CUSTOMIZED'));
    tLeft.appendChild(titleRow);
    const remainingIn = trailerDims.length - (trailer.usedLength || 0);
    const remLabel = remainingIn === 0 ? 'FULL' : remainingIn >= 12
      ? `${Math.floor(remainingIn / 12)}' ${remainingIn % 12}" remaining`
      : `${remainingIn}" remaining`;
    const totalBdft = Math.round((trailerDims.length * trailerDims.width * trailerDims.height) / 144);
    const usedBdft = Math.round(Object.values(trailer.skuBreakdown).reduce((s, entry) => {
      const sku = state.skus.find(x => x.id === entry.skuId);
      return s + (sku ? entry.pieces * (sku.length * sku.width * sku.height) / 144 : 0);
    }, 0));
    const bdftPct = totalBdft > 0 ? Math.round((usedBdft / totalBdft) * 100) : 0;
    const subtitleEl = h('div', { style: { fontSize: '14px', color: 'var(--text-muted)', fontWeight: 600, marginTop: '6px' } });
    const runnerPart = state.runnerHeight > 0 ? ` · <span style="color:#92400E">${state.runnerHeight}" runners</span>` : '';
    subtitleEl.innerHTML = `${Math.round(usedPct)}% length · ${Math.round(floorPct)}% floor · ${trailer.mixedStacks} mixed stacks · ${usedBdft.toLocaleString()} / ${totalBdft.toLocaleString()} BDFT (${bdftPct}%) · <span style="color:#D97706">${remLabel}</span>${runnerPart}`;
    tLeft.appendChild(subtitleEl);
    tHdr.appendChild(tLeft);

    const tRight = h('div', { className: 'flex gap-8 flex-wrap items-center' });
    tRight.appendChild(h('button', { className: 'btn btn-blue-light', onClick: () => { state.editorTrailer = state.editorTrailer === ti ? null : ti; render(); } }, state.editorTrailer === ti ? 'CLOSE CUSTOMIZE' : 'CUSTOMIZE TRAILER'));
    if (isManual) tRight.appendChild(h('button', { className: 'btn btn-red-light', onClick: () => { delete state.manualRowsByTrailer[ti]; render(); } }, 'CLEAR CUSTOM'));
    const invInput = h('input', { type: 'text', placeholder: 'BOL / INV #', value: state.trailerInvNumbers[ti] || '', className: 'inp', style: { width: '120px', padding: '8px 10px', fontSize: '13px' }, 'data-trailer-inv': String(ti), 'data-auto-filled': 'false' });
    invInput.addEventListener('input', () => {
      state.trailerInvNumbers[ti] = invInput.value;
      if (ti === 0) {
        const val = invInput.value.trim();
        const match = val.match(/^(.+-)(\d+)$/);
        if (match) {
          const prefix = match[1];
          const startNum = parseInt(match[2], 10);
          for (let j = 1; j < state.trailers.length; j++) {
            const nextInput = document.querySelector(`[data-trailer-inv="${j}"]`);
            if (nextInput && (!nextInput.value || nextInput.dataset.autoFilled === 'true')) {
              const suffix = String(startNum + j).padStart(match[2].length, '0');
              nextInput.value = prefix + suffix;
              nextInput.dataset.autoFilled = 'true';
              state.trailerInvNumbers[j] = nextInput.value;
            }
          }
        }
      } else {
        invInput.dataset.autoFilled = 'false';
      }
    });
    tRight.appendChild(invInput);
    tRight.appendChild(h('button', { className: 'btn btn-teal', onClick: () => printPackingSlip(trailer, trailerDims, trailerLabel, ti + 1, packList, state.trailerInvNumbers[ti] || '') }, 'PRINT LOADING DIAGRAM'));
    tHdr.appendChild(tRight);
    tCard.appendChild(tHdr);

    // Progress bars
    const progGrid = h('div', { className: 'progress-grid mb-14' });
    [["LENGTH USED", usedPct, "var(--teal)"], ["FLOOR USED", floorPct, "var(--blue)"]].forEach(([label, pct, color]) => {
      const wrap = h('div');
      wrap.appendChild(h('div', { style: { fontSize: '12px', color: 'var(--text-faint)', marginBottom: '6px', fontWeight: 700 } }, label));
      const track = h('div', { className: 'progress-track' });
      track.appendChild(h('div', { className: 'progress-fill', style: { background: color, width: `${Math.min(100, pct)}%` } }));
      wrap.appendChild(track);
      progGrid.appendChild(wrap);
    });
    tCard.appendChild(progGrid);

    // SVG layout
    const layoutPanel = h('div', { className: 'panel' });
    layoutPanel.appendChild(h('div', { className: 'panel-title' }, 'TRAILER LAYOUT'));
    const svgWrap = h('div', { className: 'svg-wrap', innerHTML: buildTopViewSVG(trailer, trailerDims) });
    layoutPanel.appendChild(svgWrap);
    tCard.appendChild(layoutPanel);

    // Editor
    if (state.editorTrailer === ti) {
      tCard.appendChild(renderTrailerEditor(trailer, ti, sorted));
    }

    // Packing list
    const packPanel = h('div', { className: 'panel' });
    packPanel.appendChild(h('div', { className: 'panel-title' }, 'PACKING LIST'));
    const packGrid = h('div', { className: 'pack-grid' });
    packList.pieces.forEach(item => {
      const pill = h('div', { style: { background: 'var(--surface)', border: '1px solid var(--border-light)', borderRadius: 'var(--radius)', padding: '10px 14px', fontSize: '15px', fontWeight: 700, color: 'var(--text-mid)', display: 'flex', alignItems: 'center', gap: '10px' } });
      pill.appendChild(h('div', { style: { width: '12px', height: '12px', background: item.color, borderRadius: '3px' } }));
      pill.appendChild(document.createTextNode(`${item.pieces} pcs — ${item.name}`));
      packGrid.appendChild(pill);
    });
    packPanel.appendChild(packGrid);

    const stackTitle = h('div', { className: 'panel-title', style: { marginTop: '14px' } }, 'STACK BREAKDOWN');
    packPanel.appendChild(stackTitle);
    const stackGrid = h('div', { className: 'stack-grid' });
    packList.stacks.forEach(s => {
      const box = h('div', { style: { background: 'var(--surface)', border: '1px solid var(--border-light)', borderRadius: 'var(--radius)', padding: '10px 14px', fontSize: '14px', color: 'var(--text-mid)' } });
      box.appendChild(h('div', { style: { fontWeight: 800 } }, `${s.stacks} stack${s.stacks > 1 ? 's' : ''}`));
      box.appendChild(h('div', { style: { marginTop: '4px' } }, s.lines.join(' · ')));
      stackGrid.appendChild(box);
    });
    packPanel.appendChild(stackGrid);
    tCard.appendChild(packPanel);

    // Trailer totals
    const totalsPanel = h('div', { className: 'panel' });
    totalsPanel.appendChild(h('div', { className: 'panel-title' }, 'TRAILER TOTALS'));
    Object.values(trailer.skuBreakdown).forEach(entry => {
      const row = h('div', { className: 'flex items-center gap-8', style: { fontSize: '14px', color: 'var(--text-mid)', padding: '6px 0', borderBottom: '1px solid var(--border-light)' } });
      row.appendChild(h('div', { style: { width: '10px', height: '10px', background: entry.color, borderRadius: '2px' } }));
      row.appendChild(h('span', { style: { flex: 1 } }, `${entry.name} (${entry.sku})`));
      row.appendChild(h('span', { style: { fontWeight: 700 } }, `${entry.pieces} pcs`));
      totalsPanel.appendChild(row);
    });
    tCard.appendChild(totalsPanel);

    cont.appendChild(tCard);
  });
}

// ═══════════════════════════════════════════════════════════════
// MANUAL TRAILER EDITOR
// ═══════════════════════════════════════════════════════════════
let editorRows = [];
let editorOriginalSkuCounts = {};

function renderTrailerEditor(trailer, ti, skuLib) {
  editorOriginalSkuCounts = {};
  Object.values(trailer.skuBreakdown || {}).forEach(entry => {
    editorOriginalSkuCounts[entry.skuId] = entry.pieces;
  });
  editorRows = (trailer.rows || []).map(row => ({
    skuId: row.columns?.[0]?.layers?.[0]?.skuId || row.columns?.[0]?.skuId || skuLib[0]?.id,
    length: row.rowLength,
    columns: row.columns.map(col => ({
      width: col.colWidth,
      layers: col.layers.map(l => ({ skuId: l.skuId, count: l.count })),
    })),
  }));

  function rebuildEditor() {
    const box = document.getElementById('editor-' + ti);
    if (!box) return;
    box.innerHTML = '';
    renderEditorContent(box, ti, skuLib);
  }

  const box = h('div', { className: 'card editor-box', id: 'editor-' + ti });
  renderEditorContent(box, ti, skuLib);
  return box;
}

function renderEditorContent(box, ti, skuLib) {
  const hdr = h('div', { className: 'flex justify-between gap-10 flex-wrap mb-12' });
  hdr.appendChild(h('div', { style: { fontWeight: 800, color: 'var(--blue-dark)' } }, `TRAILER ${ti + 1} CUSTOMIZE`));
  const hdrBtns = h('div', { className: 'flex gap-8 flex-wrap' });
  hdrBtns.appendChild(h('button', { className: 'btn btn-white', style: { borderColor: 'var(--blue-border)', color: 'var(--blue-dark)' }, onClick: () => {
    const sku = skuLib[0]; if (!sku) return;
    editorRows.push({ skuId: sku.id, length: sku.length, columns: [{ width: sku.width, layers: [{ skuId: sku.id, count: 1 }] }] });
    const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
  } }, '+ ADD ROW'));
  hdrBtns.appendChild(h('button', { className: 'btn btn-blue', onClick: () => applyEditorRows(ti, skuLib) }, 'APPLY'));
  hdrBtns.appendChild(h('button', { className: 'btn btn-white', onClick: () => { state.editorTrailer = null; render(); } }, 'CLOSE'));
  hdr.appendChild(hdrBtns);
  box.appendChild(hdr);

  const rowsContainer = h('div', { style: { display: 'grid', gap: '12px' } });
  editorRows.forEach((row, ri) => {
    const rowEl = h('div', { className: 'editor-row' });
    const rowHdr = h('div', { className: 'flex gap-8 items-center flex-wrap mb-10' });
    rowHdr.appendChild(h('strong', {}, `Row ${ri + 1}`));

    const sel = h('select', { className: 'inp', value: String(row.skuId), style: { width: '220px', padding: '8px 10px' }, onChange: e => {
      const sku = skuLib.find(s => s.id === e.target.value); if (!sku) return;
      editorRows[ri].skuId = sku.id; editorRows[ri].length = sku.length;
      editorRows[ri].columns.forEach(c => c.width = sku.width);
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } });
    skuLib.forEach(s => { const opt = h('option', { value: String(s.id) }, s.name); if (s.id === row.skuId) opt.selected = true; sel.appendChild(opt); });
    rowHdr.appendChild(sel);

    rowHdr.appendChild(h('button', { className: 'btn btn-white', onClick: () => {
      if (ri > 0) { [editorRows[ri], editorRows[ri-1]] = [editorRows[ri-1], editorRows[ri]]; }
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } }, '↑'));
    rowHdr.appendChild(h('button', { className: 'btn btn-white', onClick: () => {
      if (ri < editorRows.length - 1) { [editorRows[ri], editorRows[ri+1]] = [editorRows[ri+1], editorRows[ri]]; }
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } }, '↓'));
    rowHdr.appendChild(h('button', { className: 'btn btn-teal-light', onClick: () => {
      const baseSku = skuLib.find(s => s.id === row.skuId) || skuLib[0]; if (!baseSku) return;
      editorRows[ri].columns.push({ width: baseSku.width, layers: [{ skuId: baseSku.id, count: 1 }] });
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } }, '+ COL'));
    rowHdr.appendChild(h('button', { className: 'btn btn-red-light', onClick: () => {
      editorRows.splice(ri, 1);
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } }, 'DEL ROW'));
    rowEl.appendChild(rowHdr);

    const colsGrid = h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '10px' } });
    row.columns.forEach((col, ci) => {
      const colEl = h('div', { className: 'editor-col', 'data-row-idx': String(ri), 'data-col-idx': String(ci) });
      colEl.addEventListener('dragover', (e) => {
        e.preventDefault();
        colEl.style.outline = '2px dashed #3b82f6';
      });
      colEl.addEventListener('dragleave', () => {
        colEl.style.outline = '';
      });
      colEl.addEventListener('drop', (e) => {
        e.preventDefault();
        colEl.style.outline = '';
        let data;
        try { data = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
        const { ri: fromRi, ci: fromCi, li: fromLi } = data;
        if (fromRi !== ri || fromCi === ci) return;
        const layer = editorRows[fromRi].columns[fromCi].layers.splice(fromLi, 1)[0];
        if (!layer) return;
        editorRows[ri].columns[ci].layers.push(layer);
        const edBox = document.getElementById('editor-' + ti);
        edBox.innerHTML = '';
        renderEditorContent(edBox, ti, skuLib);
      });

      const colHdr = h('div', { className: 'flex justify-between mb-10' });
      colHdr.appendChild(h('strong', {}, `Col ${ci + 1}`));
      colHdr.appendChild(h('button', { className: 'btn btn-red-light', style: { padding: '6px 12px' }, onClick: () => {
        editorRows[ri].columns.splice(ci, 1);
        const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
      } }, 'DEL'));
      colEl.appendChild(colHdr);

      col.layers.forEach((layer, li) => {
        const layerRow = h('div', { className: 'editor-layer-grid', draggable: 'true', style: { cursor: 'grab' } });
        layerRow.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', JSON.stringify({ ri, ci, li }));
          layerRow.style.opacity = '0.5';
        });
        layerRow.addEventListener('dragend', () => {
          layerRow.style.opacity = '1';
        });
        const lSel = h('select', { className: 'inp', style: { padding: '8px 10px' }, onChange: e => {
          editorRows[ri].columns[ci].layers[li].skuId = e.target.value;
        } });
        skuLib.forEach(s => { const opt = h('option', { value: String(s.id) }, s.name); if (s.id === layer.skuId) opt.selected = true; lSel.appendChild(opt); });
        layerRow.appendChild(lSel);
        layerRow.appendChild(h('input', { type: 'number', min: '0', className: 'inp', value: String(layer.count), style: { padding: '8px 10px' }, onChange: e => {
          editorRows[ri].columns[ci].layers[li].count = Math.max(0, parseInt(e.target.value, 10) || 0);
        } }));
        layerRow.appendChild(h('button', { className: 'btn btn-red-light', style: { padding: '6px 8px' }, onClick: () => {
          editorRows[ri].columns[ci].layers.splice(li, 1);
          const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
        } }, '×'));
        colEl.appendChild(layerRow);
      });

      colEl.appendChild(h('button', { className: 'btn', style: { background: 'var(--surface)', color: 'var(--blue-dark)', borderColor: 'var(--blue-border)' }, onClick: () => {
        const sku = skuLib[0]; if (!sku) return;
        editorRows[ri].columns[ci].layers.push({ skuId: sku.id, count: 1 });
        const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
      } }, '+ LAYER'));
      colsGrid.appendChild(colEl);
    });
    rowEl.appendChild(colsGrid);
    rowsContainer.appendChild(rowEl);
  });
  box.appendChild(rowsContainer);

  // Over-capacity alert
  const editorTotal = editorRows.reduce((sum, row) =>
    sum + row.columns.reduce((s2, col) =>
      s2 + col.layers.reduce((s3, l) => s3 + (l.count || 0), 0), 0), 0);
  const originalTotal = Object.values(editorOriginalSkuCounts).reduce((s, v) => s + v, 0);
  if (editorTotal > originalTotal) {
    const warn = h('div', { style: { background: '#fff3cd', border: '1px solid #ffc107', borderRadius: '6px', padding: '10px 14px', marginTop: '12px', color: '#856404', fontSize: '13px' } },
      `⚠️ Layout exceeds original piece count (${editorTotal} placed vs ${originalTotal} expected). Consider reviewing before applying.`);
    box.appendChild(warn);
  }

  // Unassigned pieces section
  const editorSkuCounts = {};
  editorRows.forEach(row => row.columns.forEach(col => col.layers.forEach(l => {
    editorSkuCounts[l.skuId] = (editorSkuCounts[l.skuId] || 0) + (l.count || 0);
  })));
  const unassigned = Object.entries(editorOriginalSkuCounts)
    .map(([skuId, origCount]) => ({ skuId, unassigned: origCount - (editorSkuCounts[skuId] || 0) }))
    .filter(x => x.unassigned > 0);
  if (unassigned.length > 0) {
    const section = h('div', { style: { marginTop: '16px' } });
    section.appendChild(h('div', { style: { fontWeight: 700, fontSize: '12px', letterSpacing: '0.05em', color: 'var(--text-mid)', marginBottom: '8px' } }, 'UNASSIGNED PIECES'));
    const tbl = h('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: '13px' } });
    unassigned.forEach(({ skuId, unassigned: qty }) => {
      const skuEntry = skuLib.find(s => s.id === skuId);
      const name = skuEntry ? skuEntry.name : skuId;
      const tr = h('tr', { style: { borderBottom: '1px solid var(--border-light)' } });
      tr.appendChild(h('td', { style: { padding: '6px 8px' } }, name));
      tr.appendChild(h('td', { style: { padding: '6px 8px', textAlign: 'right', fontVariantNumeric: 'tabular-nums' } }, String(qty)));
      tbl.appendChild(tr);
    });
    section.appendChild(tbl);
    box.appendChild(section);
  }
}

function applyEditorRows(ti, skuLib) {
  const trailerDims = getDims();
  const effectiveHeight = trailerDims.height - (state.runnerHeight || 0);

  for (const row of editorRows) {
    for (const col of row.columns) {
      const colHeight = col.layers.reduce((sum, layer) => {
        const sku = skuLib.find(s => s.id === layer.skuId);
        return sum + (sku ? sku.height * layer.count : 0);
      }, 0);
      if (colHeight > effectiveHeight) {
        showToast(`⚠ Stack exceeds trailer height (${colHeight}" stacked vs ${effectiveHeight}" max). Reduce layers before applying.`, 'error');
        return;
      }
    }
  }

  const trailerBdft = Math.round((trailerDims.length * trailerDims.width * trailerDims.height) / 144);
  let layoutBdft = 0;
  for (const row of editorRows) {
    for (const col of row.columns) {
      for (const layer of col.layers) {
        const sku = skuLib.find(s => s.id === layer.skuId);
        if (sku) layoutBdft += (sku.length * sku.width * sku.height * layer.count) / 144;
      }
    }
  }
  layoutBdft = Math.round(layoutBdft);
  if (layoutBdft > trailerBdft) {
    showToast(`⚠ Layout exceeds trailer capacity (${layoutBdft.toLocaleString()} BDFT vs ${trailerBdft.toLocaleString()} BDFT max). Review your layout before applying.`, 'error');
    return;
  }

  const rebuiltRows = [];
  let posFromFront = 0;
  editorRows.forEach(row => {
    const baseSku = skuLib.find(s => s.id === row.skuId);
    if (!baseSku || !row.columns.length) return;
    let posY = 0;
    const cols = row.columns.map(col => {
      const layers = col.layers.map(l => {
        const sku = skuLib.find(s => s.id === l.skuId);
        if (!sku || l.count <= 0) return null;
        return { skuId: sku.id, skuName: sku.name, skuCode: sku.sku, color: sku.color, unitHeight: sku.height, count: l.count };
      }).filter(Boolean);
      if (!layers.length) return null;
      const totalHeight = layers.reduce((s, l) => s + l.unitHeight * l.count, 0);
      const totalWeight = layers.reduce((s, l) => { const sku = skuLib.find(x => x.id === l.skuId); return s + (sku ? sku.weight * l.count : 0); }, 0);
      const stackCount = layers.reduce((s, l) => s + l.count, 0);
      const built = { posY, colWidth: col.width || baseSku.width, skuId: layers[0].skuId, skuName: layers[0].skuName, skuCode: layers[0].skuCode, color: layers[0].color, unitHeight: layers[0].unitHeight, totalHeight, totalWeight, stackCount, layers, mixed: layers.length > 1, label: layers.map(l => `${l.unitHeight}"`).join(" + ") };
      posY += built.colWidth;
      return built;
    }).filter(Boolean);
    if (!cols.length) return;
    rebuiltRows.push({ posFromFront, rowLength: row.length || baseSku.length, rowWidthUsed: cols.reduce((s, c) => s + c.colWidth, 0), columns: cols, totalUnits: cols.reduce((s, c) => s + c.stackCount, 0), totalWeight: cols.reduce((s, c) => s + c.totalWeight, 0) });
    posFromFront += row.length || baseSku.length;
  });
  state.manualRowsByTrailer[ti] = rebuiltRows;
  state.editorTrailer = null;
  render();
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

async function buildBolAppendBytes(bm) {
  // Collect optional appended-PDF bytes (packing slip and/or loading diagram).
  // bol-shared.js accepts a single packingSlipPdfBytes; if both are present we
  // merge them into one PDF here so the generator stays untouched.
  let packingSlipPdfBytes = null;
  let loadingDiagramPdfBytes = null;

  if (bm && bm.includePacking && state.prefillJobData?.id) {
    try {
      const slipRes = await fetch('/api/jobs/' + encodeURIComponent(state.prefillJobData.id) + '/packing-slip');
      if (slipRes.ok) {
        packingSlipPdfBytes = await slipRes.arrayBuffer();
      }
    } catch { /* packing slip unavailable */ }
  }

  if (bm && bm.includeLoadingDiagram) {
    // BolShared.generatePdf is called once for all BOLs (not per-trailer), so we
    // attach only the diagram for the currently-displayed trailer (currentPage).
    // When GENERATE ALL BOLs is triggered from the last page, this is the last trailer.
    try {
      const idx = bm.currentPage;
      const trailer = bm.trailers[idx];
      const trailerDims = trailer.downsizedDims || getDims();
      const trailerLabel = trailer.downsizedType || state.trailerType;
      const packList = buildPackingList(trailer);
      loadingDiagramPdfBytes = await buildLoadingDiagramPdfBytes(
        trailer,
        trailerDims,
        trailerLabel,
        idx + 1,
        packList,
        state.trailerInvNumbers[idx] || ''
      );
    } catch (e) {
      console.error('Failed to build loading diagram PDF:', e);
    }
  }

  // Combine: if both, merge into one. If only one, use it. Else null.
  let combinedAppendBytes = null;
  if (packingSlipPdfBytes && loadingDiagramPdfBytes) {
    try {
      const { PDFDocument } = PDFLib;
      const combined = await PDFDocument.create();
      const slipDoc = await PDFDocument.load(packingSlipPdfBytes);
      const diagDoc = await PDFDocument.load(loadingDiagramPdfBytes);
      const slipPages = await combined.copyPages(slipDoc, slipDoc.getPageIndices());
      slipPages.forEach(p => combined.addPage(p));
      const diagPages = await combined.copyPages(diagDoc, diagDoc.getPageIndices());
      diagPages.forEach(p => combined.addPage(p));
      combinedAppendBytes = await combined.save();
    } catch (e) {
      console.error('Failed to merge packing slip + loading diagram:', e);
      combinedAppendBytes = packingSlipPdfBytes || loadingDiagramPdfBytes;
    }
  } else {
    combinedAppendBytes = packingSlipPdfBytes || loadingDiagramPdfBytes;
  }
  return combinedAppendBytes;
}

    const td = {

      contactName: '', contactPhone: '', carrierName: '',
      invNumber: state.trailerInvNumbers[i] || '',
      poNumber: '', deliveryTime: '', date: today,
      freightTerms: 'prepaid', specialInstructions: '',

    };
    if (state.prefillJobData && i === 0) {

      td.jobId          = job.id;

      td.shipToAttention = job.ship_to_attention || '';
      td.shipToStreet   = job.ship_to_street   || '';
      td.shipToStreet2  = job.ship_to_street2  || '';

      td.shipToState    = job.ship_to_state    || (job.location || '').split(',')[1]?.trim() || '';
      td.shipToZip      = job.ship_to_zip      || '';
      td.carrierName    = job.carrier          || '';
      td.contactName    = job.contact_name     || '';
      td.contactPhone   = job.contact_phone    || '';
      td.poNumber       = job.po_number        || '';
      td.invNumber      = job.invoice_number   || job.packing_slip_invoice || '';
      td.deliveryTime   = job.delivery_time    || '';
      td.date           = job.ship_date        || today;
    }
    return td;
  });
  // Auto-apply carry-over for trailers beyond the first (carryOver defaults to true)
  for (let i = 1; i < trailerData.length; i++) {
    const prev = trailerData[i - 1];
    const td = trailerData[i];
    if (td.carryOver) {
      td.customerId = prev.customerId; td.customerSource = prev.customerSource;
      td.shipToCompany = prev.shipToCompany; td.shipToAttention = prev.shipToAttention;
      td.shipToStreet = prev.shipToStreet; td.shipToStreet2 = prev.shipToStreet2;

      td.specialInstructions = prev.specialInstructions;
      td.poNumber = prev.poNumber; td.deliveryTime = prev.deliveryTime;
    }
  }
  BolCompose.open({
    trailerData,
    trailerCount: result.trailers.length,
    trailers: result.trailers,
    prefillJobData: state.prefillJobData,
    trailerInvNumbers: state.trailerInvNumbers,

function parseDimensionString(dimStr) {
  if (!dimStr) return null;
  let s = dimStr.replace(/[“”„‟]/g, '"').replace(/[×xX]/g, 'x');
  const parts = s.split(/\s*x\s*/i);
  if (parts.length < 2) return null;
  function parseInches(str) {
    str = str.replace(/[""\s]/g, '').trim();
    const mixed = str.match(/^(\d+)-(\d+)\/(\d+)$/);
    if (mixed) return parseInt(mixed[1]) + parseInt(mixed[2]) / parseInt(mixed[3]);
    const frac = str.match(/^(\d+)\/(\d+)$/);
    if (frac) return parseInt(frac[1]) / parseInt(frac[2]);
    const num = parseFloat(str);
    return isNaN(num) ? null : num;
  }
  const length = parseInches(parts[0]);
  const width  = parseInches(parts[1]);
  const height = parts.length >= 3 ? parseInches(parts[2]) : null;
  if (length === null || width === null) return null;
  return { length, width, height: height || width };
}

async function createPartOnTheFly(lineItem, dims, customerName) {
  const partNumber = `CUSTOM-${dims.length}x${dims.width}x${dims.height}`;
  const payload = {
    part_number: partNumber,
    name: lineItem.description || partNumber,
    customer: customerName || '',
    density_material: '',
    length_in: dims.length,
    width_in: dims.width,
    height_in: dims.height,
    weight: 1,
    category: dims.height <= 1 ? 'Sheets' : 'Blocks',
    parent_group: '',
  };
  try {
    const res = await api.post('/api/parts', payload);
    const data = res.data;
    if (res.ok && data.part) return data.part;
    if (data && data.error && /unique/i.test(data.error || data.detail || '')) {
      const listRes = await api.get('/api/parts');
      const listData = listRes.data;
      return (listData.parts || []).find(p => p.part_number === partNumber) || null;
    }
    return null;
  } catch { return null; }
}

async function saveLoad() {
  const customer = (state.prefillJobData?.customer || '').trim();
  const dateStr = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const defaultName = customer ? `${customer} — ${dateStr}` : dateStr;
  const name = prompt('Save load as:', state.currentSavedLoadId ? '' : defaultName);
  if (name === null) return;

  const stateJson = {
    trailerType:           state.trailerType,
    trailerInvNumbers:     state.trailerInvNumbers,
    runnerHeight:          state.runnerHeight,
    autoDownsize:          state.autoDownsize,
    forcedTrailers:        state.forcedTrailers,
    forcedMode:            state.forcedMode,
    variant:               state.variant,
    manualRowsByTrailer:   state.manualRowsByTrailer,
    skus:                  state.skus,
    cart:                  state.cart,
    prefillJobId:          state.prefillJobId,
  };

  const payload = {
    name:         name.trim() || defaultName,
    job_id:       state.prefillJobId || null,
    customer:     customer,
    trailer_type: state.trailerType,
    state_json:   JSON.stringify(stateJson),
  };

  try {
    const isUpdate = !!state.currentSavedLoadId;
    const url = isUpdate
      ? '/api/saved-loads/' + encodeURIComponent(state.currentSavedLoadId)
      : '/api/saved-loads';
    const res = isUpdate ? await api.put(url, payload) : await api.post(url, payload);
    const data = res.data;
    if (!res.ok) { showToast('Failed to save load: ' + (res.error || 'Unknown error'), 'error'); return; }
    state.currentSavedLoadId = data.load.id;
    showToast('Load saved.', 'success');
  } catch {
    showToast('Network error saving load.', 'error');
  }
}

async function prefillFromJob(jobId) {
  try {
    const res = await api.get('/api/jobs/' + encodeURIComponent(jobId));
    const data = res.data;
    if (!res.ok || !data.job) { console.warn('Could not load job', jobId); return; }
    const job = data.job;
    const lineItems = job.line_items || [];
    if (!lineItems.length) { console.warn('Job has no line items'); return; }

    state.prefillJobId = jobId;
    state.prefillJobData = job;

    const existingSkus = [...state.skus];
    const cartMap = new Map();

    for (const li of lineItems) {
      let matchedSku = null;

      if (li.part_id) {
        matchedSku = existingSkus.find(s => s.id === li.part_id);
      }
      if (!matchedSku && li.part_number) {
        matchedSku = existingSkus.find(s => (s.sku || '').toLowerCase() === li.part_number.toLowerCase());
      }
      if (!matchedSku && li.dimensions) {
        const dims = parseDimensionString(li.dimensions);
        if (dims) {
          matchedSku = existingSkus.find(s =>
            Math.abs(s.length - dims.length) < 0.1 &&
            Math.abs(s.width  - dims.width)  < 0.1 &&
            Math.abs(s.height - dims.height) < 0.1
          );
        }
      }
      if (!matchedSku && li.dimensions) {
        const dims = parseDimensionString(li.dimensions);
        if (dims) {
          const newPart = await createPartOnTheFly(li, dims, job.customer);
          if (newPart) {
            matchedSku = { id: newPart.id, name: newPart.name || newPart.part_number, sku: newPart.part_number, length: newPart.length_in, width: newPart.width_in, height: newPart.height_in, weight: newPart.weight || 1, color: newPart.color || '#D97706', allowRotation: false, category: newPart.category || '', parent_group: newPart.parent_group || '' };
            existingSkus.push(matchedSku);
          }
        }
      }

      if (matchedSku) {
        const qty = li.quantity || 1;
        if (cartMap.has(matchedSku.id)) { cartMap.get(matchedSku.id).qty += qty; }
        else { cartMap.set(matchedSku.id, { skuId: matchedSku.id, qty }); }
      }
    }

    const cartEntries = [...cartMap.values()];
    if (cartEntries.length > 0) {
      for (const entry of cartEntries) { state.cart.push(entry); }
      const totalPieces = cartEntries.reduce((s, e) => s + e.qty, 0);
      showJobBanner(job, totalPieces);
    }

    state.skus = sortByHeight(existingSkus);
    render();
  } catch (e) {
    console.error('prefillFromJob failed:', e);
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initSkus().then(() => {
  const prefillJobId = new URLSearchParams(location.search).get('job_id');
  if (prefillJobId) prefillFromJob(prefillJobId);
});
</script>
