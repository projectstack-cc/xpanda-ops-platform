<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Load Builder — xPanda Logistics</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="/assets/img/favicon.png" sizes="any">
<link rel="apple-touch-icon" href="/assets/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="logistics-shared.css">
<style>
  :root {
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #CBD5E1;
    --border-light: #E2E8F0;
    --text: #0F172A;
    --text-mid: #334155;
    --text-muted: #475569;
    --text-faint: #64748B;
    --text-ghost: #94A3B8;
    --accent: #D97706;
    --accent-light: #FED7AA;
    --blue: #2563EB;
    --blue-dark: #1D4ED8;
    --blue-bg: #EFF6FF;
    --blue-border: #BFDBFE;
    --teal: #0F766E;
    --teal-bg: #ECFDF5;
    --teal-border: #A7F3D0;
    --green: #059669;
    --green-dark: #166534;
    --purple: #7C3AED;
    --red: #DC2626;
    --red-dark: #B91C1C;
    --red-bg: #FEF2F2;
    --red-border: #FECACA;
    --warn-bg: #FFFBEB;
    --warn-border: #FCD34D;
    --warn-text: #B45309;
    --warn-text-dark: #78350F;
    --radius: 10px;
    --radius-lg: 14px;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .logistics-back-link { display: none; }

  .lb-tab-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Buttons */
  .btn {
    padding: 10px 16px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    border-radius: var(--radius);
    border: 1px solid;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }

  .btn-dark { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-white { background: var(--surface); color: var(--text-mid); border-color: var(--border); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-blue { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }
  .btn-blue-light { background: var(--blue-bg); color: var(--blue-dark); border-color: var(--blue-border); }
  .btn-teal { background: var(--teal); color: #fff; border-color: var(--teal); }
  .btn-teal-light { background: var(--teal-bg); color: var(--green-dark); border-color: var(--teal-border); }
  .btn-red-light { background: var(--red-bg); color: var(--red-dark); border-color: var(--red-border); }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: 0 2px 10px rgba(15,23,42,0.04);
  }

  /* Inputs */
  .inp {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: var(--font);
    font-size: 15px;
    border-radius: var(--radius);
    width: 100%;
  }
  .inp:focus { outline: 2px solid var(--blue); outline-offset: -1px; }

  /* Grid SKU cards */
  .sku-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
    gap: 14px;
    margin-bottom: 22px;
  }

  .sku-card { transition: border-color 0.2s, box-shadow 0.2s; }
  .sku-card:hover { box-shadow: 0 4px 16px rgba(15,23,42,0.08); }

  /* Tag label */
  .tag {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    display: inline-block;
  }

  /* Progress bar */
  .progress-track { background: var(--border-light); height: 8px; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }

  /* Stat card */
  .stat-card { border-top-width: 4px; border-top-style: solid; }
  .stat-card .stat-label { font-size: 12px; color: var(--text-faint); font-weight: 700; margin-bottom: 8px; }
  .stat-card .stat-value { font-size: 28px; font-weight: 900; font-family: var(--mono); }

  /* Inner panels */
  .panel {
    background: var(--bg);
    border: 1px solid var(--border-light);
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .panel-title { color: var(--text-faint); font-size: 12px; font-weight: 800; margin-bottom: 8px; letter-spacing: 0.5px; }

  /* Flex utilities */
  .flex { display: flex; }
  .flex-wrap { flex-wrap: wrap; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .gap-10 { gap: 10px; }
  .gap-12 { gap: 12px; }
  .gap-14 { gap: 14px; }
  .mb-10 { margin-bottom: 10px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-14 { margin-bottom: 14px; }
  .mb-18 { margin-bottom: 18px; }
  .mb-20 { margin-bottom: 20px; }
  .mt-14 { margin-top: 14px; }

  .color-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }

  /* Qty stepper */
  .qty-input {
    width: 72px;
    text-align: center;
    background: #fff;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    padding: 8px 4px;
    border-radius: var(--radius);
    border-width: 2px;
    border-style: solid;
  }

  /* Editor */
  .editor-box {
    border: 2px solid var(--blue-border);
    background: var(--blue-bg);
    margin-top: 12px;
  }

  .editor-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
  }

  .editor-col {
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 10px;
  }

  .editor-layer-grid {
    display: grid;
    grid-template-columns: 1fr 80px 40px;
    gap: 6px;
    margin-bottom: 6px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Form grid */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full-width { grid-column: 1 / -1; }

  .form-label { font-size: 13px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }

  /* Packing list grid */
  .pack-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }

  .stack-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 8px;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 12px;
  }

  .progress-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Sku library list */
  .sku-list { display: flex; flex-direction: column; gap: 10px; }

  .calc-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }

  /* SVG container */
  .svg-wrap { position: relative; overflow-x: auto; }

  @media (max-width: 600px) {
    .container { padding: 16px 10px; }
    .form-grid { grid-template-columns: 1fr; }
    .progress-grid { grid-template-columns: 1fr; }
    .calc-btn-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="container">
  <div id="headerTabs" class="lb-tab-nav"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA & CONSTANTS
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = "foam_trailer_loader_v31";

const SVG_TOPVIEW_SCALE  = 0.52;  // px per inch, screen layout view
const SVG_PRINT_SCALE    = 1.9;   // px per inch, print view (before fit-scaling)
const SVG_PRINT_MAX_WIDTH = 1050; // max print SVG width in px (landscape page)

const DEFAULT_SKUS = [
  { id: 1, name: "4in block", sku: "FB-4", length: 48, width: 24, height: 4, weight: 1, notes: "", color: "#D97706", allowRotation: false },
  { id: 2, name: "5in block", sku: "FB-5", length: 48, width: 24, height: 5, weight: 1, notes: "", color: "#0F766E", allowRotation: false },
  { id: 3, name: "6in block", sku: "FB-6", length: 48, width: 24, height: 6, weight: 1, notes: "", color: "#2563EB", allowRotation: false },
  { id: 4, name: "7in block", sku: "FB-7", length: 48, width: 24, height: 7, weight: 1, notes: "", color: "#7C3AED", allowRotation: false },
  { id: 5, name: "8in block", sku: "FB-8", length: 48, width: 24, height: 8, weight: 1, notes: "", color: "#DC2626", allowRotation: false },
  { id: 6, name: "9in block", sku: "FB-9", length: 48, width: 24, height: 9, weight: 1, notes: "", color: "#059669", allowRotation: false },
  { id: 7, name: "10in block", sku: "FB-10", length: 48, width: 24, height: 10, weight: 1, notes: "", color: "#9333EA", allowRotation: false },
  { id: 8, name: "11in block", sku: "FB-11", length: 48, width: 24, height: 11, weight: 1, notes: "", color: "#0891B2", allowRotation: false },
  { id: 9, name: "12in block", sku: "FB-12", length: 48, width: 24, height: 12, weight: 1, notes: "", color: "#CA8A04", allowRotation: false },
  { id: 10, name: "13in block", sku: "FB-13", length: 48, width: 24, height: 13, weight: 1, notes: "", color: "#4F46E5", allowRotation: false },
];

const TRAILER_TYPES = {
  "53ft Standard": { length: 636, width: 98, height: 108, maxWeight: 44000 },
  "48ft Flatbed":  { length: 576, width: 98, height: 108, maxWeight: 44000 },
  "40ft Container": { length: 480, width: 90, height: 102, maxWeight: 55000 },
  "20ft Container": { length: 240, width: 90, height: 86, maxWeight: 44000 },
  "26ft Box Truck": { length: 312, width: 98, height: 108, maxWeight: 28000 },
};

const COLORS = [
  "#D97706","#0F766E","#2563EB","#7C3AED","#DC2626","#059669","#9333EA","#0891B2",
  "#CA8A04","#4F46E5","#EA580C","#16A34A","#0284C7","#BE123C","#A21CAF","#4338CA",
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = {
  skus: [],
  cart: [],
  trailerType: "53ft Standard",
  tab: "load",
  search: "",
  variant: 0,
  showForm: false,
  editId: null,
  formErr: "",
  pasteMode: false,
  pasteText: "",
  pasteErr: "",
  editorTrailer: null,
  manualRowsByTrailer: {},
  form: { name: "", sku: "", length: "", width: "", height: "", weight: "", notes: "", allowRotation: false },
  skuLoading: true,
  skuError: "",
  skuMutating: false,
  runnerHeight: 0,
};

// ═══════════════════════════════════════════════════════════════
// UTILITY FUNCTIONS (identical to React version)
// ═══════════════════════════════════════════════════════════════
function sortByHeight(list) {
  return [...list].sort((a, b) => a.height !== b.height ? a.height - b.height : a.name.localeCompare(b.name));
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr) && arr.length) {
        return sortByHeight(arr.map((s, i) => ({
          id: s.id ?? Date.now() + i, name: s.name ?? "SKU", sku: s.sku ?? "SKU",
          length: +s.length || 0, width: +s.width || 0, height: +s.height || 0,
          weight: +s.weight || 0, notes: s.notes || "", color: s.color || COLORS[i % COLORS.length],
          allowRotation: s.allowRotation === true,
        })));
      }
    }
  } catch (_) {}
  return DEFAULT_SKUS;
}

function toCSV(skus) {
  return ["name,sku,length,width,height,weight,notes,allowRotation",
    ...skus.map(s => [s.name, s.sku, s.length, s.width, s.height, s.weight, (s.notes || "").replace(/,/g, ";"), s.allowRotation ? "true" : "false"].join(","))
  ].join("\n");
}

function fromCSV(text, offset) {
  const result = [];
  text.trim().split("\n").forEach((line, i) => {
    if (line.toLowerCase().startsWith("name")) return;
    const p = line.split(",").map(x => x.trim());
    if (p.length < 6) return;
    const [name, sku, length, width, height, weight, notesRaw, rotationRaw] = p;
    if (!name || isNaN(+length) || isNaN(+width) || isNaN(+height) || isNaN(+weight) || +length <= 0 || +width <= 0 || +height <= 0 || +weight <= 0) return;
    result.push({
      id: Date.now() + offset + i, name, sku: sku || name,
      length: +length, width: +width, height: +height, weight: +weight,
      notes: notesRaw || "", color: COLORS[(offset + i) % COLORS.length],
      allowRotation: rotationRaw ? rotationRaw.toLowerCase() === "true" : false,
    });
  });
  return result;
}

function cloneDemand(demand) { return demand.map(d => ({ ...d })); }

function sortDemandPriority(demand, variant = 0) {
  const mode = variant % 4;
  return [...demand].sort((a, b) => {
    if (b.originalQty !== a.originalQty) return b.originalQty - a.originalQty;
    if (b.remaining !== a.remaining) return b.remaining - a.remaining;
    if (mode === 0) { if (b.sku.width !== a.sku.width) return b.sku.width - a.sku.width; if (a.sku.height !== b.sku.height) return a.sku.height - b.sku.height; }
    else if (mode === 1) { if (a.sku.height !== b.sku.height) return a.sku.height - b.sku.height; if (b.sku.width !== a.sku.width) return b.sku.width - a.sku.width; }
    else if (mode === 2) { if (b.sku.length !== a.sku.length) return b.sku.length - a.sku.length; if (b.sku.width !== a.sku.width) return b.sku.width - a.sku.width; }
    else { if (b.sku.width !== a.sku.width) return b.sku.width - a.sku.width; if (b.sku.length !== a.sku.length) return b.sku.length - a.sku.length; }
    return a.sku.name.localeCompare(b.sku.name);
  });
}

function buildDemand(cart, skus, dims) {
  return cart.map(c => {
    const sku = skus.find(s => s.id === c.skuId);
    if (!sku) return null;
    if (sku.length <= 0 || sku.width <= 0 || sku.height <= 0) return null;

    let effectiveLength = sku.length, effectiveWidth = sku.width, rotated = false;

    if (sku.allowRotation) {
      const origFits = sku.length <= dims.length && sku.width <= dims.width;
      const rotFits = sku.width <= dims.length && sku.length <= dims.width;
      if (origFits && rotFits) {
        const origScore = Math.floor(dims.length / sku.length) * Math.floor(dims.width / sku.width);
        const rotScore = Math.floor(dims.length / sku.width) * Math.floor(dims.width / sku.length);
        if (rotScore > origScore) { effectiveLength = sku.width; effectiveWidth = sku.length; rotated = true; }
      } else if (!origFits && rotFits) {
        effectiveLength = sku.width; effectiveWidth = sku.length; rotated = true;
      }
    }

    if (effectiveLength > dims.length || effectiveWidth > dims.width || sku.height > dims.height) return null;

    const effectiveSku = rotated
      ? { ...sku, length: effectiveLength, width: effectiveWidth, name: sku.name + " (rotated)" }
      : sku;
    return { skuId: sku.id, sku: effectiveSku, originalQty: c.qty, remaining: c.qty };
  }).filter(Boolean);
}

function exactFillHeight(targetH, candidates, maxWeightBudget) {
  const opts = candidates.filter(d => d.remaining > 0 && d.sku.height <= targetH)
    .map(d => ({ demand: d, maxCount: Math.min(d.remaining, Math.floor(targetH / d.sku.height)) }))
    .filter(x => x.maxCount > 0);
  if (!opts.length) return null;
  let best = { totalH: 0, totalWeight: 0, picks: [] };
  let iterations = 0;
  const LIMIT = 10000;
  function dfs(idx, remainH, usedWeight, picks) {
    iterations++;
    if (iterations > LIMIT) return;
    const currentH = targetH - remainH;
    if (currentH > best.totalH || (currentH === best.totalH && picks.length < best.picks.length)) {
      best = { totalH: currentH, totalWeight: usedWeight, picks: picks.map(p => ({ ...p })) };
    }
    if (remainH === 0 || idx >= opts.length) return;
    const opt = opts[idx];
    const maxTake = Math.min(opt.maxCount, Math.floor(remainH / opt.demand.sku.height));
    for (let take = maxTake; take >= 0; take--) {
      const addWeight = take * opt.demand.sku.weight;
      if (usedWeight + addWeight > maxWeightBudget) continue;
      if (take > 0) picks.push({ demand: opt.demand, count: take });
      dfs(idx + 1, remainH - take * opt.demand.sku.height, usedWeight + addWeight, picks);
      if (take > 0) picks.pop();
      if (best.totalH === targetH) return;
    }
  }
  dfs(0, targetH, 0, []);
  return best.totalH > 0 ? best : null;
}

function buildColumn(baseDemand, pool, dims, usedWeightSoFar, preferredSkuId = null, allowMixing = true) {
  const baseSku = baseDemand.sku;
  const maxBase = Math.min(baseDemand.remaining, Math.floor(dims.height / baseSku.height));
  if (maxBase <= 0) return null;
  let best = null;
  for (let baseCount = maxBase; baseCount >= 1; baseCount--) {
    const tempPool = pool; // alias (not a clone); isolation comes from cloneDemand(tempPool) in the snapshot below
    const baseHeight = baseCount * baseSku.height;
    const baseWeight = baseCount * baseSku.weight;
    if (usedWeightSoFar + baseWeight > dims.maxWeight) continue;
    baseDemand.remaining -= baseCount;
    const layers = [{ skuId: baseSku.id, skuName: baseSku.name, skuCode: baseSku.sku, color: baseSku.color, unitHeight: baseSku.height, count: baseCount }];
    let totalHeight = baseHeight, totalWeight = baseWeight;
    const remainH = dims.height - totalHeight;
    const budget = dims.maxWeight - usedWeightSoFar - totalWeight;
    if (remainH > 0 && allowMixing) {
      let fillPool = tempPool;
      if (preferredSkuId) { const pref = tempPool.filter(d => d.skuId === preferredSkuId && d.remaining > 0); if (pref.length) fillPool = pref; }
      let fill = exactFillHeight(remainH, fillPool, budget);
      if ((!fill || !fill.picks.length) && preferredSkuId) fill = exactFillHeight(remainH, tempPool, budget);
      if (fill && fill.picks.length) {
        fill.picks.forEach(pick => {
          pick.demand.remaining -= pick.count;
          layers.push({ skuId: pick.demand.sku.id, skuName: pick.demand.sku.name, skuCode: pick.demand.sku.sku, color: pick.demand.sku.color, unitHeight: pick.demand.sku.height, count: pick.count });
          totalHeight += pick.count * pick.demand.sku.height;
          totalWeight += pick.count * pick.demand.sku.weight;
        });
      }
    }
    const waste = dims.height - totalHeight;
    const mixedPenalty = layers.length > 1 ? 20 : 0;
    const preferredBonus = preferredSkuId && layers.some(l => l.skuId === preferredSkuId) ? 100 : 0;
    const score = totalHeight * 1000 - waste * 200 - mixedPenalty + preferredBonus;
    if (!best || score > best.score) {
      best = { score, totalHeight, totalWeight, layers: layers.map(l => ({ ...l })), remainingSnapshot: cloneDemand(tempPool) };
    }
    pool.forEach((d, i) => { d.remaining = tempPool[i].remaining; });
    baseDemand.remaining += baseCount;
  }
  if (!best) return null;
  pool.forEach((d, i) => { d.remaining = best.remainingSnapshot[i].remaining; });
  return {
    colWidth: baseSku.width, skuId: best.layers[0].skuId, skuName: best.layers[0].skuName,
    skuCode: best.layers[0].skuCode, color: best.layers[0].color, unitHeight: best.layers[0].unitHeight,
    totalHeight: best.totalHeight, totalWeight: best.totalWeight,
    stackCount: best.layers.reduce((s, l) => s + l.count, 0), layers: best.layers,
    mixed: best.layers.length > 1,
  };
}

function buildRow(demand, dims, curX, trailerUsedWeight, variant, preferredSkuId = null, allowMixing = true) {
  const ordered = sortDemandPriority(demand.filter(d => d.remaining > 0 && d.sku.length <= dims.length - curX && d.sku.width <= dims.width && d.sku.height <= dims.height), variant);
  if (!ordered.length) return null;
  let dominant = preferredSkuId ? ordered.find(d => d.skuId === preferredSkuId) : null;
  if (!dominant) dominant = ordered[0];
  const rowLength = dominant.sku.length;
  const working = cloneDemand(sortDemandPriority(demand.filter(d => d.remaining > 0 && d.sku.length === rowLength && d.sku.width <= dims.width), variant));
  const row = { posFromFront: curX, rowLength, rowWidthUsed: 0, columns: [], totalUnits: 0, totalWeight: 0 };
  let widthLeft = dims.width, posY = 0;
  while (widthLeft > 0) {
    let candidates = sortDemandPriority(working.filter(d => d.remaining > 0 && d.sku.width <= widthLeft), variant);
    if (preferredSkuId && candidates.some(d => d.skuId === preferredSkuId)) {
      candidates = [...candidates.filter(d => d.skuId === preferredSkuId), ...candidates.filter(d => d.skuId !== preferredSkuId)];
    }
    if (!candidates.length) break;
    let placed = false;
    for (const candidate of candidates) {
      const footprintPool = sortDemandPriority(working.filter(d => d.remaining > 0 && d.sku.length === candidate.sku.length && d.sku.width === candidate.sku.width), variant);
      const col = buildColumn(candidate, footprintPool, dims, trailerUsedWeight + row.totalWeight, preferredSkuId, allowMixing);
      if (!col) continue;
      row.columns.push({ ...col, posY, label: col.layers.map(l => `${l.unitHeight}"`).join(" + ") });
      row.rowWidthUsed += col.colWidth;
      row.totalUnits += col.stackCount;
      row.totalWeight += col.totalWeight;
      posY += col.colWidth;
      widthLeft -= col.colWidth;
      placed = true;
      break;
    }
    if (!placed) break;
  }
  if (!row.columns.length) return null;
  const workingById = new Map(working.map(d => [d.skuId, d.remaining]));
  const mergedDemand = cloneDemand(demand).map(d => ({ ...d, remaining: workingById.has(d.skuId) ? workingById.get(d.skuId) : d.remaining }));
  return { row, updatedDemand: mergedDemand };
}

function buildTrailerStats(rows, dims) {
  const usedLength = rows.reduce((s, r) => s + r.rowLength, 0);
  const usedFloorArea = rows.reduce((s, r) => s + r.rowLength * r.rowWidthUsed, 0);
  const usedWeight = rows.reduce((s, r) => s + r.totalWeight, 0);
  const totalStacks = rows.reduce((s, r) => s + r.columns.length, 0);
  const totalUnits = rows.reduce((s, r) => s + r.totalUnits, 0);
  const mixedStacks = rows.reduce((s, r) => s + r.columns.filter(c => c.mixed).length, 0);
  const skuBreakdown = {}, stackPatterns = {};
  rows.forEach(row => row.columns.forEach(col => {
    col.layers.forEach(layer => {
      if (!skuBreakdown[layer.skuId]) skuBreakdown[layer.skuId] = { skuId: layer.skuId, name: layer.skuName, sku: layer.skuCode, color: layer.color, pieces: 0 };
      skuBreakdown[layer.skuId].pieces += layer.count;
    });
    const key = col.layers.map(l => `${l.unitHeight}"-${l.count}`).join("|");
    if (!stackPatterns[key]) stackPatterns[key] = { key, stacks: 0, lines: col.layers.map(l => `${l.unitHeight}" - ${l.count}`) };
    stackPatterns[key].stacks += 1;
  }));
  return { rows, usedLength, usedFloorArea, usedWeight, totalStacks, totalUnits, mixedStacks, skuBreakdown, stackPatterns: Object.values(stackPatterns) };
}

function getFullTrailerThreshold(sku, dims) {
  const cols = Math.floor(dims.width / sku.width);
  const rows = Math.floor(dims.length / sku.length);
  return cols * rows * Math.max(1, Math.floor(dims.height / sku.height));
}

function calcLoading(cart, skus, dims, variant = 0) {
  if (!cart.length) return { trailers: [], warnings: [], totalWeight: 0, utilization: 0, totalUnits: 0, totalStacks: 0, mixedStacks: 0 };
  let demand = buildDemand(cart, skus, dims);
  const warnings = [], floorArea = dims.length * dims.width, trailers = [];
  cart.forEach(c => {
    const sku = skus.find(s => s.id === c.skuId);
    if (!sku) return;
    if (sku.length <= 0 || sku.width <= 0 || sku.height <= 0) {
      warnings.push(`"${sku.name}" has invalid dimensions and will be skipped.`);
    } else if (sku.length > dims.length || sku.width > dims.width || sku.height > dims.height) {
      warnings.push(`"${sku.name}" exceeds trailer dimensions and will be skipped.`);
    }
  });
  while (demand.some(d => d.remaining > 0)) {
    demand = sortDemandPriority(demand, variant);
    const highLead = demand.find(d => d.remaining > 0 && d.remaining >= getFullTrailerThreshold(d.sku, dims));
    const preferredSkuId = highLead ? highLead.skuId : (demand.find(d => d.remaining > 0)?.skuId ?? null);
    const rows = [];
    let curX = 0, usedWeight = 0, progress = true;

    // Pass 1: same-size stacks only — no mixing allowed
    while (progress && curX < dims.length) {
      progress = false;
      let best = buildRow(demand, dims, curX, usedWeight, variant, preferredSkuId, false);
      if (!best) best = buildRow(demand, dims, curX, usedWeight, variant, null, false);
      if (!best) break;
      rows.push(best.row);
      demand = best.updatedDemand;
      curX += best.row.rowLength;
      usedWeight += best.row.totalWeight;
      progress = true;
    }

    // Pass 2: consolidate remainders into vertically-packed mixed columns
    // Groups by SKU length, then greedily fills each column to max height before starting the next
    {
      const remainByLength = {};
      demand.filter(d => d.remaining > 0).forEach(d => {
        if (!remainByLength[d.sku.length]) remainByLength[d.sku.length] = [];
        remainByLength[d.sku.length].push(d);
      });
      for (const [lenKey, group] of Object.entries(remainByLength)) {
        const rowLength = Number(lenKey);
        if (curX + rowLength > dims.length) continue;
        const row = { posFromFront: curX, rowLength, rowWidthUsed: 0, columns: [], totalUnits: 0, totalWeight: 0 };
        let widthLeft = dims.width, posY = 0;
        while (widthLeft > 0 && group.some(d => d.remaining > 0)) {
          const candidates = group.filter(d => d.remaining > 0 && d.sku.width <= widthLeft);
          if (!candidates.length) break;
          const colWidth = Math.min(...candidates.map(d => d.sku.width));
          const fill = exactFillHeight(dims.height, candidates, dims.maxWeight - usedWeight - row.totalWeight);
          if (!fill || !fill.picks.length) break;
          const layers = fill.picks.map(pick => {
            pick.demand.remaining -= pick.count;
            return { skuId: pick.demand.sku.id, skuName: pick.demand.sku.name, skuCode: pick.demand.sku.sku, color: pick.demand.sku.color, unitHeight: pick.demand.sku.height, count: pick.count };
          });
          const col = {
            colWidth, posY, skuId: layers[0].skuId, skuName: layers[0].skuName, skuCode: layers[0].skuCode,
            color: layers[0].color, unitHeight: layers[0].unitHeight, totalHeight: fill.totalH, totalWeight: fill.totalWeight,
            stackCount: layers.reduce((s, l) => s + l.count, 0), layers, mixed: layers.length > 1,
            label: layers.map(l => `${l.unitHeight}"`).join(" + "),
          };
          row.columns.push(col);
          row.rowWidthUsed += colWidth; row.totalUnits += col.stackCount; row.totalWeight += col.totalWeight;
          posY += colWidth; widthLeft -= colWidth;
        }
        if (!row.columns.length) continue;
        rows.push(row);
        curX += rowLength;
        usedWeight += row.totalWeight;
      }
    }

    if (!rows.length) { const stuck = demand.find(d => d.remaining > 0); if (stuck) warnings.push(`Could not place remaining ${stuck.sku.name}.`); break; }
    trailers.push(buildTrailerStats(rows, dims));
  }
  // Auto-downsize last trailer to 26ft Box Truck if it fits and a larger trailer was selected
  const boxTruckDims = TRAILER_TYPES["26ft Box Truck"];
  if (trailers.length > 1 && dims.length > boxTruckDims.length) {
    const last = trailers[trailers.length - 1];
    if (last.usedLength <= boxTruckDims.length && last.usedWeight <= boxTruckDims.maxWeight) {
      last.downsizedType = "26ft Box Truck";
      last.downsizedDims = boxTruckDims;
    }
  }

  const totalWeight = cart.reduce((s, c) => { const sku = skus.find(x => x.id === c.skuId); return s + (sku ? c.qty * sku.weight : 0); }, 0);
  const totalUnits = cart.reduce((s, c) => s + c.qty, 0);
  const totalStacks = trailers.reduce((s, t) => s + t.totalStacks, 0);
  const mixedStacks = trailers.reduce((s, t) => s + t.mixedStacks, 0);
  const utilization = trailers.length ? trailers.reduce((s, t) => s + t.usedFloorArea / floorArea, 0) / trailers.length : 0;
  trailers.forEach((t, i) => {
    if (t.usedWeight / dims.maxWeight > 0.95) warnings.push(`Trailer ${i + 1} is near weight limit.`);
  });
  return { trailers, warnings, totalWeight, utilization, totalUnits, totalStacks, mixedStacks };
}

function buildPackingList(trailer) {
  return {
    pieces: Object.values(trailer.skuBreakdown).sort((a, b) => a.name.localeCompare(b.name)),
    stacks: [...trailer.stackPatterns].sort((a, b) => b.stacks - a.stacks),
  };
}

function getStackPrintLines(col) {
  if (Array.isArray(col.layers) && col.layers.length) return col.layers.map(l => `${l.unitHeight}"-${l.count}`);
  if (col.unitHeight && col.stackCount) return [`${col.unitHeight}"-${col.stackCount}`];
  if (col.label) return [String(col.label)];
  return [""];
}

function buildTopViewSVG(trailer, dims) {
  const SC = SVG_TOPVIEW_SCALE, W = 10, PAD = 64;
  const pxL = dims.length * SC, pxW = dims.width * SC;
  const runnerH = state.runnerHeight;
  const svgW = pxL + W * 2 + PAD, svgH = pxW + W * 2 + 40 + (runnerH > 0 ? 16 : 0);
  const rects = [];
  (trailer.rows || []).forEach((row, ri) => row.columns.forEach((col, ci) => {
    rects.push({ key: `${ri}-${ci}`, x: W + row.posFromFront * SC, y: W + col.posY * SC, w: row.rowLength * SC, h: col.colWidth * SC, col });
  }));
  const usedX = W + (trailer.usedLength || 0) * SC;
  const emptyW = pxL - (trailer.usedLength || 0) * SC;

  let svg = `<svg width="${svgW}" height="${svgH}" style="display:block;font-family:DM Sans,Arial,sans-serif">`;
  svg += `<defs><pattern id="ep" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="10" stroke="#CBD5E1" stroke-width="2"/></pattern></defs>`;
  svg += `<rect x="${W}" y="${W}" width="${pxL}" height="${pxW}" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2" rx="3"/>`;
  if (emptyW > 2) svg += `<rect x="${usedX}" y="${W}" width="${emptyW}" height="${pxW}" fill="url(#ep)"/>`;
  if (emptyW > 40) {
    const remainingInches = dims.length - (trailer.usedLength || 0);
    const remainingFeet = Math.floor(remainingInches / 12);
    const remainingInchesRem = remainingInches % 12;
    const remLabel = remainingFeet > 0 ? `${remainingFeet}' ${remainingInchesRem}" remaining` : `${remainingInchesRem}" remaining`;
    const remFs = Math.max(8, Math.min(11, emptyW / (remLabel.length * 7)));
    svg += `<text x="${usedX + emptyW / 2}" y="${W + pxW / 2 + 4}" text-anchor="middle" fill="#94A3B8" font-size="${remFs}" font-weight="700">${remLabel}</text>`;
  }
  (trailer.rows || []).forEach((row, ri) => {
    svg += `<line x1="${W + row.posFromFront * SC}" y1="${W}" x2="${W + row.posFromFront * SC}" y2="${W + pxW}" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>`;
  });
  rects.forEach(r => {
    svg += `<rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="${r.col.color}55" stroke="${r.col.color}" stroke-width="1.5" rx="2"/>`;
    if (runnerH > 0) svg += `<rect x="${r.x}" y="${r.y + r.h - 3}" width="${r.w}" height="3" fill="#92400E" opacity="0.7" rx="1"/>`;
    if (r.w > 22 && r.h > 16) {
      const fs = Math.min(11, r.w / 3, r.h / 2.2);
      const label = r.col.mixed ? "MIX" : `${r.col.unitHeight}"`;
      svg += `<text x="${r.x + r.w / 2}" y="${r.y + r.h / 2 + 4}" text-anchor="middle" fill="${r.col.color}" font-size="${fs}" font-weight="800">${label}</text>`;
    }
  });
  (trailer.rows || []).forEach((row, ri) => {
    svg += `<text x="${W + row.posFromFront * SC + row.rowLength * SC / 2}" y="${W - 3}" text-anchor="middle" fill="#64748B" font-size="9" font-weight="700">R${ri + 1}</text>`;
  });
  svg += `<rect x="${W}" y="${W}" width="${pxL}" height="${pxW}" fill="none" stroke="#475569" stroke-width="2" rx="3"/>`;
  svg += `<rect x="${W - 7}" y="${W}" width="7" height="${pxW}" fill="#F1F5F9" stroke="#D97706" stroke-width="1.5"/>`;
  svg += `<polygon points="${W + pxL + 7},${W + pxW / 2 - 7} ${W + pxL + 22},${W + pxW / 2} ${W + pxL + 7},${W + pxW / 2 + 7}" fill="#D97706" opacity="0.9"/>`;
  svg += `<text x="${W + pxL + 26}" y="${W + pxW / 2 + 5}" fill="#D97706" font-size="10" font-weight="800">FRONT</text>`;
  svg += `<text x="${W + 3}" y="${W + pxW + 22}" fill="#64748B" font-size="10" font-weight="700">REAR</text>`;
  svg += `<text x="${W + pxL / 2}" y="${W + pxW + 22}" text-anchor="middle" fill="#94A3B8" font-size="10">${dims.length}"L × ${dims.width}"W</text>`;
  if (runnerH > 0) svg += `<rect x="${W}" y="${W + pxW + 30}" width="16" height="4" fill="#92400E" opacity="0.7" rx="1"/><text x="${W + 20}" y="${W + pxW + 34}" fill="#92400E" font-size="10" font-weight="700">▬ ${runnerH}" runners</text>`;
  svg += `</svg>`;
  return svg;
}

function buildPrintSvg(trailer, dims) {
  const BASE_SC = SVG_PRINT_SCALE, M = 20, MAX_PRINT_WIDTH = SVG_PRINT_MAX_WIDTH;
  const rawPxL = dims.length * BASE_SC;
  const fitScale = (rawPxL + M * 2 + 78) > MAX_PRINT_WIDTH ? MAX_PRINT_WIDTH / (rawPxL + M * 2 + 78) : 1;
  const SC = BASE_SC * fitScale;
  const pxL = dims.length * SC, pxW = dims.width * SC;
  const printRunnerH = state.runnerHeight;
  const svgW = pxL + M * 2 + 78, svgH = pxW + M * 2 + 64 + (printRunnerH > 0 ? 20 : 0);
  const rects = [];
  (trailer.rows || []).forEach((row, ri) => row.columns.forEach((col, ci) => {
    rects.push({ x: M + row.posFromFront * SC, y: M + col.posY * SC, w: row.rowLength * SC, h: col.colWidth * SC, lines: getStackPrintLines(col) });
  }));
  const renderLines = r => {
    const lines = r.lines.filter(Boolean);
    if (!lines.length) return "";
    const baseSize = Math.max(9, Math.min(18, r.h / (lines.length + 0.4), r.w / 6.3));
    const lineGap = baseSize + 2;
    const startY = r.y + r.h / 2 - ((lines.length - 1) * lineGap) / 2;
    return lines.map((line, i) => `<text x="${r.x + r.w / 2}" y="${startY + i * lineGap}" text-anchor="middle" dominant-baseline="middle" font-size="${baseSize}" font-weight="700" fill="#111827">${line}</text>`).join("");
  };
  const printUsedPxL = (trailer.usedLength || 0) * SC;
  const printEmptyW = pxL - printUsedPxL;
  let svg = `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,sans-serif;display:block;">`;
  svg += `<defs><pattern id="pep" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="10" stroke="#CBD5E1" stroke-width="2"/></pattern></defs>`;
  svg += `<rect x="${M}" y="${M}" width="${pxL}" height="${pxW}" fill="#ffffff" stroke="#475569" stroke-width="2.5" rx="4"/>`;
  if (printEmptyW > 2) svg += `<rect x="${M + printUsedPxL}" y="${M}" width="${printEmptyW}" height="${pxW}" fill="url(#pep)"/>`;
  if (printEmptyW > 40) {
    const remainingInches = dims.length - (trailer.usedLength || 0);
    const remainingFeet = Math.floor(remainingInches / 12);
    const remainingInchesRem = remainingInches % 12;
    const remLabel = remainingFeet > 0 ? `${remainingFeet}' ${remainingInchesRem}" remaining` : `${remainingInchesRem}" remaining`;
    const remFs = Math.max(10, Math.min(15, printEmptyW / (remLabel.length * 7)));
    svg += `<text x="${M + printUsedPxL + printEmptyW / 2}" y="${M + pxW / 2 + 5}" text-anchor="middle" fill="#94A3B8" font-size="${remFs}" font-weight="700">${remLabel}</text>`;
  }
  rects.forEach(r => {
    svg += `<g><rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="#ffffff" stroke="#334155" stroke-width="1.8" rx="2"/>${renderLines(r)}`;
    if (printRunnerH > 0) svg += `<rect x="${r.x}" y="${r.y + r.h - 4}" width="${r.w}" height="4" fill="#92400E" opacity="0.7" rx="1"/>`;
    svg += `</g>`;
  });
  (trailer.rows || []).forEach((row, ri) => {
    svg += `<text x="${M + row.posFromFront * SC + row.rowLength * SC / 2}" y="${M - 4}" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">R${ri + 1}</text>`;
  });
  svg += `<text x="${M}" y="${M + pxW + 26}" font-size="15" font-weight="700" fill="#475569">REAR</text>`;
  svg += `<text x="${M + pxL + 8}" y="${M + pxW / 2 + 5}" font-size="14" font-weight="700" fill="#D97706">FRONT</text>`;
  svg += `<text x="${M + pxL / 2}" y="${M + pxW + 26}" text-anchor="middle" font-size="14" fill="#64748B">${dims.length}"L × ${dims.width}"W</text>`;
  if (printRunnerH > 0) svg += `<rect x="${M}" y="${M + pxW + 40}" width="18" height="5" fill="#92400E" opacity="0.7" rx="1"/><text x="${M + 24}" y="${M + pxW + 45}" font-size="13" font-weight="700" fill="#92400E">▬ ${printRunnerH}" runners under all stacks</text>`;
  svg += `</svg>`;
  return svg;
}

function printPackingSlip(trailer, dims, trailerType, trailerNumber, packList) {
  const win = window.open("", "_blank", "width=1600,height=1100");
  if (!win) return;
  const piecesHtml = packList.pieces.map(item => `<tr><td style="padding:8px 10px;border:1px solid #cbd5e1;font-weight:700;"><span style="display:inline-block;width:10px;height:10px;background:${item.color};border-radius:2px;margin-right:8px;"></span>${item.name}</td><td style="padding:8px 10px;border:1px solid #cbd5e1;text-align:center;">${item.pieces}</td></tr>`).join("");
  const stackHtml = packList.stacks.map(s => `<tr><td style="padding:8px 10px;border:1px solid #cbd5e1;text-align:center;font-weight:700;">${s.stacks}</td><td style="padding:8px 10px;border:1px solid #cbd5e1;">${s.lines.join(" · ")}</td></tr>`).join("");
  const runnerNotice = state.runnerHeight > 0 ? `<div style="margin:6px 0 10px;padding:8px 12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;font-weight:700;font-size:13px;color:#92400E;">⚠ RUNNERS: ${state.runnerHeight}" dunnage required under all stacks</div>` : '';
  win.document.write(`<html><head><title>Packing Slip - Trailer ${trailerNumber}</title><style>@page{size:landscape;margin:0.22in}body{font-family:Arial,sans-serif;color:#0f172a;margin:0;padding:0}.page{padding:10px 12px}h1{margin:0 0 4px 0;font-size:24px}h2{margin:0 0 8px 0;font-size:15px;color:#475569}.box{border:1px solid #cbd5e1;border-radius:12px;padding:9px;margin-bottom:9px}table{width:100%;border-collapse:collapse;font-size:13px}.note{font-size:11px;color:#64748b;margin-bottom:6px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}</style></head><body><div class="page"><h1>Trailer ${trailerNumber} Packing Slip</h1><h2>${trailerType}</h2>${runnerNotice}<div class="box" style="overflow:hidden"><div style="font-weight:700;margin-bottom:6px">TRAILER LAYOUT</div><div class="note">Layout scaled to fit fully on one page.</div><div style="width:100%;overflow:hidden">${buildPrintSvg(trailer, dims)}</div></div><div class="grid"><div class="box"><div style="font-weight:700;margin-bottom:8px">PIECES</div><table><thead><tr><th style="padding:8px 10px;border:1px solid #cbd5e1;text-align:left;background:#f8fafc">Item</th><th style="padding:8px 10px;border:1px solid #cbd5e1;text-align:center;background:#f8fafc">Pieces</th></tr></thead><tbody>${piecesHtml}</tbody></table></div><div class="box"><div style="font-weight:700;margin-bottom:8px">STACK BREAKDOWN</div><table><thead><tr><th style="padding:8px 10px;border:1px solid #cbd5e1;text-align:center;background:#f8fafc">Stacks</th><th style="padding:8px 10px;border:1px solid #cbd5e1;text-align:left;background:#f8fafc">Sizes in stack</th></tr></thead><tbody>${stackHtml}</tbody></table></div></div></div><script>window.onload=function(){setTimeout(function(){window.print()},250)};<\/script></body></html>`);
  win.document.close();
}

// HTML HELPERS
// ═══════════════════════════════════════════════════════════════
function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else if (v === true) el.setAttribute(k, '');
    else if (v !== false && v != null) el.setAttribute(k, v);
  }
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  });
  return el;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// STATE HELPERS
// ═══════════════════════════════════════════════════════════════
function getDims() { return TRAILER_TYPES[state.trailerType]; }
function getSortedSkus() { return sortByHeight(state.skus); }

async function fetchSkusFromApi() {
  const res = await fetch('/api/load-builder-skus');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

async function addSku(payload) {
  state.skuMutating = true; render();
  try {
    await fetch('/api/load-builder-skus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to save SKU. Changes are not persisted.'; }
  state.skuMutating = false; render();
}

async function updateSku(id, payload) {
  state.skuMutating = true; render();
  try {
    await fetch(`/api/load-builder-skus/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to update SKU. Changes are not persisted.'; }
  state.skuMutating = false; render();
}

async function deleteSku(id) {
  state.skuMutating = true; render();
  try {
    await fetch(`/api/load-builder-skus/${id}`, { method: 'DELETE' });
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.cart = state.cart.filter(x => x.skuId !== id);
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to delete SKU.'; }
  state.skuMutating = false; render();
}

async function resetSkus() {
  state.skuMutating = true; render();
  try {
    await fetch('/api/load-builder-skus/all', { method: 'DELETE' });
    await fetch('/api/load-builder-skus/seed', { method: 'POST' });
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.cart = [];
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to reset SKUs.'; }
  state.skuMutating = false; render();
}

async function importSkus(rows) {
  state.skuMutating = true; render();
  try {
    for (const row of rows) {
      await fetch('/api/load-builder-skus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(row) });
    }
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to import SKUs.'; }
  state.skuMutating = false; render();
}

async function initSkus() {
  state.skuLoading = true; render();
  try {
    let skus = await fetchSkusFromApi();
    if (skus.length === 0) {
      await fetch('/api/load-builder-skus/seed', { method: 'POST' });
      skus = await fetchSkusFromApi();
    }
    state.skus = sortByHeight(skus);
  } catch (_) {
    state.skus = loadSaved();
    state.skuError = 'Using local data — API unavailable.';
  }
  state.skuLoading = false; render();
}

function getResult() {
  const dims = getDims();
  const effectiveDims = state.runnerHeight > 0 ? { ...dims, height: dims.height - state.runnerHeight } : dims;
  const sorted = getSortedSkus();
  const autoResult = calcLoading(state.cart, sorted, effectiveDims, state.variant);
  if (!Object.keys(state.manualRowsByTrailer).length) return autoResult;
  const trailers = autoResult.trailers.map((t, i) => {
    const manualRows = state.manualRowsByTrailer[i];
    return manualRows ? buildTrailerStats(manualRows, dims) : t;
  });
  return { ...autoResult, trailers };
}

function getFiltered() {
  const sorted = getSortedSkus();
  const q = state.search.trim().toLowerCase();
  return !q ? sorted : sorted.filter(s => s.name.toLowerCase().includes(q) || s.sku.toLowerCase().includes(q));
}

  if (result.warnings.length) {
    const warnCard = h('div', { className: 'card mb-18', style: { border: '2px solid var(--warn-border)', background: 'var(--warn-bg)' } });
    warnCard.appendChild(h('div', { style: { color: 'var(--warn-text)', fontWeight: 800, fontSize: '13px', marginBottom: '8px' } }, '⚠ LOAD WARNINGS'));
    result.warnings.forEach(w => warnCard.appendChild(h('div', { style: { color: 'var(--warn-text-dark)', fontSize: '14px', marginBottom: '4px' } }, `• ${w}`)));
    cont.appendChild(warnCard);
  }

  // Trailers
  result.trailers.forEach((trailer, ti) => {
    const trailerLabel = trailer.downsizedType || state.trailerType;
    const trailerDims = trailer.downsizedDims || dims;
    const usedPct = Math.min(100, (trailer.usedLength / trailerDims.length) * 100);
    const floorPct = Math.min(100, (trailer.usedFloorArea / (trailerDims.length * trailerDims.width)) * 100);
    const packList = buildPackingList(trailer);
    const isManual = !!state.manualRowsByTrailer[ti];

    const tCard = h('div', { className: 'card mb-18', style: { border: '1px solid var(--border)' } });

    // Trailer header
    const tHdr = h('div', { className: 'flex justify-between items-center mb-10 flex-wrap gap-10', style: { alignItems: 'flex-start' } });
    const tLeft = h('div');
    const titleRow = h('div', { className: 'flex items-center gap-10 flex-wrap' });
    titleRow.appendChild(h('span', { style: { color: 'var(--accent)', fontWeight: 900, fontSize: '18px' } }, `TRAILER ${ti + 1} — ${trailerLabel}`));
    titleRow.appendChild(h('span', { className: 'tag', style: { background: 'var(--blue-bg)', color: 'var(--blue-dark)' } }, `${trailer.totalStacks} stacks · ${trailer.totalUnits} pcs`));
    if (trailer.downsizedType) titleRow.appendChild(h('span', { className: 'tag', style: { background: '#FEF3C7', color: '#92400E' } }, 'AUTO-DOWNSIZED'));
    if (isManual) titleRow.appendChild(h('span', { className: 'tag', style: { background: 'var(--teal-bg)', color: 'var(--green-dark)' } }, 'CUSTOMIZED'));
    tLeft.appendChild(titleRow);
    const remainingIn = trailerDims.length - (trailer.usedLength || 0);
    const remLabel = remainingIn === 0 ? 'FULL' : remainingIn >= 12
      ? `${Math.floor(remainingIn / 12)}' ${remainingIn % 12}" remaining`
      : `${remainingIn}" remaining`;
    const subtitleEl = h('div', { style: { fontSize: '14px', color: 'var(--text-muted)', fontWeight: 600, marginTop: '6px' } });
    const runnerPart = state.runnerHeight > 0 ? ` · <span style="color:#92400E">${state.runnerHeight}" runners</span>` : '';
    subtitleEl.innerHTML = `${Math.round(usedPct)}% length · ${Math.round(floorPct)}% floor · ${trailer.mixedStacks} mixed stacks · <span style="color:#D97706">${remLabel}</span>${runnerPart}`;
    tLeft.appendChild(subtitleEl);
    tHdr.appendChild(tLeft);

    const tRight = h('div', { className: 'flex gap-8 flex-wrap' });
    tRight.appendChild(h('button', { className: 'btn btn-blue-light', onClick: () => { state.editorTrailer = state.editorTrailer === ti ? null : ti; render(); } }, state.editorTrailer === ti ? 'CLOSE CUSTOMIZE' : 'CUSTOMIZE TRAILER'));
    if (isManual) tRight.appendChild(h('button', { className: 'btn btn-red-light', onClick: () => { delete state.manualRowsByTrailer[ti]; render(); } }, 'CLEAR CUSTOM'));
    tRight.appendChild(h('button', { className: 'btn btn-teal', onClick: () => printPackingSlip(trailer, trailerDims, trailerLabel, ti + 1, packList) }, 'PRINT PACKING SLIP'));
    tHdr.appendChild(tRight);
    tCard.appendChild(tHdr);

    // Progress bars
    const progGrid = h('div', { className: 'progress-grid mb-14' });
    [["LENGTH USED", usedPct, "var(--teal)"], ["FLOOR USED", floorPct, "var(--blue)"]].forEach(([label, pct, color]) => {
      const wrap = h('div');
      wrap.appendChild(h('div', { style: { fontSize: '12px', color: 'var(--text-faint)', marginBottom: '6px', fontWeight: 700 } }, label));
      const track = h('div', { className: 'progress-track' });
      track.appendChild(h('div', { className: 'progress-fill', style: { background: color, width: `${Math.min(100, pct)}%` } }));
      wrap.appendChild(track);
      progGrid.appendChild(wrap);
    });
    tCard.appendChild(progGrid);

    // SVG layout
    const layoutPanel = h('div', { className: 'panel' });
    layoutPanel.appendChild(h('div', { className: 'panel-title' }, 'TRAILER LAYOUT'));
    const svgWrap = h('div', { className: 'svg-wrap', innerHTML: buildTopViewSVG(trailer, trailerDims) });
    layoutPanel.appendChild(svgWrap);
    tCard.appendChild(layoutPanel);

    // Editor
    if (state.editorTrailer === ti) {
      tCard.appendChild(renderTrailerEditor(trailer, ti, sorted));
    }

    // Packing list
    const packPanel = h('div', { className: 'panel' });
    packPanel.appendChild(h('div', { className: 'panel-title' }, 'PACKING LIST'));
    const packGrid = h('div', { className: 'pack-grid' });
    packList.pieces.forEach(item => {
      const pill = h('div', { style: { background: 'var(--surface)', border: '1px solid var(--border-light)', borderRadius: 'var(--radius)', padding: '10px 14px', fontSize: '15px', fontWeight: 700, color: 'var(--text-mid)', display: 'flex', alignItems: 'center', gap: '10px' } });
      pill.appendChild(h('div', { style: { width: '12px', height: '12px', background: item.color, borderRadius: '3px' } }));
      pill.appendChild(document.createTextNode(`${item.pieces} pcs — ${item.name}`));
      packGrid.appendChild(pill);
    });
    packPanel.appendChild(packGrid);

    const stackTitle = h('div', { className: 'panel-title', style: { marginTop: '14px' } }, 'STACK BREAKDOWN');
    packPanel.appendChild(stackTitle);
    const stackGrid = h('div', { className: 'stack-grid' });
    packList.stacks.forEach(s => {
      const box = h('div', { style: { background: 'var(--surface)', border: '1px solid var(--border-light)', borderRadius: 'var(--radius)', padding: '10px 14px', fontSize: '14px', color: 'var(--text-mid)' } });
      box.appendChild(h('div', { style: { fontWeight: 800 } }, `${s.stacks} stack${s.stacks > 1 ? 's' : ''}`));
      box.appendChild(h('div', { style: { marginTop: '4px' } }, s.lines.join(' · ')));
      stackGrid.appendChild(box);
    });
    packPanel.appendChild(stackGrid);
    tCard.appendChild(packPanel);

    // Trailer totals
    const totalsPanel = h('div', { className: 'panel' });
    totalsPanel.appendChild(h('div', { className: 'panel-title' }, 'TRAILER TOTALS'));
    Object.values(trailer.skuBreakdown).forEach(entry => {
      const row = h('div', { className: 'flex items-center gap-8', style: { fontSize: '14px', color: 'var(--text-mid)', padding: '6px 0', borderBottom: '1px solid var(--border-light)' } });
      row.appendChild(h('div', { style: { width: '10px', height: '10px', background: entry.color, borderRadius: '2px' } }));
      row.appendChild(h('span', { style: { flex: 1 } }, `${entry.name} (${entry.sku})`));
      row.appendChild(h('span', { style: { fontWeight: 700 } }, `${entry.pieces} pcs`));
      totalsPanel.appendChild(row);
    });
    tCard.appendChild(totalsPanel);

    cont.appendChild(tCard);
  });
}

// ═══════════════════════════════════════════════════════════════
// MANUAL TRAILER EDITOR
// ═══════════════════════════════════════════════════════════════
let editorRows = [];

function renderTrailerEditor(trailer, ti, skuLib) {
  editorRows = (trailer.rows || []).map(row => ({
    skuId: row.columns?.[0]?.layers?.[0]?.skuId || row.columns?.[0]?.skuId || skuLib[0]?.id,
    length: row.rowLength,
    columns: row.columns.map(col => ({
      width: col.colWidth,
      layers: col.layers.map(l => ({ skuId: l.skuId, count: l.count })),
    })),
  }));

  function rebuildEditor() {
    const box = document.getElementById('editor-' + ti);
    if (!box) return;
    box.innerHTML = '';
    renderEditorContent(box, ti, skuLib);
  }

  const box = h('div', { className: 'card editor-box', id: 'editor-' + ti });
  renderEditorContent(box, ti, skuLib);
  return box;
}

function renderEditorContent(box, ti, skuLib) {
  const hdr = h('div', { className: 'flex justify-between gap-10 flex-wrap mb-12' });
  hdr.appendChild(h('div', { style: { fontWeight: 800, color: 'var(--blue-dark)' } }, `TRAILER ${ti + 1} CUSTOMIZE`));
  const hdrBtns = h('div', { className: 'flex gap-8 flex-wrap' });
  hdrBtns.appendChild(h('button', { className: 'btn btn-white', style: { borderColor: 'var(--blue-border)', color: 'var(--blue-dark)' }, onClick: () => {
    const sku = skuLib[0]; if (!sku) return;
    editorRows.push({ skuId: sku.id, length: sku.length, columns: [{ width: sku.width, layers: [{ skuId: sku.id, count: 1 }] }] });
    const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
  } }, '+ ADD ROW'));
  hdrBtns.appendChild(h('button', { className: 'btn btn-blue', onClick: () => applyEditorRows(ti, skuLib) }, 'APPLY'));
  hdrBtns.appendChild(h('button', { className: 'btn btn-white', onClick: () => { state.editorTrailer = null; render(); } }, 'CLOSE'));
  hdr.appendChild(hdrBtns);
  box.appendChild(hdr);

  const rowsContainer = h('div', { style: { display: 'grid', gap: '12px' } });
  editorRows.forEach((row, ri) => {
    const rowEl = h('div', { className: 'editor-row' });
    const rowHdr = h('div', { className: 'flex gap-8 items-center flex-wrap mb-10' });
    rowHdr.appendChild(h('strong', {}, `Row ${ri + 1}`));

    const sel = h('select', { className: 'inp', value: String(row.skuId), style: { width: '220px', padding: '8px 10px' }, onChange: e => {
      const sku = skuLib.find(s => s.id === +e.target.value); if (!sku) return;
      editorRows[ri].skuId = sku.id; editorRows[ri].length = sku.length;
      editorRows[ri].columns.forEach(c => c.width = sku.width);
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } });
    skuLib.forEach(s => { const opt = h('option', { value: String(s.id) }, s.name); if (s.id === row.skuId) opt.selected = true; sel.appendChild(opt); });
    rowHdr.appendChild(sel);

    rowHdr.appendChild(h('button', { className: 'btn btn-white', onClick: () => {
      if (ri > 0) { [editorRows[ri], editorRows[ri-1]] = [editorRows[ri-1], editorRows[ri]]; }
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } }, '↑'));
    rowHdr.appendChild(h('button', { className: 'btn btn-white', onClick: () => {
      if (ri < editorRows.length - 1) { [editorRows[ri], editorRows[ri+1]] = [editorRows[ri+1], editorRows[ri]]; }
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } }, '↓'));
    rowHdr.appendChild(h('button', { className: 'btn btn-teal-light', onClick: () => {
      const baseSku = skuLib.find(s => s.id === row.skuId) || skuLib[0]; if (!baseSku) return;
      editorRows[ri].columns.push({ width: baseSku.width, layers: [{ skuId: baseSku.id, count: 1 }] });
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } }, '+ COL'));
    rowHdr.appendChild(h('button', { className: 'btn btn-red-light', onClick: () => {
      editorRows.splice(ri, 1);
      const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
    } }, 'DEL ROW'));
    rowEl.appendChild(rowHdr);

    const colsGrid = h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '10px' } });
    row.columns.forEach((col, ci) => {
      const colEl = h('div', { className: 'editor-col' });
      const colHdr = h('div', { className: 'flex justify-between mb-10' });
      colHdr.appendChild(h('strong', {}, `Col ${ci + 1}`));
      colHdr.appendChild(h('button', { className: 'btn btn-red-light', style: { padding: '6px 12px' }, onClick: () => {
        editorRows[ri].columns.splice(ci, 1);
        const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
      } }, 'DEL'));
      colEl.appendChild(colHdr);

      col.layers.forEach((layer, li) => {
        const layerRow = h('div', { className: 'editor-layer-grid' });
        const lSel = h('select', { className: 'inp', style: { padding: '8px 10px' }, onChange: e => {
          editorRows[ri].columns[ci].layers[li].skuId = +e.target.value;
        } });
        skuLib.forEach(s => { const opt = h('option', { value: String(s.id) }, s.name); if (s.id === layer.skuId) opt.selected = true; lSel.appendChild(opt); });
        layerRow.appendChild(lSel);
        layerRow.appendChild(h('input', { type: 'number', min: '0', className: 'inp', value: String(layer.count), style: { padding: '8px 10px' }, onChange: e => {
          editorRows[ri].columns[ci].layers[li].count = Math.max(0, parseInt(e.target.value, 10) || 0);
        } }));
        layerRow.appendChild(h('button', { className: 'btn btn-red-light', style: { padding: '6px 8px' }, onClick: () => {
          editorRows[ri].columns[ci].layers.splice(li, 1);
          const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
        } }, '×'));
        colEl.appendChild(layerRow);
      });

      colEl.appendChild(h('button', { className: 'btn', style: { background: 'var(--surface)', color: 'var(--blue-dark)', borderColor: 'var(--blue-border)' }, onClick: () => {
        const sku = skuLib[0]; if (!sku) return;
        editorRows[ri].columns[ci].layers.push({ skuId: sku.id, count: 1 });
        const box = document.getElementById('editor-' + ti); box.innerHTML = ''; renderEditorContent(box, ti, skuLib);
      } }, '+ LAYER'));
      colsGrid.appendChild(colEl);
    });
    rowEl.appendChild(colsGrid);
    rowsContainer.appendChild(rowEl);
  });
  box.appendChild(rowsContainer);
}

function applyEditorRows(ti, skuLib) {
  const rebuiltRows = [];
  let posFromFront = 0;
  editorRows.forEach(row => {
    const baseSku = skuLib.find(s => s.id === row.skuId);
    if (!baseSku || !row.columns.length) return;
    let posY = 0;
    const cols = row.columns.map(col => {
      const layers = col.layers.map(l => {
        const sku = skuLib.find(s => s.id === l.skuId);
        if (!sku || l.count <= 0) return null;
        return { skuId: sku.id, skuName: sku.name, skuCode: sku.sku, color: sku.color, unitHeight: sku.height, count: l.count };
      }).filter(Boolean);
      if (!layers.length) return null;
      const totalHeight = layers.reduce((s, l) => s + l.unitHeight * l.count, 0);
      const totalWeight = layers.reduce((s, l) => { const sku = skuLib.find(x => x.id === l.skuId); return s + (sku ? sku.weight * l.count : 0); }, 0);
      const stackCount = layers.reduce((s, l) => s + l.count, 0);
      const built = { posY, colWidth: col.width || baseSku.width, skuId: layers[0].skuId, skuName: layers[0].skuName, skuCode: layers[0].skuCode, color: layers[0].color, unitHeight: layers[0].unitHeight, totalHeight, totalWeight, stackCount, layers, mixed: layers.length > 1, label: layers.map(l => `${l.unitHeight}"`).join(" + ") };
      posY += built.colWidth;
      return built;
    }).filter(Boolean);
    if (!cols.length) return;
    rebuiltRows.push({ posFromFront, rowLength: row.length || baseSku.length, rowWidthUsed: cols.reduce((s, c) => s + c.colWidth, 0), columns: cols, totalUnits: cols.reduce((s, c) => s + c.stackCount, 0), totalWeight: cols.reduce((s, c) => s + c.totalWeight, 0) });
    posFromFront += row.length || baseSku.length;
  });
  state.manualRowsByTrailer[ti] = rebuiltRows;
  state.editorTrailer = null;
  render();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initSkus();
</script>
