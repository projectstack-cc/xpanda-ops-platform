<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<title>Load Builder — xPanda Logistics</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="/assets/img/favicon.png" sizes="any">
<link rel="apple-touch-icon" href="/assets/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="logistics-shared.css">
<style>
  :root {
    --border: #CBD5E1;
    --border-light: #E2E8F0;
    --text-mid: #334155;
    --text-faint: #64748B;
    --text-ghost: #94A3B8;
    --accent: #D97706;
    --accent-light: #FED7AA;
    --blue: #2563EB;
    --blue-dark: #1D4ED8;
    --blue-bg: #EFF6FF;
    --blue-border: #BFDBFE;
    --teal: #0F766E;
    --teal-bg: #ECFDF5;
    --teal-border: #A7F3D0;
    --green: #059669;
    --green-dark: #166534;
    --purple: #7C3AED;
    --red: #DC2626;
    --red-dark: #B91C1C;
    --red-bg: #FEF2F2;
    --red-border: #FECACA;
    --warn-bg: #FFFBEB;
    --warn-border: #FCD34D;
    --warn-text: #B45309;
    --warn-text-dark: #78350F;
    --radius: 10px;
    --radius-lg: 14px;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  :root[data-theme="dark"] {
    --border: #2d3142;
    --border-light: #232634;
    --text-mid: #cbd5e1;
    --text-faint: #94a3b8;
    --text-ghost: #6b7280;
    --accent: #f59e0b;
    --accent-light: #78350f;
    --blue: #60a5fa;
    --blue-dark: #93c5fd;
    --blue-bg: rgba(59, 130, 246, .14);
    --blue-border: #3b5380;
    --teal: #2dd4bf;
    --teal-bg: rgba(20, 184, 166, .14);
    --teal-border: #115e59;
    --green: #34d399;
    --green-dark: #6ee7b7;
    --purple: #a78bfa;
    --red: #f87171;
    --red-dark: #fca5a5;
    --red-bg: rgba(239, 68, 68, .14);
    --red-border: #7f1d1d;
    --warn-bg: rgba(245, 158, 11, .14);
    --warn-border: #b45309;
    --warn-text: #fcd34d;
    --warn-text-dark: #fde68a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .logistics-back-link { display: none; }

  .lb-tab-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Buttons */
  .btn {
    padding: 10px 16px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    border-radius: var(--radius);
    border: 1px solid;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }

  .btn-dark { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-white { background: var(--surface); color: var(--text-mid); border-color: var(--border); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-blue { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }
  .btn-blue-light { background: var(--blue-bg); color: var(--blue-dark); border-color: var(--blue-border); }
  .btn-teal { background: var(--teal); color: #fff; border-color: var(--teal); }
  .btn-teal-light { background: var(--teal-bg); color: var(--green-dark); border-color: var(--teal-border); }
  .btn-red-light { background: var(--red-bg); color: var(--red-dark); border-color: var(--red-border); }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: 0 2px 10px rgba(15,23,42,0.04);
  }

  /* Inputs */
  .inp {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: var(--font);
    font-size: 15px;
    border-radius: var(--radius);
    width: 100%;
  }
  .inp:focus { outline: 2px solid var(--blue); outline-offset: -1px; }

  /* Grid SKU cards */
  .sku-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
    gap: 14px;
    margin-bottom: 22px;
  }

  .sku-card { transition: border-color 0.2s, box-shadow 0.2s; }
  .sku-card:hover { box-shadow: 0 4px 16px rgba(15,23,42,0.08); }

  /* Tag label */
  .tag {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    display: inline-block;
  }

  /* Progress bar */
  .progress-track { background: var(--border-light); height: 8px; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }

  /* Stat card */
  .stat-card { border-top-width: 4px; border-top-style: solid; }
  .stat-card .stat-label { font-size: 12px; color: var(--text-faint); font-weight: 700; margin-bottom: 8px; }
  .stat-card .stat-value { font-size: 28px; font-weight: 900; font-family: var(--mono); }

  /* Inner panels */
  .panel {
    background: var(--bg);
    border: 1px solid var(--border-light);
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .panel-title { color: var(--text-faint); font-size: 12px; font-weight: 800; margin-bottom: 8px; letter-spacing: 0.5px; }

  /* Flex utilities */
  .flex { display: flex; }
  .flex-wrap { flex-wrap: wrap; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .gap-10 { gap: 10px; }
  .gap-12 { gap: 12px; }
  .gap-14 { gap: 14px; }
  .mb-10 { margin-bottom: 10px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-14 { margin-bottom: 14px; }
  .mb-18 { margin-bottom: 18px; }
  .mb-20 { margin-bottom: 20px; }
  .mt-14 { margin-top: 14px; }

  .color-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }

  /* Qty stepper */
  .qty-input {
    width: 72px;
    text-align: center;
    background: #fff;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    padding: 8px 4px;
    border-radius: var(--radius);
    border-width: 2px;
    border-style: solid;
  }

  /* Editor */
  .editor-box {
    border: 2px solid var(--blue-border);
    background: var(--blue-bg);
    margin-top: 12px;
  }

  .editor-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
  }

  .editor-col {
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 10px;
  }

  .editor-layer-grid {
    display: grid;
    grid-template-columns: 1fr 80px 40px;
    gap: 6px;
    margin-bottom: 6px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Form grid */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full-width { grid-column: 1 / -1; }

  .form-label { font-size: 13px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }

  /* Packing list grid */
  .pack-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }

  .stack-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 8px;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 12px;
  }

  .progress-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Sku library list */
  .sku-list { display: flex; flex-direction: column; gap: 10px; }

  /* Categorized SKU list */
  .sku-category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius) var(--radius) 0 0;
    cursor: pointer;
    font-weight: 800;
    font-size: 13px;
    color: var(--text-mid);
    user-select: none;
    margin-top: 8px;
  }
  .sku-category-header:first-child { margin-top: 0; }
  .sku-category-body {
    border: 1px solid var(--border-light);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    background: var(--surface);
    margin-bottom: 2px;
  }
  .load-builder-app .sku-parent-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border-light);
  }
  .load-builder-app .sku-parent-header:hover {
    background: rgba(0,0,0,0.02);
  }
  .load-builder-app .btn-chevron {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-ghost);
    padding: 0 4px;
    flex-shrink: 0;
    line-height: 1;
  }
  .load-builder-app .btn-chevron:hover {
    color: var(--text-muted);
  }
  .sku-row {
    display: grid;
    grid-template-columns: 16px 78px 1fr 110px 72px 136px;
    align-items: center;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border-light);
    font-size: 14px;
    gap: 10px;
    transition: background 0.1s;
    border-left: 3px solid transparent;
  }
  .sku-row:last-child { border-bottom: none; }
  .sku-row:hover { background: rgba(0,0,0,0.018); }
  .sku-row .sku-actions { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
  .qty-input-sm {
    width: 54px;
    text-align: center;
    background: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    padding: 4px 4px;
    border-radius: 8px;
    border: 2px solid;
  }
  .sku-row-manage {
    display: grid;
    grid-template-columns: 16px 78px 1fr 110px 80px auto;
    align-items: center;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border-light);
    font-size: 14px;
    gap: 10px;
    transition: background 0.1s;
  }
  .sku-row-manage:last-child { border-bottom: none; }
  .sku-row-manage:hover { background: rgba(0,0,0,0.018); }
  .sku-row-manage .sku-row-btns { display: flex; gap: 5px; justify-content: flex-end; }
  @media (max-width: 600px) {
    .sku-row { grid-template-columns: 16px 60px 1fr 110px; }
    .sku-row .sku-dim, .sku-row .sku-stack { display: none; }
    .sku-row-manage { grid-template-columns: 16px 60px 1fr auto; }
    .sku-row-manage .sku-dim, .sku-row-manage .sku-cat-tag { display: none; }
  }

  /* Master-detail SKU picker (Load tab) */
  .skp-md { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 22px; }
  .skp-rail { flex: 0 0 172px; display: flex; flex-direction: column; gap: 2px; }
  .skp-rail-item { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 8px 10px; border-radius: var(--radius); border: 1px solid transparent; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-mid); user-select: none; }
  .skp-rail-item:hover { background: var(--bg); }
  .skp-rail-item.active { background: var(--surface); border-color: var(--border-light); font-weight: 800; }
  .skp-rail-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .skp-rail-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .skp-rail-count { color: var(--text-ghost); font-size: 12px; font-weight: 700; }
  .skp-rail-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .skp-detail { flex: 1; min-width: 0; }
  .skp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(184px, 1fr)); gap: 10px; align-content: start; max-height: 46vh; overflow-y: auto; border: 1px solid var(--border-light); border-radius: var(--radius); padding: 10px; }
  .lb-opt-label { color: var(--accent); font-weight: 800; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
  .skp-actionbar { margin-top: 18px; }
  .skp-card { border: 1px solid var(--border-light); border-left: 3px solid transparent; background: var(--surface); padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; min-width: 0; transition: background 0.1s; }
  .skp-card-top { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .skp-card-code { font-family: var(--mono); font-size: 12px; color: var(--text-faint); font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .skp-card-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .skp-card-meta { font-family: var(--mono); font-size: 12px; color: var(--text-ghost); }
  .skp-card-foot { margin-top: 2px; }
  .skp-card .skp-actions { display: flex; align-items: center; gap: 5px; }
  .skp-subgroup-label { grid-column: 1 / -1; font-size: 12px; font-weight: 800; color: var(--text-muted); padding: 8px 2px 2px; border-bottom: 1px solid var(--border-light); margin-top: 4px; }
  .skp-empty { color: var(--text-faint); font-size: 14px; padding: 24px 4px; }
  @media (max-width: 700px) {
    .skp-md { flex-direction: column; }
    .skp-rail { flex: none; flex-direction: row; flex-wrap: wrap; }
  }

  .calc-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }

  /* SVG container */
  .svg-wrap { position: relative; overflow-x: auto; }

  @media (max-width: 600px) {
    .container { padding: 16px 10px; }
    .form-grid { grid-template-columns: 1fr; }
    .progress-grid { grid-template-columns: 1fr; }
    .calc-btn-grid { grid-template-columns: 1fr; }
  }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="/logistics/bol-editor.js"></script>
<script src="/logistics/bol-compose.js"></script>
</head>
<body>

<script src="/logistics/logistics-header.js"></script>
<script>
document.getElementById('logistics-page-title').textContent = 'Load Builder';
document.getElementById('logistics-page-subtitle').textContent = 'Load planning and truck configuration';
</script>

<div class="container">
  <div id="headerTabs" class="lb-tab-nav"></div>
  <div id="tabLoad" class="tab-content active"></div>
  <div id="tabSkus" class="tab-content"></div>
  <div id="tabResults" class="tab-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA & CONSTANTS
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = "foam_trailer_loader_v31";

const SVG_TOPVIEW_SCALE  = 0.85;  // px per inch, screen layout view
const SVG_PRINT_SCALE    = 1.9;   // px per inch, print view (before fit-scaling)
const SVG_PRINT_MAX_WIDTH = 1050; // max print SVG width in px (landscape page)

const DEFAULT_SKUS = [
  { id: 1, name: "4in block", sku: "HB-04", length: 48, width: 24, height: 4, weight: 1, notes: "", color: "#D97706", allowRotation: false },
  { id: 2, name: "5in block", sku: "HB-05", length: 48, width: 24, height: 5, weight: 1, notes: "", color: "#0F766E", allowRotation: false },
  { id: 3, name: "6in block", sku: "HB-06", length: 48, width: 24, height: 6, weight: 1, notes: "", color: "#2563EB", allowRotation: false },
  { id: 4, name: "7in block", sku: "HB-07", length: 48, width: 24, height: 7, weight: 1, notes: "", color: "#7C3AED", allowRotation: false },
  { id: 5, name: "8in block", sku: "HB-08", length: 48, width: 24, height: 8, weight: 1, notes: "", color: "#DC2626", allowRotation: false },
  { id: 6, name: "9in block", sku: "HB-09", length: 48, width: 24, height: 9, weight: 1, notes: "", color: "#059669", allowRotation: false },
  { id: 7, name: "10in block", sku: "HB-10", length: 48, width: 24, height: 10, weight: 1, notes: "", color: "#9333EA", allowRotation: false },
  { id: 8, name: "11in block", sku: "HB-11", length: 48, width: 24, height: 11, weight: 1, notes: "", color: "#0891B2", allowRotation: false },
  { id: 9, name: "12in block", sku: "HB-12", length: 48, width: 24, height: 12, weight: 1, notes: "", color: "#CA8A04", allowRotation: false },
  { id: 10, name: "13in block", sku: "HB-13", length: 48, width: 24, height: 13, weight: 1, notes: "", color: "#4F46E5", allowRotation: false },
];

const TRAILER_TYPES = {
  "53ft Standard": { length: 636, width: 98, height: 109, maxWeight: 44000 },
  "48ft Flatbed":  { length: 576, width: 98, height: 108, maxWeight: 44000 },
  "40ft Container": { length: 480, width: 90, height: 102, maxWeight: 55000 },
  "20ft Container": { length: 240, width: 90, height: 86, maxWeight: 44000 },
  "26ft Box Truck": { length: 312, width: 72, height: 108, maxWeight: 28000 },
};

const COLORS = [
  "#D97706","#0F766E","#2563EB","#7C3AED","#DC2626","#059669","#9333EA","#0891B2",
  "#CA8A04","#4F46E5","#EA580C","#16A34A","#0284C7","#BE123C","#A21CAF","#4338CA",
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = {
  skus: [],
  cart: [],
  trailerType: "53ft Standard",
  tab: "load",
  search: "",
  variant: 0,
  showForm: false,
  editId: null,
  formErr: "",
  pasteMode: false,
  pasteText: "",
  pasteErr: "",
  editorTrailer: null,
  manualRowsByTrailer: {},
  form: { name: "", sku: "", length: "", width: "", height: "", weight: "", notes: "", allowRotation: false, bundleQty: 0 },
  skuLoading: true,
  skuError: "",
  skuMutating: false,
  runnerHeight: 0,
  autoDownsize: true,
  forcedTrailers: [],
  forcedMode: false,
  prefillJobId: null,
  prefillJobData: null,
  trailerInvNumbers: {},
  collapsedCategories: {},
  collapsedParentGroups: {},
  bolModal: { open: false, currentPage: 0, trailerCount: 0, trailerData: [], bolError: '', generating: false, generateProgress: [], bolSuccess: null, searchQuery: '', searchResults: [], searchLoading: false, searchConfirm: '' },
  currentSavedLoadId: null,
};

// ═══════════════════════════════════════════════════════════════
// UTILITY FUNCTIONS (identical to React version)
// ═══════════════════════════════════════════════════════════════
function sortByHeight(list) {
  return [...list].sort((a, b) => a.height !== b.height ? a.height - b.height : a.name.localeCompare(b.name));
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr) && arr.length) {
        return sortByHeight(arr.map((s, i) => ({
          id: s.id ?? Date.now() + i, name: s.name ?? "SKU", sku: s.sku ?? "SKU",
          length: +s.length || 0, width: +s.width || 0, height: +s.height || 0,
          weight: +s.weight || 0, notes: s.notes || "", color: s.color || COLORS[i % COLORS.length],
          allowRotation: s.allowRotation === true, bundleQty: +s.bundleQty || 0,
        })));
      }
    }
  } catch (_) {}
  return DEFAULT_SKUS;
}

function toCSV(skus) {
  return ["name,sku,length,width,height,weight,notes,allowRotation,category",
    ...skus.map(s => [s.name, s.sku, s.length, s.width, s.height, s.weight, (s.notes || "").replace(/,/g, ";"), s.allowRotation ? "true" : "false", (s.category || "").replace(/,/g, ";")].join(","))
  ].join("\n");
}

function fromCSV(text, offset) {
  const result = [];
  text.trim().split("\n").forEach((line, i) => {
    if (line.toLowerCase().startsWith("name")) return;
    const p = line.split(",").map(x => x.trim());
    if (p.length < 6) return;
    const [name, sku, length, width, height, weight, notesRaw, rotationRaw, categoryRaw] = p;
    if (!name || isNaN(+length) || isNaN(+width) || isNaN(+height) || isNaN(+weight) || +length <= 0 || +width <= 0 || +height <= 0 || +weight <= 0) return;
    result.push({
      id: Date.now() + offset + i, name, sku: sku || name,
      length: +length, width: +width, height: +height, weight: +weight,
      notes: notesRaw || "", color: COLORS[(offset + i) % COLORS.length],
      allowRotation: rotationRaw ? rotationRaw.toLowerCase() === "true" : false,
      category: categoryRaw || "",
    });
  });
  return result;
}

function cloneDemand(demand) { return demand.map(d => ({ ...d })); }

function sortDemandPriority(demand, variant = 0) {
  return [...demand].sort((a, b) => {
    // Primary: tallest blocks first (shop floor loading order)
    if (b.sku.height !== a.sku.height) return b.sku.height - a.sku.height;
    // Secondary: highest remaining quantity first
    if (b.remaining !== a.remaining) return b.remaining - a.remaining;
    // Tertiary tiebreaker varies by variant so "Recalculate Different" produces distinct results
    const dir = variant % 2 === 0 ? 1 : -1;
    if (b.sku.width !== a.sku.width) return dir * (b.sku.width - a.sku.width);
    if (b.sku.length !== a.sku.length) return dir * (b.sku.length - a.sku.length);
    return a.sku.name.localeCompare(b.sku.name);
  });
}

function buildDemand(cart, skus, dims) {
  return cart.map(c => {
    const sku = skus.find(s => s.id === c.skuId);
    if (!sku) return null;
    if (sku.length <= 0 || sku.width <= 0 || sku.height <= 0) return null;

    // Holey Board: NEVER rotate — always length along trailer, width across, height stacked up.
    if (sku.category === 'Holey Board') {
      if (sku.length > dims.length || sku.width > dims.width || sku.height > dims.height) return null;
      return { skuId: sku.id, sku: { ...sku }, originalQty: c.qty, remaining: c.qty };
    }

    // Non-Holey-Board: try all 6 axis orientations and pick the best fit.
    const orientations = [
      { length: sku.length, width: sku.width,  height: sku.height, label: '' },
      { length: sku.length, width: sku.height, height: sku.width,  label: ' (on side)' },
      { length: sku.width,  width: sku.length, height: sku.height, label: ' (rotated)' },
      { length: sku.width,  width: sku.height, height: sku.length, label: ' (on end)' },
      { length: sku.height, width: sku.length, height: sku.width,  label: ' (stood up)' },
      { length: sku.height, width: sku.width,  height: sku.length, label: ' (stood up rotated)' },
    ];

    let bestOrientation = null;
    let bestScore = -1;

    for (const o of orientations) {
      if (o.length > dims.length || o.width > dims.width || o.height > dims.height) continue;
      const columnsPerRow = Math.floor(dims.width / o.width);
      const rowsPerTrailer = Math.floor(dims.length / o.length);
      const piecesPerStack = Math.floor(dims.height / o.height);
      let effectivePiecesPerStack = piecesPerStack;
      if (sku.bundleQty && sku.bundleQty > 0 && piecesPerStack >= sku.bundleQty) {
        effectivePiecesPerStack = Math.floor(piecesPerStack / sku.bundleQty) * sku.bundleQty;
      }
      const totalPieces = columnsPerRow * rowsPerTrailer * effectivePiecesPerStack;
      if (totalPieces > bestScore) { bestScore = totalPieces; bestOrientation = o; }
    }

    if (!bestOrientation) return null;

    const effectiveSku = { ...sku, length: bestOrientation.length, width: bestOrientation.width, height: bestOrientation.height };
    // Physically-accurate orientation label (derived from result, not permutation index).
    const sortedDims = [sku.length, sku.width, sku.height].sort((a, b) => a - b); // [min, mid, max]
    let physLabel = '';
    if (bestOrientation.height === sortedDims[2]) physLabel = ' (on end)';        // tallest dimension vertical = standing up
    else if (bestOrientation.height === sortedDims[1]) physLabel = ' (on side)';  // middle dimension vertical
    // smallest dimension vertical = lying flat → no label
    if (physLabel) effectiveSku.name = sku.name + physLabel;

    return { skuId: sku.id, sku: effectiveSku, originalQty: c.qty, remaining: c.qty };
  }).filter(Boolean);
}

function exactFillHeight(targetH, candidates, maxWeightBudget, maxSkus = 2) {
  const opts = candidates.filter(d => d.remaining > 0 && d.sku.height <= targetH)
    .map(d => ({ demand: d, maxCount: Math.min(d.remaining, Math.floor(targetH / d.sku.height)) }))
    .filter(x => x.maxCount > 0);
  if (!opts.length) return null;
  let best = { totalH: 0, totalWeight: 0, picks: [] };
  let iterations = 0;
  const LIMIT = 10000;
  function dfs(idx, remainH, usedWeight, picks, skuCount) {
    iterations++;
    if (iterations > LIMIT) return;
    const currentH = targetH - remainH;
    if (currentH > best.totalH || (currentH === best.totalH && picks.length < best.picks.length)) {
      best = { totalH: currentH, totalWeight: usedWeight, picks: picks.map(p => ({ ...p })) };
    }
    if (remainH === 0 || idx >= opts.length) return;
    const opt = opts[idx];
    const maxTake = Math.min(opt.maxCount, Math.floor(remainH / opt.demand.sku.height));
    for (let take = maxTake; take >= 0; take--) {
      const newSkuCount = take > 0 ? skuCount + 1 : skuCount;
      if (newSkuCount > maxSkus) continue;
      const addWeight = take * opt.demand.sku.weight;
      if (usedWeight + addWeight > maxWeightBudget) continue;
      if (take > 0) picks.push({ demand: opt.demand, count: take });
      dfs(idx + 1, remainH - take * opt.demand.sku.height, usedWeight + addWeight, picks, newSkuCount);
      if (take > 0) picks.pop();
      if (best.totalH === targetH) return;
    }
  }
  dfs(0, targetH, 0, [], 0);
  return best.totalH > 0 ? best : null;
}

function mergeLayers(layers) {
  const merged = [];
  for (const layer of layers) {
    const prev = merged.length ? merged[merged.length - 1] : null;
    if (prev && prev.skuId === layer.skuId) {
      prev.count += layer.count;
    } else {
      merged.push({ ...layer });
    }
  }
  return merged;
}

function buildColumn(baseDemand, pool, dims, usedWeightSoFar, preferredSkuId = null, allowMixing = true) {
  const baseSku = baseDemand.sku;
  let maxBase = Math.min(baseDemand.remaining, Math.floor(dims.height / baseSku.height));
  if (baseSku.bundleQty && baseSku.bundleQty > 0 && maxBase >= baseSku.bundleQty) {
    maxBase = Math.floor(maxBase / baseSku.bundleQty) * baseSku.bundleQty;
  }
  if (maxBase <= 0) return null;

  const pureHeight = maxBase * baseSku.height;
  const gap = dims.height - pureHeight;
  // Only mix when the pure stack leaves a gap >= one block height (i.e., supply ran out before filling)
  const shouldMix = false;

  if (!shouldMix) {
    // Pure stack: use maxBase directly, no scoring iteration needed
    const baseHeight = maxBase * baseSku.height;
    const baseWeight = maxBase * baseSku.weight;
    if (usedWeightSoFar + baseWeight > dims.maxWeight) return null;
    baseDemand.remaining -= maxBase;
    const layers = [{ skuId: baseSku.id, skuName: baseSku.name, skuCode: baseSku.sku, color: baseSku.color, unitHeight: baseSku.height, count: maxBase }];
    return {
      colWidth: baseSku.width, skuId: layers[0].skuId, skuName: layers[0].skuName,
      skuCode: layers[0].skuCode, color: layers[0].color, unitHeight: layers[0].unitHeight,
      totalHeight: baseHeight, totalWeight: baseWeight,
      stackCount: maxBase, layers,
      mixed: false,
    };
  }

  // Mixing pass: try different base counts to find best mixed fill
  const minTopOffHeight = baseSku.height * 0.5;
  let best = null;
  for (let baseCount = maxBase; baseCount >= 1; baseCount--) {
    const savedRemaining = pool.map(d => d.remaining);
    const baseHeight = baseCount * baseSku.height;
    const baseWeight = baseCount * baseSku.weight;
    if (usedWeightSoFar + baseWeight > dims.maxWeight) {
      pool.forEach((d, i) => { d.remaining = savedRemaining[i]; });
      continue;
    }
    baseDemand.remaining -= baseCount;
    const layers = [{ skuId: baseSku.id, skuName: baseSku.name, skuCode: baseSku.sku, color: baseSku.color, unitHeight: baseSku.height, count: baseCount }];
    let totalHeight = baseHeight, totalWeight = baseWeight;
    const remainH = dims.height - totalHeight;
    const budget = dims.maxWeight - usedWeightSoFar - totalWeight;
    if (remainH >= baseSku.height) {
      const sizedPool = pool.filter(d => d.sku.height >= minTopOffHeight);
      let fillPool = sizedPool;
      if (preferredSkuId) { const pref = sizedPool.filter(d => d.skuId === preferredSkuId && d.remaining > 0); if (pref.length) fillPool = pref; }
      let fill = exactFillHeight(remainH, fillPool, budget, 1);
      if ((!fill || !fill.picks.length) && preferredSkuId) fill = exactFillHeight(remainH, sizedPool, budget, 1);
      if (fill && fill.picks.length) {
        fill.picks.forEach(pick => {
          pick.demand.remaining -= pick.count;
          layers.push({ skuId: pick.demand.sku.id, skuName: pick.demand.sku.name, skuCode: pick.demand.sku.sku, color: pick.demand.sku.color, unitHeight: pick.demand.sku.height, count: pick.count });
          totalHeight += pick.count * pick.demand.sku.height;
          totalWeight += pick.count * pick.demand.sku.weight;
        });
      }
    }
    const waste = dims.height - totalHeight;
    const mixedPenalty = layers.length > 1 ? 20 : 0;
    const preferredBonus = preferredSkuId && layers.some(l => l.skuId === preferredSkuId) ? 100 : 0;
    const score = totalHeight * 1000 - waste * 200 - mixedPenalty + preferredBonus;
    if (!best || score > best.score) {
      best = { score, totalHeight, totalWeight, layers: layers.map(l => ({ ...l })), remainingSnapshot: pool.map(d => d.remaining) };
    }
    pool.forEach((d, i) => { d.remaining = savedRemaining[i]; });
    baseDemand.remaining += baseCount;
  }
  if (!best) return null;
  pool.forEach((d, i) => { d.remaining = best.remainingSnapshot[i]; });
  const finalLayers = mergeLayers(best.layers);
  return {
    colWidth: baseSku.width, skuId: finalLayers[0].skuId, skuName: finalLayers[0].skuName,
    skuCode: finalLayers[0].skuCode, color: finalLayers[0].color, unitHeight: finalLayers[0].unitHeight,
    totalHeight: best.totalHeight, totalWeight: best.totalWeight,
    stackCount: finalLayers.reduce((s, l) => s + l.count, 0), layers: finalLayers,
    mixed: finalLayers.length > 1,
  };
}

function buildRow(demand, dims, curX, trailerUsedWeight, variant, preferredSkuId = null, allowMixing = true) {
  const ordered = sortDemandPriority(demand.filter(d => d.remaining > 0 && d.sku.length <= dims.length - curX && d.sku.width <= dims.width && d.sku.height <= dims.height), variant);
  if (!ordered.length) return null;
  let dominant = preferredSkuId ? ordered.find(d => d.skuId === preferredSkuId) : null;
  if (!dominant) dominant = ordered[0];
  const rowLength = dominant.sku.length;
  const working = cloneDemand(sortDemandPriority(demand.filter(d => d.remaining > 0 && d.sku.length === rowLength && d.sku.width <= dims.width), variant));
  const row = { posFromFront: curX, rowLength, rowWidthUsed: 0, columns: [], totalUnits: 0, totalWeight: 0 };
  let widthLeft = dims.width, posY = 0;
  while (widthLeft > 0) {
    let candidates = sortDemandPriority(working.filter(d => d.remaining > 0 && d.sku.width <= widthLeft), variant);
    if (preferredSkuId && candidates.some(d => d.skuId === preferredSkuId)) {
      candidates = [...candidates.filter(d => d.skuId === preferredSkuId), ...candidates.filter(d => d.skuId !== preferredSkuId)];
    }
    if (!candidates.length) break;
    let placed = false;
    for (const candidate of candidates) {
      const footprintPool = sortDemandPriority(working.filter(d => d.remaining > 0 && d.sku.length === candidate.sku.length && d.sku.width === candidate.sku.width), variant);
      const col = buildColumn(candidate, footprintPool, dims, trailerUsedWeight + row.totalWeight, preferredSkuId, allowMixing);
      if (!col) continue;
      row.columns.push({ ...col, posY, label: col.layers.map(l => `${l.unitHeight}"`).join(" + ") });
      row.rowWidthUsed += col.colWidth;
      row.totalUnits += col.stackCount;
      row.totalWeight += col.totalWeight;
      posY += col.colWidth;
      widthLeft -= col.colWidth;
      placed = true;
      break;
    }
    if (!placed) break;
  }
  if (!row.columns.length) return null;
  const workingById = new Map(working.map(d => [d.skuId, d.remaining]));
  const mergedDemand = cloneDemand(demand).map(d => ({ ...d, remaining: workingById.has(d.skuId) ? workingById.get(d.skuId) : d.remaining }));
  return { row, updatedDemand: mergedDemand };
}

function buildTrailerStats(rows, dims) {
  const usedLength = rows.reduce((s, r) => s + r.rowLength, 0);
  const usedFloorArea = rows.reduce((s, r) => s + r.rowLength * r.rowWidthUsed, 0);
  const usedWeight = rows.reduce((s, r) => s + r.totalWeight, 0);
  const totalStacks = rows.reduce((s, r) => s + r.columns.length, 0);
  const totalUnits = rows.reduce((s, r) => s + r.totalUnits, 0);
  const mixedStacks = rows.reduce((s, r) => s + r.columns.filter(c => c.mixed).length, 0);
  const skuBreakdown = {}, stackPatterns = {};
  rows.forEach(row => row.columns.forEach(col => {
    col.layers.forEach(layer => {
      if (!skuBreakdown[layer.skuId]) skuBreakdown[layer.skuId] = { skuId: layer.skuId, name: layer.skuName, sku: layer.skuCode, color: layer.color, pieces: 0 };
      skuBreakdown[layer.skuId].pieces += layer.count;
    });
    const key = col.layers.map(l => `${l.unitHeight}"-${l.count}`).join("|");
    if (!stackPatterns[key]) stackPatterns[key] = { key, stacks: 0, lines: col.layers.map(l => `${l.unitHeight}" - ${l.count}`) };
    stackPatterns[key].stacks += 1;
  }));
  return { rows, usedLength, usedFloorArea, usedWeight, totalStacks, totalUnits, mixedStacks, skuBreakdown, stackPatterns: Object.values(stackPatterns) };
}

function getFullTrailerThreshold(sku, dims) {
  const cols = Math.floor(dims.width / sku.width);
  const rows = Math.floor(dims.length / sku.length);
  return cols * rows * Math.max(1, Math.floor(dims.height / sku.height));
}

function calcLoading(cart, skus, dims, variant = 0, options = {}) {
  if (!cart.length) return { trailers: [], warnings: [], totalWeight: 0, utilization: 0, totalUnits: 0, totalStacks: 0, mixedStacks: 0 };
  let demand = buildDemand(cart, skus, dims);
  const warnings = [], floorArea = dims.length * dims.width, trailers = [];
  cart.forEach(c => {
    const sku = skus.find(s => s.id === c.skuId);
    if (!sku) return;
    if (sku.length <= 0 || sku.width <= 0 || sku.height <= 0) {
      warnings.push(`"${sku.name}" has invalid dimensions and will be skipped.`);
    } else if (!demand.some(d => d.skuId === sku.id)) {
      warnings.push(`"${sku.name}" exceeds trailer dimensions and will be skipped.`);
    }
  });
  // Build forced trailer queue (empty when forcedMode is off)
  const trailerQueue = [];
  if (state.forcedMode && state.forcedTrailers.length > 0) {
    state.forcedTrailers.forEach(ft => {
      const ftDims = TRAILER_TYPES[ft.type];
      if (!ftDims) return;
      const effective = state.runnerHeight > 0 ? { ...ftDims, height: ftDims.height - state.runnerHeight } : ftDims;
      for (let i = 0; i < ft.count; i++) trailerQueue.push({ type: ft.type, dims: effective });
    });
  }
  let trailerIdx = 0;

  while (demand.some(d => d.remaining > 0)) {
    if (trailers.length >= 20) {
      demand.filter(d => d.remaining > 0).forEach(d => {
        warnings.push(`${d.remaining} pcs of ${d.sku.name} could not be placed (trailer limit reached).`);
      });
      break;
    }
    const forcedEntry = trailerIdx < trailerQueue.length ? trailerQueue[trailerIdx] : null;
    const currentDims = forcedEntry ? forcedEntry.dims : dims;
    trailerIdx++;

    demand = sortDemandPriority(demand, variant);
    const preferredSkuId = demand.find(d => d.remaining > 0)?.skuId ?? null;
    const rows = [];
    let curX = 0, usedWeight = 0, progress = true;

    // Single pass: tallest-first, top-off when a size runs out mid-column
    while (progress && curX < currentDims.length) {
      progress = false;
      let best = buildRow(demand, currentDims, curX, usedWeight, variant, preferredSkuId, true);
      if (!best) best = buildRow(demand, currentDims, curX, usedWeight, variant, null, true);
      if (!best) break;
      rows.push(best.row);
      demand = best.updatedDemand;
      curX += best.row.rowLength;
      usedWeight += best.row.totalWeight;
      progress = true;
    }

    // Pass 2: consolidate remainders into minimum mixed columns
    {
      const remainByLength = {};
      demand.filter(d => d.remaining > 0).forEach(d => {
        if (!remainByLength[d.sku.length]) remainByLength[d.sku.length] = [];
        remainByLength[d.sku.length].push(d);
      });

      for (const [lenKey, group] of Object.entries(remainByLength)) {
        const rowLength = Number(lenKey);
        if (curX + rowLength > currentDims.length) continue;

        const row = { posFromFront: curX, rowLength, rowWidthUsed: 0, columns: [], totalUnits: 0, totalWeight: 0 };
        let widthLeft = currentDims.width, posY = 0;

        while (widthLeft > 0 && group.some(d => d.remaining > 0)) {
          const candidates = group.filter(d => d.remaining > 0 && d.sku.width <= widthLeft);
          if (!candidates.length) break;
          const colWidth = Math.min(...candidates.map(d => d.sku.width));
          if (colWidth > widthLeft) break;

          const totalRemainHeight = candidates.reduce((s, d) => s + d.remaining * d.sku.height, 0);
          const weightBudget = currentDims.maxWeight - usedWeight - row.totalWeight;
          const totalRemainWeight = candidates.reduce((s, d) => s + d.remaining * d.sku.weight, 0);

          let layers;

          if (totalRemainHeight <= currentDims.height && totalRemainWeight <= weightBudget) {
            // Everything fits in one column — stack them all directly, no DFS needed
            layers = candidates.filter(d => d.remaining > 0).map(d => {
              const count = d.remaining;
              d.remaining = 0;
              return { skuId: d.sku.id, skuName: d.sku.name, skuCode: d.sku.sku, color: d.sku.color, unitHeight: d.sku.height, count };
            }).filter(l => l.count > 0);
          } else {
            // Too tall for one column — use exactFillHeight to pack optimally
            const fill = exactFillHeight(currentDims.height, candidates, weightBudget, 2);
            if (!fill || !fill.picks.length) break;
            layers = fill.picks.map(pick => {
              pick.demand.remaining -= pick.count;
              return { skuId: pick.demand.sku.id, skuName: pick.demand.sku.name, skuCode: pick.demand.sku.sku, color: pick.demand.sku.color, unitHeight: pick.demand.sku.height, count: pick.count };
            });
          }

          if (!layers.length) break;
          layers = mergeLayers(layers);

          const totalHeight = layers.reduce((s, l) => s + l.unitHeight * l.count, 0);
          const totalWeight = layers.reduce((s, l) => {
            const sku = candidates.find(d => d.sku.id === l.skuId)?.sku;
            return s + (sku ? sku.weight * l.count : 0);
          }, 0);

          const col = {
            colWidth, posY,
            skuId: layers[0].skuId, skuName: layers[0].skuName, skuCode: layers[0].skuCode,
            color: layers[0].color, unitHeight: layers[0].unitHeight,
            totalHeight, totalWeight,
            stackCount: layers.reduce((s, l) => s + l.count, 0),
            layers, mixed: layers.length > 1,
            label: layers.map(l => `${l.unitHeight}"`).join(" + "),
          };
          row.columns.push(col);
          row.rowWidthUsed += colWidth; row.totalUnits += col.stackCount; row.totalWeight += col.totalWeight;
          posY += colWidth; widthLeft -= colWidth;
        }

        if (!row.columns.length) continue;
        rows.push(row);
        curX += rowLength;
        usedWeight += row.totalWeight;
      }
    }

    if (!rows.length) {
      const canFit = demand.some(d => d.remaining > 0 && d.sku.length <= currentDims.length && d.sku.width <= currentDims.width && d.sku.height <= currentDims.height);
      if (!canFit) {
        demand.filter(d => d.remaining > 0).forEach(d => {
          warnings.push(`Could not place remaining ${d.remaining} pcs of ${d.sku.name}.`);
        });
        break;
      }
      warnings.push(`Some pieces could not be optimally placed. Adding overflow trailer.`);
    }
    const stats = buildTrailerStats(rows, currentDims);
    if (forcedEntry) stats.forcedType = forcedEntry.type;
    trailers.push(stats);
  }
  // Auto-downsize last trailer to 26ft Box Truck — repack using actual box truck dimensions
  if (!options.skipDownsize && state.autoDownsize && !state.forcedMode) {
    const boxTruckDims = TRAILER_TYPES["26ft Box Truck"];
    if (trailers.length >= 1 && dims.length > boxTruckDims.length) {
      const last = trailers[trailers.length - 1];
      const lastTrailerPieces = [];
      last.rows.forEach(row => {
        row.columns.forEach(col => {
          col.layers.forEach(layer => {
            lastTrailerPieces.push({ skuId: layer.skuId, count: layer.count });
          });
        });
      });
      const tempCart = [];
      lastTrailerPieces.forEach(p => {
        const existing = tempCart.find(c => c.skuId === p.skuId);
        if (existing) existing.qty += p.count;
        else tempCart.push({ skuId: p.skuId, qty: p.count });
      });
      const allSkusFit = lastTrailerPieces.every(p => {
        const sku = skus.find(s => s.id === p.skuId);
        if (!sku) return false;
        const a = [sku.length, sku.width, sku.height].sort((x, y) => x - y);
        const b = [boxTruckDims.length, boxTruckDims.width, boxTruckDims.height].sort((x, y) => x - y);
        return a[0] <= b[0] && a[1] <= b[1] && a[2] <= b[2];
      });
      if (allSkusFit && tempCart.length) {
        const boxResult = calcLoading(tempCart, skus, boxTruckDims, variant, { skipDownsize: true });
        if (boxResult && boxResult.trailers.length === 1) {
          const repacked = boxResult.trailers[0];
          trailers[trailers.length - 1] = repacked;
          repacked.downsizedType = "26ft Box Truck";
          repacked.downsizedDims = boxTruckDims;
        }
      }
    }
  }

  const totalWeight = cart.reduce((s, c) => { const sku = skus.find(x => x.id === c.skuId); return s + (sku ? c.qty * sku.weight : 0); }, 0);
  const totalUnits = cart.reduce((s, c) => s + c.qty, 0);
  const totalStacks = trailers.reduce((s, t) => s + t.totalStacks, 0);
  const mixedStacks = trailers.reduce((s, t) => s + t.mixedStacks, 0);
  const utilization = trailers.length ? trailers.reduce((s, t) => s + t.usedFloorArea / floorArea, 0) / trailers.length : 0;
  trailers.forEach((t, i) => {
    if (t.usedWeight / dims.maxWeight > 0.95) warnings.push(`Trailer ${i + 1} is near weight limit.`);
  });
  return { trailers, warnings, totalWeight, utilization, totalUnits, totalStacks, mixedStacks };
}

function buildPackingList(trailer) {
  return {
    pieces: Object.values(trailer.skuBreakdown).sort((a, b) => a.name.localeCompare(b.name)),
    stacks: [...trailer.stackPatterns].sort((a, b) => b.stacks - a.stacks),
  };
}

function getStackPrintLines(col) {
  if (Array.isArray(col.layers) && col.layers.length) return col.layers.map(l => `${l.unitHeight}"-${l.count}`);
  if (col.unitHeight && col.stackCount) return [`${col.unitHeight}"-${col.stackCount}`];
  if (col.label) return [String(col.label)];
  return [""];
}

// ═══════════════════════════════════════════════════════════════
// SVG BUILDERS
// ═══════════════════════════════════════════════════════════════
function buildTopViewSVG(trailer, dims) {
  const SC = SVG_TOPVIEW_SCALE, W = 10, PAD = 64;
  const pxL = dims.length * SC, pxW = dims.width * SC;
  const runnerH = state.runnerHeight;
  const svgW = pxL + W * 2 + PAD, svgH = pxW + W * 2 + 40 + (runnerH > 0 ? 16 : 0);
  const rects = [];
  (trailer.rows || []).forEach((row, ri) => row.columns.forEach((col, ci) => {
    rects.push({ key: `${ri}-${ci}`, x: W + row.posFromFront * SC, y: W + col.posY * SC, w: row.rowLength * SC, h: col.colWidth * SC, col });
  }));
  const usedX = W + (trailer.usedLength || 0) * SC;
  const emptyW = pxL - (trailer.usedLength || 0) * SC;

  let svg = `<svg width="${svgW}" height="${svgH}" style="display:block;font-family:DM Sans,Arial,sans-serif">`;
  svg += `<defs><pattern id="ep" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="10" stroke="#CBD5E1" stroke-width="2"/></pattern></defs>`;
  svg += `<rect x="${W}" y="${W}" width="${pxL}" height="${pxW}" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2" rx="3"/>`;
  if (emptyW > 2) svg += `<rect x="${usedX}" y="${W}" width="${emptyW}" height="${pxW}" fill="url(#ep)"/>`;
  if (emptyW > 40) {
    const remainingInches = dims.length - (trailer.usedLength || 0);
    const remainingFeet = Math.floor(remainingInches / 12);
    const remainingInchesRem = remainingInches % 12;
    const remLabel = remainingFeet > 0 ? `${remainingFeet}' ${remainingInchesRem}" remaining` : `${remainingInchesRem}" remaining`;
    const remFs = Math.max(8, Math.min(11, emptyW / (remLabel.length * 7)));
    svg += `<text x="${usedX + emptyW / 2}" y="${W + pxW / 2 + 4}" text-anchor="middle" fill="#94A3B8" font-size="${remFs}" font-weight="700">${remLabel}</text>`;
  }
  (trailer.rows || []).forEach((row, ri) => {
    svg += `<line x1="${W + row.posFromFront * SC}" y1="${W}" x2="${W + row.posFromFront * SC}" y2="${W + pxW}" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>`;
  });
  rects.forEach(r => {
    svg += `<rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="${r.col.color}55" stroke="${r.col.color}" stroke-width="1.5" rx="2"/>`;
    if (runnerH > 0) svg += `<rect x="${r.x}" y="${r.y + r.h - 3}" width="${r.w}" height="3" fill="#92400E" opacity="0.7" rx="1"/>`;
    if (r.w > 18 && r.h > 12) {
      const stackCount = r.col.stackCount || 0;
      const heightLabel = r.col.mixed ? 'MIX' : `${r.col.unitHeight}"`;
      if (r.h > 30 && stackCount) {
        const fs = Math.min(9, r.w / 4);
        const cfs = Math.min(14, r.w / 2, r.h / 2.5);
        svg += `<text x="${r.x + r.w / 2}" y="${r.y + r.h / 2 - 2}" text-anchor="middle" fill="${r.col.color}" font-size="${fs}" font-weight="600" opacity="0.75">${heightLabel}</text>`;
        svg += `<text x="${r.x + r.w / 2}" y="${r.y + r.h / 2 + 11}" text-anchor="middle" fill="${r.col.color}" font-size="${cfs}" font-weight="800">${stackCount}</text>`;
      } else if (r.w > 22 && r.h > 16) {
        const fs = Math.min(11, r.w / 3, r.h / 2.2);
        const label = stackCount || heightLabel;
        svg += `<text x="${r.x + r.w / 2}" y="${r.y + r.h / 2 + 4}" text-anchor="middle" fill="${r.col.color}" font-size="${fs}" font-weight="800">${label}</text>`;
      }
    }
  });
  (trailer.rows || []).forEach((row, ri) => {
    svg += `<text x="${W + row.posFromFront * SC + row.rowLength * SC / 2}" y="${W - 3}" text-anchor="middle" fill="#64748B" font-size="9" font-weight="700">R${ri + 1}</text>`;
  });
  svg += `<rect x="${W}" y="${W}" width="${pxL}" height="${pxW}" fill="none" stroke="#475569" stroke-width="2" rx="3"/>`;
  svg += `<rect x="${W - 7}" y="${W}" width="7" height="${pxW}" fill="#F1F5F9" stroke="#D97706" stroke-width="1.5"/>`;
  svg += `<polygon points="${W + pxL + 7},${W + pxW / 2 - 7} ${W + pxL + 22},${W + pxW / 2} ${W + pxL + 7},${W + pxW / 2 + 7}" fill="#D97706" opacity="0.9"/>`;
  svg += `<text x="${W + pxL + 26}" y="${W + pxW / 2 + 5}" fill="#D97706" font-size="10" font-weight="800">FRONT</text>`;
  svg += `<text x="${W + 3}" y="${W + pxW + 22}" fill="#64748B" font-size="10" font-weight="700">REAR</text>`;
  svg += `<text x="${W + pxL / 2}" y="${W + pxW + 22}" text-anchor="middle" fill="#94A3B8" font-size="10">${dims.length}"L × ${dims.width}"W</text>`;
  if (runnerH > 0) svg += `<rect x="${W}" y="${W + pxW + 30}" width="16" height="4" fill="#92400E" opacity="0.7" rx="1"/><text x="${W + 20}" y="${W + pxW + 34}" fill="#92400E" font-size="10" font-weight="700">▬ ${runnerH}" runners</text>`;
  svg += `</svg>`;
  return svg;
}

function buildPrintSvg(trailer, dims) {
  const BASE_SC = SVG_PRINT_SCALE, M = 20, MAX_PRINT_WIDTH = SVG_PRINT_MAX_WIDTH;
  const rawPxL = dims.length * BASE_SC;
  const fitScale = (rawPxL + M * 2 + 78) > MAX_PRINT_WIDTH ? MAX_PRINT_WIDTH / (rawPxL + M * 2 + 78) : 1;
  const SC = BASE_SC * fitScale;
  const pxL = dims.length * SC, pxW = dims.width * SC;
  const printRunnerH = state.runnerHeight;
  const svgW = pxL + M * 2 + 78, svgH = pxW + M * 2 + 64 + (printRunnerH > 0 ? 20 : 0);
  const rects = [];
  (trailer.rows || []).forEach((row, ri) => row.columns.forEach((col, ci) => {
    rects.push({ x: M + row.posFromFront * SC, y: M + col.posY * SC, w: row.rowLength * SC, h: col.colWidth * SC, lines: getStackPrintLines(col) });
  }));
  const renderLines = r => {
    const lines = r.lines.filter(Boolean);
    if (!lines.length) return "";
    const baseSize = Math.max(9, Math.min(18, r.h / (lines.length + 0.4), r.w / 6.3));
    const lineGap = baseSize + 2;
    const startY = r.y + r.h / 2 - ((lines.length - 1) * lineGap) / 2;
    return lines.map((line, i) => `<text x="${r.x + r.w / 2}" y="${startY + i * lineGap}" text-anchor="middle" dominant-baseline="middle" font-size="${baseSize}" font-weight="700" fill="#111827">${line}</text>`).join("");
  };
  const printUsedPxL = (trailer.usedLength || 0) * SC;
  const printEmptyW = pxL - printUsedPxL;
  let svg = `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,sans-serif;display:block;">`;
  svg += `<defs><pattern id="pep" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="10" stroke="#CBD5E1" stroke-width="2"/></pattern></defs>`;
  svg += `<rect x="${M}" y="${M}" width="${pxL}" height="${pxW}" fill="#ffffff" stroke="#475569" stroke-width="2.5" rx="4"/>`;
  if (printEmptyW > 2) svg += `<rect x="${M + printUsedPxL}" y="${M}" width="${printEmptyW}" height="${pxW}" fill="url(#pep)"/>`;
  if (printEmptyW > 40) {
    const remainingInches = dims.length - (trailer.usedLength || 0);
    const remainingFeet = Math.floor(remainingInches / 12);
    const remainingInchesRem = remainingInches % 12;
    const remLabel = remainingFeet > 0 ? `${remainingFeet}' ${remainingInchesRem}" remaining` : `${remainingInchesRem}" remaining`;
    const remFs = Math.max(10, Math.min(15, printEmptyW / (remLabel.length * 7)));
    svg += `<text x="${M + printUsedPxL + printEmptyW / 2}" y="${M + pxW / 2 + 5}" text-anchor="middle" fill="#94A3B8" font-size="${remFs}" font-weight="700">${remLabel}</text>`;
  }
  rects.forEach(r => {
    svg += `<g><rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="#ffffff" stroke="#334155" stroke-width="1.8" rx="2"/>${renderLines(r)}`;
    if (printRunnerH > 0) svg += `<rect x="${r.x}" y="${r.y + r.h - 4}" width="${r.w}" height="4" fill="#92400E" opacity="0.7" rx="1"/>`;
    svg += `</g>`;
  });
  (trailer.rows || []).forEach((row, ri) => {
    svg += `<text x="${M + row.posFromFront * SC + row.rowLength * SC / 2}" y="${M - 4}" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">R${ri + 1}</text>`;
  });
  svg += `<text x="${M}" y="${M + pxW + 26}" font-size="15" font-weight="700" fill="#475569">REAR</text>`;
  svg += `<text x="${M + pxL + 8}" y="${M + pxW / 2 + 5}" font-size="14" font-weight="700" fill="#D97706">FRONT</text>`;
  svg += `<text x="${M + pxL / 2}" y="${M + pxW + 26}" text-anchor="middle" font-size="14" fill="#64748B">${dims.length}"L × ${dims.width}"W</text>`;
  if (printRunnerH > 0) svg += `<rect x="${M}" y="${M + pxW + 40}" width="18" height="5" fill="#92400E" opacity="0.7" rx="1"/><text x="${M + 24}" y="${M + pxW + 45}" font-size="13" font-weight="700" fill="#92400E">▬ ${printRunnerH}" runners under all stacks</text>`;
  svg += `</svg>`;
  return svg;
}

function printPackingSlip(trailer, dims, trailerType, trailerNumber, packList, invNumber = '') {

async function buildLoadingDiagramPdfBytes(trailer, dims, trailerType, trailerNumber, packList, invNumber = '') {
  const innerHtml = buildLoadingDiagramInnerHtml(trailer, dims, trailerType, trailerNumber, packList, invNumber);
  const host = document.createElement('div');
  host.style.cssText = 'position:fixed; left:-99999px; top:0; width:1100px; background:#fff; font-family:Arial, sans-serif; color:#0f172a;';
  host.innerHTML = innerHtml;
  document.body.appendChild(host);
  let canvas;
  try {
    canvas = await html2canvas(host, { scale: 2, backgroundColor: '#ffffff', logging: false, useCORS: true });
  } finally {
    document.body.removeChild(host);
  }
  const pngDataUrl = canvas.toDataURL('image/png');
  const pngBytes = await fetch(pngDataUrl).then(r => r.arrayBuffer());
  const { PDFDocument } = PDFLib;
  const doc = await PDFDocument.create();
  const page = doc.addPage([792, 612]); // US Letter landscape (points)
  const pageW = page.getWidth();
  const pageH = page.getHeight();
  const margin = 18;
  const pngImg = await doc.embedPng(pngBytes);
  const maxW = pageW - margin * 2;
  const maxH = pageH - margin * 2;
  const ratio = Math.min(maxW / pngImg.width, maxH / pngImg.height);
  const drawW = pngImg.width * ratio;
  const drawH = pngImg.height * ratio;
  page.drawImage(pngImg, {
    x: (pageW - drawW) / 2,
    y: (pageH - drawH) / 2,
    width: drawW,
    height: drawH,
  });
  return await doc.save();
}

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else if (v === true) el.setAttribute(k, '');
    else if (v !== false && v != null) el.setAttribute(k, v);
  }
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  });
  return el;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getDims() { return TRAILER_TYPES[state.trailerType]; }
function getSortedSkus() { return sortByHeight(state.skus); }

async function fetchSkusFromApi() {
  const res = await api.get('/api/load-builder-skus');
  if (!res.ok) throw new Error(res.error || `HTTP ${res.status}`);
  return res.data;
}

async function addSku(payload) {
  state.skuMutating = true; render();
  try {
    await api.post('/api/load-builder-skus', payload);
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to save SKU. Changes are not persisted.'; }
  state.skuMutating = false; render();
}

async function updateSku(id, payload) {
  state.skuMutating = true; render();
  try {
    await api.put(`/api/load-builder-skus/${id}`, payload);
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to update SKU. Changes are not persisted.'; }
  state.skuMutating = false; render();
}

async function deleteSku(id) {
  state.skuMutating = true; render();
  try {
    await api.del(`/api/load-builder-skus/${id}`);
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.cart = state.cart.filter(x => x.skuId !== id);
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to delete SKU.'; }
  state.skuMutating = false; render();
}

async function resetSkus() {
  state.skuMutating = true; render();
  try {
    await api.del('/api/load-builder-skus/all');
    await api.post('/api/load-builder-skus/seed', null);
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.cart = [];
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to reset SKUs.'; }
  state.skuMutating = false; render();
}

async function importSkus(rows) {
  state.skuMutating = true; render();
  try {
    for (const row of rows) {
      await api.post('/api/load-builder-skus', row);
    }
    state.skus = sortByHeight(await fetchSkusFromApi());
    state.skuError = '';
  } catch (_) { state.skuError = 'Failed to import SKUs.'; }
  state.skuMutating = false; render();
}

async function initSkus() {
  state.skuLoading = true; render();
  try {
    let skus = await fetchSkusFromApi();
    if (skus.length === 0) {
      await api.post('/api/load-builder-skus/seed', null);
      skus = await fetchSkusFromApi();
    }
    state.skus = sortByHeight(skus);
  } catch (_) {
    state.skus = loadSaved();
    state.skuError = 'Using local data — API unavailable.';
  }
  state.skuLoading = false; render();
}

function getResult() {
  const dims = getDims();
  const effectiveDims = state.runnerHeight > 0 ? { ...dims, height: dims.height - state.runnerHeight } : dims;
  const sorted = getSortedSkus();
  const autoResult = calcLoading(state.cart, sorted, effectiveDims, state.variant);
  if (!Object.keys(state.manualRowsByTrailer).length) return autoResult;
  const trailers = autoResult.trailers.map((t, i) => {
    const manualRows = state.manualRowsByTrailer[i];
    return manualRows ? buildTrailerStats(manualRows, dims) : t;
  });
  return { ...autoResult, trailers };
}

function getFiltered() {
  const sorted = getSortedSkus();
  const q = state.search.trim().toLowerCase();
  return !q ? sorted : sorted.filter(s => s.name.toLowerCase().includes(q) || s.sku.toLowerCase().includes(q));
}

function groupByCategory(skus) {
  const groups = {};
  skus.forEach(s => {
    const cat = (s.category || '').trim() || 'Uncategorized';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(s);
  });
  const catKeys = Object.keys(groups).sort((a, b) => {
    if (a === 'Uncategorized') return 1;
    if (b === 'Uncategorized') return -1;
    return a.localeCompare(b);
  });
  return { groups, catKeys };
}

    font-size: 14px;

function renderLoadTab() {
