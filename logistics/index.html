<script>
// ── State ──────────────────────────────────────────────────────────────────
let activeTab       = 'outbound';
let allSilos        = [];
let allBeadTypes    = [];
let allOpenJobs     = [];
let outboundData    = [];
let inboundData     = [];
let outboundCalView = 'list';
let inboundCalView  = 'list';
let outboundCalMonth = new Date();
let inboundCalMonth  = new Date();

const SHIPMENT_STATUS_COLORS = {
  awaiting:    { bg: '#f3f4f6', text: '#374151', border: '#9ca3af' },
  not_started: { bg: '#fef3c7', text: '#92400e', border: '#f59e0b' },
  loading:     { bg: '#dbeafe', text: '#1e40af', border: '#3b82f6' },
  loaded:      { bg: '#d1fae5', text: '#065f46', border: '#10b981' },
  in_transit:  { bg: '#e0e7ff', text: '#3730a3', border: '#6366f1' },
  delivered:   { bg: '#f0fdf4', text: '#166534', border: '#22c55e' },
  cancelled:   { bg: '#f3f4f6', text: '#9ca3af', border: '#d1d5db' },
  scheduled:   { bg: '#f1f5f9', text: '#475569', border: '#94a3b8' },
};
let editingId       = null;
let promptJobId     = null;
let jobPickerFull   = [];

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  setCurrentWeek();
  await Promise.allSettled([loadSilos(), loadBeadTypes(), loadOpenJobs()]);
  await Promise.all([loadOutbound(), loadInbound()]);
  updateStats();

  // Job board → Logistics: pre-fill from ?job_id=
  const params = new URLSearchParams(location.search);
  const preJobId = params.get('job_id');
  if (preJobId) {
    const job = allOpenJobs.find(j => j.id === preJobId);
    if (job) { openModal('outbound'); prefillFromJob(job); }
  }
})();

function setCurrentWeek() {
  const input = document.getElementById('outbound-week-input');
  const now   = new Date();
  const day   = now.getDay(); // 0=Sun
  const diff  = day === 0 ? -6 : 1 - day;
  const mon   = new Date(now);
  mon.setDate(now.getDate() + diff);
  // format YYYY-WNN for week input
  const yr   = mon.getFullYear();
  const wn   = getISOWeek(mon);
  input.value = `${yr}-W${String(wn).padStart(2, '0')}`;
}

function getISOWeek(d) {
  const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  tmp.setUTCDate(tmp.getUTCDate() + 4 - (tmp.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
  return Math.ceil((((tmp - yearStart) / 86400000) + 1) / 7);
}

function weekInputToMonday(val) {
  if (!val) return null;
  // val = "YYYY-Www"
  const [yearStr, weekStr] = val.split('-W');
  const year = parseInt(yearStr, 10);
  const week = parseInt(weekStr, 10);
  const jan4 = new Date(year, 0, 4);
  const dayOfWeek = jan4.getDay() || 7;
  const mon = new Date(jan4);
  mon.setDate(jan4.getDate() - dayOfWeek + 1 + (week - 1) * 7);
  return mon.toISOString().slice(0, 10);
}

// ── Data Loaders ───────────────────────────────────────────────────────────
async function loadSilos() {
  const res  = await fetch('/api/silos');
  const body = await res.json();
  if (body.ok) {
    allSilos = body.data;
    const siloOpts = allSilos.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
    document.getElementById('f-silo-id').innerHTML =
      `<option value="">— no silo (log separately) —</option>${siloOpts}`;
  }
}

async function loadBeadTypes() {
  const res  = await fetch('/api/bead-types');
  const body = await res.json();
  if (body.ok) {
    allBeadTypes = body.data;
    const opts = allBeadTypes.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
    document.getElementById('f-bead-type-id').innerHTML =
      `<option value="">— select type —</option>${opts}`;
  }
}

async function loadOpenJobs() {
  const res  = await fetch('/api/jobs?status=not_started,in_production,done');
  const body = await res.json();
  if (body.ok) {
    allOpenJobs = body.jobs;
    jobPickerFull = body.jobs;
    const opts = allOpenJobs.map(j => {
      const label = `${esc(j.customer)}${j.invoice_number ? ' · ' + esc(j.invoice_number) : ''}`;
      return `<option value="${j.id}">${label}</option>`;
    }).join('');
    document.getElementById('f-job-id').innerHTML =
      `<option value="">— no linked job —</option>${opts}`;
  }
}

async function loadOutbound() {
  const weekVal = outboundCalView === 'calendar' ? '' : document.getElementById('outbound-week-input').value;
  const status  = document.getElementById('outbound-status-filter').value;
  const params  = new URLSearchParams({ direction: 'outbound' });
  if (weekVal) {
    const mon = weekInputToMonday(weekVal);
    if (mon) params.set('week', mon);
  } else {
    params.set('days', outboundCalView === 'calendar' ? '365' : '60');
  }
  if (status) params.set('status', status);

  try {
    const res  = await fetch(`/api/shipments?${params}`);
    const body = await res.json();
    outboundData = body.ok ? body.data : [];
  } catch {
    outboundData = [];
  }
  renderOutbound();
}

async function loadInbound() {
  const status = document.getElementById('inbound-status-filter').value;
  const days   = inboundCalView === 'calendar' ? '365' : document.getElementById('inbound-days-filter').value;
  const params = new URLSearchParams({ direction: 'inbound', days });
  if (status) params.set('status', status);

  try {
    const res  = await fetch(`/api/shipments?${params}`);
    const body = await res.json();
    inboundData = body.ok ? body.data : [];
  } catch {
    inboundData = [];
  }
  renderInbound();
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
  // outbound this week
  const weekVal  = document.getElementById('outbound-week-input').value;
  const mon      = weekVal ? weekInputToMonday(weekVal) : null;
  let weekCount  = 0;
  if (mon) {
    const monD = new Date(mon);
    const sunD = new Date(mon); sunD.setDate(monD.getDate() + 6);
    weekCount  = outboundData.filter(s => {
      const d = new Date(s.ship_date);
      return d >= monD && d <= sunD;
    }).length;
  } else {
    weekCount = outboundData.length;
  }

  const inboundPending = inboundData.filter(s =>
    s.status !== 'delivered' && s.status !== 'cancelled'
  ).length;
  const inTransit = [...outboundData, ...inboundData].filter(s => s.status === 'in_transit').length;
  const delivered = [...outboundData, ...inboundData].filter(s => s.status === 'delivered').length;

  document.getElementById('stat-outbound-week').textContent   = weekCount;
  document.getElementById('stat-inbound-pending').textContent = inboundPending;
  document.getElementById('stat-in-transit').textContent      = inTransit;
  document.getElementById('stat-delivered').textContent       = delivered;
}

// ── Tab Switching ──────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.logistics-main-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.logistics-tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
}

function clearOutboundWeek() {
  document.getElementById('outbound-week-input').value = '';
  loadOutbound();
}

// ── Render Outbound ────────────────────────────────────────────────────────
const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function renderOutbound() {
  const container = document.getElementById('outbound-content');
  if (!outboundData.length) {
    container.innerHTML = `<div style="color:#94a3b8;font-size:14px;padding:20px 0;">No outbound shipments found.</div>`;
    updateStats();
    return;
  }

  // Group by ship_date
  const groups = {};
  for (const s of outboundData) {
    const key = s.ship_date || 'No Date';
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  }

  const sortedDates = Object.keys(groups).sort((a, b) => {
    if (a === 'No Date') return 1;
    if (b === 'No Date') return -1;
    return a < b ? -1 : 1;
  });

  container.innerHTML = sortedDates.map(dateKey => {
    const rows    = groups[dateKey];
    const dayName = dateKey !== 'No Date' ? DAYS[new Date(dateKey + 'T12:00:00').getDay()] : 'No Date';
    const label   = dateKey !== 'No Date'
      ? `${dayName} — ${formatDate(dateKey)}`
      : 'No Date';

    const rowsHtml = rows.map(s => buildOutboundRow(s)).join('');
    return `
      <div class="logistics-day-group">
        <p class="logistics-day-label">${label}</p>
        <div class="logistics-table-wrap">
          <table class="logistics-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Method / Carrier</th>
                <th>Trailer #</th>
                <th>Loads</th>
                <th>BDFT</th>
                <th>BOL #</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  updateStats();
  if (outboundCalView === 'calendar') renderShipmentCalendar('outbound');
}

function buildOutboundRow(s) {
  const linkedJob = allOpenJobs.find(j => j.id === s.job_id);
  const jobLink   = linkedJob
    ? `<a class="logistics-job-link" href="/jobs/?job_id=${linkedJob.id}">Job: ${esc(linkedJob.customer)}${linkedJob.invoice_number ? ' · ' + esc(linkedJob.invoice_number) : ''}</a>`
    : (s.job_id ? `<a class="logistics-job-link" href="/jobs/">Job linked ↗</a>` : '');

  const methodCarrier = [s.method, s.carrier].filter(Boolean).join(' · ');
  const bdft = s.total_bdft ? fmtNum(s.total_bdft) : '—';

  return `<tr onclick="openEdit('${s.id}')">
    <td class="logistics-customer-cell">
      ${esc(s.customer) || '<span style="color:#94a3b8;">—</span>'}
      ${jobLink ? `<br>${jobLink}` : ''}
    </td>
    <td>${esc(methodCarrier) || '—'}</td>
    <td>${esc(s.trailer_number) || '—'}</td>
    <td>${s.load_count || 1}</td>
    <td>${bdft}</td>
    <td>${esc(s.bol_number) || '—'}</td>
    <td>${statusBadge(s.status)}</td>
  </tr>`;
}

// ── Render Inbound ─────────────────────────────────────────────────────────
function renderInbound() {
  const container = document.getElementById('inbound-content');
  if (!inboundData.length) {
    container.innerHTML = `<div style="color:#94a3b8;font-size:14px;padding:20px 0;">No inbound deliveries found.</div>`;
    updateStats();
    return;
  }

  // Scheduled/in-transit at top, then delivered
  const active   = inboundData.filter(s => s.status !== 'delivered' && s.status !== 'cancelled');
  const done     = inboundData.filter(s => s.status === 'delivered' || s.status === 'cancelled');

  const allRows = [...active, ...done];

  container.innerHTML = `
    <div class="logistics-table-wrap">
      <table class="logistics-table">
        <thead>
          <tr>
            <th>Supplier</th>
            <th>Bead Type</th>
            <th>Weight (lbs)</th>
            <th>Ship Date</th>
            <th>Carrier</th>
            <th>BOL #</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>${allRows.map(s => buildInboundRow(s)).join('')}</tbody>
      </table>
    </div>`;

  updateStats();
  if (inboundCalView === 'calendar') renderShipmentCalendar('inbound');
}

function buildInboundRow(s) {
  const beadType = s.bead_type ||
    allBeadTypes.find(t => t.id === s.bead_type_id)?.name || '—';
  const weightStr = s.weight_lbs ? fmtNum(s.weight_lbs) + ' lbs' : '—';

  return `<tr onclick="openEdit('${s.id}')">
    <td class="logistics-customer-cell">${esc(s.customer) || '—'}</td>
    <td>${esc(beadType)}</td>
    <td>${weightStr}</td>
    <td>${s.ship_date ? formatDate(s.ship_date) : '—'}</td>
    <td>${esc(s.carrier) || '—'}</td>
    <td>${esc(s.bol_number) || '—'}</td>
    <td>${statusBadge(s.status)}</td>
  </tr>`;
}

// ── Modal ──────────────────────────────────────────────────────────────────
let currentDirection = 'outbound';

function openModal(direction, prefill) {
  editingId        = null;
  currentDirection = direction || 'outbound';

  clearForm();
  setDirection(currentDirection);
  showError('');

  document.getElementById('modal-title').textContent =
    currentDirection === 'outbound' ? 'New Outbound Shipment' : 'New Inbound Delivery';
  document.getElementById('dir-toggle-wrap').style.display = '';
  document.getElementById('modal-delete-btn').style.display = 'none';
  document.getElementById('modal-save-btn').textContent = 'Save';

  if (prefill) applyPrefill(prefill);

  document.getElementById('shipment-modal').classList.remove('hidden');
}

function openEdit(id) {
  const s = [...outboundData, ...inboundData].find(x => x.id === id);
  if (!s) return;

  editingId        = id;
  currentDirection = s.direction;

  clearForm();
  setDirection(currentDirection, true); // locked

  document.getElementById('modal-title').textContent =
    currentDirection === 'outbound' ? 'Edit Outbound Shipment' : 'Edit Inbound Delivery';
  document.getElementById('dir-toggle-wrap').style.display = 'none';
  document.getElementById('modal-delete-btn').style.display = '';
  document.getElementById('modal-save-btn').textContent = 'Save Changes';
  showError('');

  // Populate
  document.getElementById('f-id').value           = s.id;
  document.getElementById('f-direction').value    = s.direction;
  document.getElementById('f-ship-date').value    = s.ship_date || '';
  document.getElementById('f-status').value       = s.status;
  document.getElementById('f-method').value       = s.method || '';
  document.getElementById('f-carrier').value      = s.carrier || '';
  document.getElementById('f-bol-number').value   = s.bol_number || '';
  document.getElementById('f-notes').value        = s.notes || '';

  if (currentDirection === 'outbound') {
    document.getElementById('f-customer').value       = s.customer || '';
    document.getElementById('f-destination').value    = s.destination || '';
    document.getElementById('f-load-count').value     = s.load_count || 1;
    document.getElementById('f-total-bdft').value     = s.total_bdft || '';
    document.getElementById('f-job-id').value         = s.job_id || '';
    document.getElementById('f-trailer-number').value = s.trailer_number || '';
  } else {
    document.getElementById('f-supplier').value   = s.customer || '';
    document.getElementById('f-origin').value     = s.origin || '';
    document.getElementById('f-weight-lbs').value = s.weight_lbs || '';
    document.getElementById('f-bead-type-id').value = '';
    // match bead type by name
    const bt = allBeadTypes.find(t => t.name === s.bead_type);
    if (bt) document.getElementById('f-bead-type-id').value = bt.id;
    document.getElementById('f-silo-id').value    = '';
  }

  document.getElementById('shipment-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('shipment-modal').classList.add('hidden');
  editingId = null;
}

function clearForm() {
  ['f-ship-date','f-carrier','f-bol-number','f-notes',
   'f-customer','f-destination','f-supplier','f-origin','f-trailer-number'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const lc = document.getElementById('f-load-count'); if (lc) lc.value = 1;
  const bd = document.getElementById('f-total-bdft'); if (bd) bd.value = '';
  const wl = document.getElementById('f-weight-lbs'); if (wl) wl.value = '';
  document.getElementById('f-status').value = 'awaiting';
  document.getElementById('f-method').value = '';
  document.getElementById('f-job-id').value = '';
  document.getElementById('f-bead-type-id').value = '';
  document.getElementById('f-silo-id').value = '';
  document.getElementById('f-id').value = '';
}

function setDirection(dir, locked) {
  currentDirection = dir;
  document.getElementById('f-direction').value = dir;

  document.getElementById('outbound-fields').style.display = dir === 'outbound' ? '' : 'none';
  document.getElementById('inbound-fields').style.display  = dir === 'inbound'  ? '' : 'none';

  const btnOut = document.getElementById('dir-btn-outbound');
  const btnIn  = document.getElementById('dir-btn-inbound');
  btnOut.className = `logistics-dir-btn${dir === 'outbound' ? ' active-outbound' : ''}`;
  btnIn.className  = `logistics-dir-btn${dir === 'inbound'  ? ' active-inbound'  : ''}`;

  if (locked) {
    btnOut.disabled = true;
    btnIn.disabled  = true;
  } else {
    btnOut.disabled = false;
    btnIn.disabled  = false;
  }
}

function onSiloChange() {
  const siloId = document.getElementById('f-silo-id').value;
  document.getElementById('auto-log-wrap').style.display = siloId ? '' : 'none';
}

// ── Save ───────────────────────────────────────────────────────────────────
async function saveShipment() {
  showError('');

  const dir        = document.getElementById('f-direction').value || currentDirection;
  const shipDate   = document.getElementById('f-ship-date').value;
  const status     = document.getElementById('f-status').value;
  const method     = document.getElementById('f-method').value;
  const carrier    = document.getElementById('f-carrier').value.trim();
  const bolNumber  = document.getElementById('f-bol-number').value.trim();
  const notes      = document.getElementById('f-notes').value.trim();

  const payload = { direction: dir, ship_date: shipDate,
    status, method, carrier, bol_number: bolNumber, notes };

  if (dir === 'outbound') {
    const customer = document.getElementById('f-customer').value.trim();
    if (!customer) { showError('Customer is required for outbound shipments.'); return; }
    payload.customer       = customer;
    payload.destination    = document.getElementById('f-destination').value.trim();
    payload.load_count     = parseInt(document.getElementById('f-load-count').value || 1, 10);
    payload.total_bdft     = parseFloat(document.getElementById('f-total-bdft').value) || 0;
    payload.job_id         = document.getElementById('f-job-id').value || null;
    payload.origin         = 'XPanda Foam';
    payload.trailer_number = document.getElementById('f-trailer-number').value.trim();
  } else {
    const supplier = document.getElementById('f-supplier').value.trim();
    if (!supplier) { showError('Supplier is required for inbound deliveries.'); return; }
    payload.customer   = supplier;
    payload.origin     = document.getElementById('f-origin').value.trim();
    payload.weight_lbs = parseFloat(document.getElementById('f-weight-lbs').value) || 0;
    payload.destination = 'XPanda Foam';

    // Resolve bead type name from selected id
    const beadTypeId = document.getElementById('f-bead-type-id').value;
    if (beadTypeId) {
      const bt = allBeadTypes.find(t => t.id === beadTypeId);
      payload.bead_type    = bt ? bt.name : '';
      payload.bead_type_id = beadTypeId;
    }

    const siloId  = document.getElementById('f-silo-id').value;
    const autoLog = document.getElementById('f-auto-log')?.checked;
    if (siloId && autoLog && !editingId) {
      payload.silo_id = siloId;
    }
  }

  if (editingId) payload.id = editingId;

  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const res  = await fetch('/api/shipments', {
      method: editingId ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const body = await res.json();

    if (!body.ok) {
      showError(body.error || 'Error saving shipment.');
      return;
    }

    // Check if delivered + has linked job → prompt to update job status
    const saved = body.data;
    if (saved.status === 'delivered' && saved.job_id && !editingId) {
      promptUpdateJob(saved.job_id, saved.customer);
    }

    closeModal();
    await Promise.all([loadOutbound(), loadInbound()]);
    updateStats();
  } catch {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? 'Save Changes' : 'Save';
  }
}

async function confirmDelete() {
  if (!editingId) return;
  if (!confirm('Delete this shipment? This cannot be undone.')) return;

  const res  = await fetch('/api/shipments', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: editingId }),
  });
  const body = await res.json();
  if (!body.ok) { alert(body.error || 'Error deleting shipment.'); return; }

  closeModal();
  await Promise.all([loadOutbound(), loadInbound()]);
  updateStats();
}

// ── Ship from Job Picker ───────────────────────────────────────────────────
async function openShipJobPicker() {
  document.getElementById('job-picker-search').value = '';
  document.getElementById('job-picker-list').innerHTML =
    '<div style="color:#94a3b8;font-size:13px;padding:12px;">Loading jobs…</div>';
  document.getElementById('job-picker-modal').classList.remove('hidden');

  try {
    const res  = await fetch('/api/jobs?status=not_started,in_production,done');
    const body = await res.json();
    if (body.ok) {
      jobPickerFull = body.jobs;
      allOpenJobs   = body.jobs;
      const opts = allOpenJobs.map(j => {
        const label = `${esc(j.customer)}${j.invoice_number ? ' · ' + esc(j.invoice_number) : ''}`;
        return `<option value="${j.id}">${label}</option>`;
      }).join('');
      document.getElementById('f-job-id').innerHTML =
        `<option value="">— no linked job —</option>${opts}`;
    } else {
      jobPickerFull = [];
    }
  } catch {
    jobPickerFull = [];
  }

  filterJobPickerList();
}

function closeJobPicker() {
  document.getElementById('job-picker-modal').classList.add('hidden');
}

function filterJobPickerList() {
  const q    = document.getElementById('job-picker-search').value.toLowerCase();
  const list = document.getElementById('job-picker-list');
  const jobs = jobPickerFull.filter(j =>
    (j.customer || '').toLowerCase().includes(q) ||
    (j.invoice_number || '').toLowerCase().includes(q)
  );

  if (!jobs.length) {
    list.innerHTML = `<div style="color:#94a3b8;font-size:13px;padding:12px;">No open jobs found.</div>`;
    return;
  }

  const statusLabels = { not_started: 'Not Started', in_production: 'In Production', done: 'Done', shipped: 'Shipped' };
  list.innerHTML = jobs.map(j => {
    const label      = `${esc(j.customer)}${j.invoice_number ? ' · ' + esc(j.invoice_number) : ''}`;
    const statusText = statusLabels[j.status] || esc(j.status || '');
    const sub        = [j.ship_date ? formatDate(j.ship_date) : null, statusText].filter(Boolean).join(' · ');
    return `
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 13px;cursor:pointer;"
           onclick="selectJobForShipment('${j.id}')">
        <div style="font-weight:700;font-size:14px;">${label}</div>
        <div style="font-size:12px;color:#64748b;margin-top:2px;">${sub}</div>
      </div>`;
  }).join('');
}

function selectJobForShipment(jobId) {
  const job = allOpenJobs.find(j => j.id === jobId);
  if (!job) return;
  closeJobPicker();
  openModal('outbound');
  prefillFromJob(job);
}

function prefillFromJob(job) {
  document.getElementById('f-customer').value    = job.customer || '';
  document.getElementById('f-destination').value = job.location || '';
  document.getElementById('f-method').value      = job.method   || '';
  document.getElementById('f-carrier').value     = job.carrier  || '';
  document.getElementById('f-ship-date').value   = job.ship_date || '';
  document.getElementById('f-load-count').value  = job.load_count || 1;
  document.getElementById('f-total-bdft').value  = job.total_bdft || '';
  document.getElementById('f-bol-number').value  = job.bol_info  || '';
  document.getElementById('f-job-id').value      = job.id;
}

function applyPrefill(prefill) {
  for (const [key, val] of Object.entries(prefill)) {
    const el = document.getElementById(`f-${key}`);
    if (el && val !== undefined) el.value = val;
  }
}

function changeShipCalMonth(direction, delta) {
  if (direction === 'outbound') {
    outboundCalMonth = new Date(outboundCalMonth.getFullYear(), outboundCalMonth.getMonth() + delta, 1);
    renderShipmentCalendar('outbound');
  } else {
    inboundCalMonth = new Date(inboundCalMonth.getFullYear(), inboundCalMonth.getMonth() + delta, 1);
    renderShipmentCalendar('inbound');
  }
}

function goToShipCalToday(direction) {
  if (direction === 'outbound') {
    outboundCalMonth = new Date();
    renderShipmentCalendar('outbound');
  } else {
    inboundCalMonth = new Date();
    renderShipmentCalendar('inbound');
  }
}

function renderShipmentCalendar(direction) {
  const isOutbound = direction === 'outbound';
  const data       = isOutbound ? outboundData : inboundData;
  const calMonth   = isOutbound ? outboundCalMonth : inboundCalMonth;
  const gridEl     = document.getElementById(isOutbound ? 'outbound-cal-grid' : 'inbound-cal-grid');
  const labelEl    = document.getElementById(isOutbound ? 'outbound-cal-label' : 'inbound-cal-label');
  if (!gridEl || !labelEl) return;

  const year  = calMonth.getFullYear();
  const month = calMonth.getMonth();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  labelEl.textContent = `${monthNames[month]} ${year}`;

  const firstDay  = new Date(year, month, 1);
  const lastDay   = new Date(year, month + 1, 0);
  const startDow  = firstDay.getDay();
  const totalDays = lastDay.getDate();

  const shipByDate = {};
  data.forEach(s => {
    if (!s.ship_date) return;
    if (!shipByDate[s.ship_date]) shipByDate[s.ship_date] = [];
    shipByDate[s.ship_date].push(s);
  });

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let html = '<div class="cal-header-row">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => { html += `<div class="cal-header-cell">${d}</div>`; });
  html += '</div><div class="cal-body">';

  const totalCells = Math.ceil((startDow + totalDays) / 7) * 7;
  let dayNum = 1;

  for (let i = 0; i < totalCells; i++) {
    if (i % 7 === 0) html += '<div class="cal-row">';
    if (i < startDow || dayNum > totalDays) {
      html += '<div class="cal-cell cal-cell-empty"></div>';
    } else {
      const dateStr      = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      const isToday      = dateStr === todayStr;
      const isWeekend    = (i % 7 === 0 || i % 7 === 6);
      const dayShipments = shipByDate[dateStr] || [];
      const maxVisible   = 4;

      html += `<div class="cal-cell${isToday ? ' cal-today' : ''}${isWeekend ? ' cal-weekend' : ''}">`;
      html += `<div class="cal-day-num${isToday ? ' cal-day-today' : ''}">${dayNum}</div>`;

      dayShipments.slice(0, maxVisible).forEach(s => {
        const sc = SHIPMENT_STATUS_COLORS[s.status] || SHIPMENT_STATUS_COLORS.awaiting;
        const displayName = esc(s.customer || 'Unknown');
        const titleText   = `${displayName} — ${(s.status || '').replace(/_/g, ' ')}`;
        html += `<div class="cal-pill" style="background:${sc.bg};color:${sc.text};border-left:3px solid ${sc.border};" onclick="openEdit('${s.id}')" title="${esc(titleText)}">${displayName}</div>`;
      });

      if (dayShipments.length > maxVisible) {
        html += `<div class="cal-more" onclick="showCalDay('${direction}','${dateStr}')">+${dayShipments.length - maxVisible} more</div>`;
      }

      html += '</div>';
      dayNum++;
    }
    if (i % 7 === 6) html += '</div>';
  }
  html += '</div>';
  gridEl.innerHTML = html;
}

function showCalDay(direction, dateStr) {
  if (direction === 'outbound') {
    const d = new Date(dateStr + 'T12:00:00');
    const dayOfWeek = d.getDay();
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((dayOfWeek + 6) % 7));
    const weekInput = document.getElementById('outbound-week-input');
    if (weekInput) {
      const year  = monday.getFullYear();
      const jan1  = new Date(year, 0, 1);
      const days  = Math.floor((monday - jan1) / 86400000);
      const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
      weekInput.value = `${year}-W${String(weekNum).padStart(2, '0')}`;
    }
    setOutboundView('list');
    loadOutbound();
  } else {
    setInboundView('list');
  }
}

function statusBadge(status) {
  const labels = {
    awaiting:    'Awaiting',
    not_started: 'Not Started',
    loading:     'Loading',
    loaded:      'Loaded',
    in_transit:  'In Transit',
    delivered:   'Delivered',
    cancelled:   'Cancelled',
    scheduled:   'Scheduled',
  };
  return `<span class="logistics-status-badge status-${status}">${labels[status] || status}</span>`;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  const dt = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtNum(n) {
  return (parseFloat(n) || 0).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getUser() {
  return new Promise(resolve => {
    if (window.__xpandaUser !== undefined) return resolve(window.__xpandaUser);
    let attempts = 0;
    const check = setInterval(() => {
      if (window.__xpandaUser !== undefined || ++attempts > 20) {
        clearInterval(check);
        resolve(window.__xpandaUser || null);
      }
    }, 50);
  });
}

async function gateLogisticsNav() {
  try {
    const user = await getUser();
    if (!user || user.isAdministrator) return;

    const perms = user.permissions || {};

    if (!perms['logistics.bol']?.view) {
      document.querySelectorAll('a[href*="bol-generator"]').forEach(el => el.style.display = 'none');
    }
    if (!perms['logistics.load-builder']?.view) {
      document.querySelectorAll('a[href*="load-builder"]').forEach(el => el.style.display = 'none');
    }
  } catch {}
}
gateLogisticsNav();
</script>

</body>
</html>
