<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Management — xPanda Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #111827;
    --muted: #4b5563;
    --border: #d1d5db;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.07);
    --primary: #334155;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .topbar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
  }

  .topbar-logo {
    font-size: 18px;
    font-weight: 700;
    color: #0f172a;
    text-decoration: none;
  }

  .topbar-badge {
    background: #f1f5f9;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .topbar-title { flex: 1; }
  .topbar-title h1 { font-size: 20px; font-weight: 700; color: #0f172a; }
  .topbar-title p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .topbar-nav {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 13px;
  }

  .topbar-nav a { color: var(--primary); text-decoration: none; font-weight: 600; }
  .topbar-nav a:hover { text-decoration: underline; }

  .header-user-bar {
    position: absolute;
    top: 10px;
    right: 16px;
    font-size: 12px;
    color: #5b6472;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-user-bar a { color: #dc2626; text-decoration: none; font-weight: 600; }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 18px 48px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .btn {
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    font-family: inherit;
  }

  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #1e293b; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-ghost { background: transparent; color: var(--primary); border: 1px solid var(--border); }
  .btn-ghost:hover { background: #f1f5f9; }

  .table-wrap {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: #f8fafc;
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  td {
    padding: 11px 14px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .badge {
    display: inline-block;
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .badge-admin { background: #1e293b; color: #fff; }
  .badge-staff { background: #dbeafe; color: #1e40af; }
  .badge-readonly { background: #f1f5f9; color: #64748b; }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .dot-active { background: #16a34a; }
  .dot-disabled { background: #dc2626; }

  .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }

  .btn-sm {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 6px;
  }

  .pw-cell {
    font-family: monospace;
    font-size: 12px;
    color: var(--muted);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }

  .footer-back {
    text-align: center;
    margin-top: 28px;
    font-size: 13px;
    color: var(--muted);
  }

  .footer-back a { color: var(--primary); text-decoration: none; font-weight: 600; }
  .footer-back a:hover { text-decoration: underline; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }

  .modal-overlay[hidden] { display: none; }

  .modal {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 420px;
  }

  .modal h2 { font-size: 18px; font-weight: 700; color: #0f172a; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }

  .form-group input,
  .form-group select {
    display: block;
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
    outline: none;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: #94a3b8; }

  .form-group input[readonly] { background: #f8fafc; color: var(--muted); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .modal-error {
    color: #dc2626;
    font-size: 13px;
    margin-top: 8px;
    min-height: 18px;
  }

  @media (max-width: 700px) {
    .toolbar { flex-direction: column; align-items: stretch; gap: 10px; }
    .actions-cell { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="/">xPanda</a>
  <span class="topbar-badge">xPanda Foam &bull; Admin</span>
  <div class="topbar-title">
    <h1>User Management</h1>
    <p>Manage platform users and roles</p>
  </div>
  <div class="topbar-nav">
    <a href="/admin/parts.html">Parts</a>
    <a href="/admin/activity-log.html">Activity Log</a>
    <a href="/admin/users.html">Users</a>
    <a href="/admin/roles.html">Roles</a>
    <a href="/">← Back to Platform</a>
  </div>
  <div class="header-user-bar">
    <span id="hdr-user-name"></span>
    <a href="#" id="hdr-logout">Sign Out</a>
  </div>
</div>

<div class="wrap">
  <div class="toolbar">
    <div style="font-size:13px;color:var(--muted);" id="user-count"></div>
    <button class="btn btn-primary" onclick="openModal(null)">+ Add User</button>
  </div>

  <div class="table-wrap">
    <table id="users-table">
      <thead>
        <tr>
          <th>Username</th>
          <th>Display Name</th>
          <th>Role</th>
          <th>Password</th>
          <th>Status</th>
          <th>First Login</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr><td colspan="7" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer-back">
    <a href="/">&larr; Back to Operations Platform</a>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" hidden>
  <div class="modal">
    <h2 id="modal-title">Add User</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="m-username" placeholder="e.g. crosscutter" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="m-display-name" placeholder="e.g. Cross Cutter" autocomplete="off" />
    </div>
    <div class="form-group" id="m-password-group">
      <label>Password</label>
      <input type="text" id="m-password" placeholder="Leave blank to use username as password" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="f-role-id">
        <option value="role-staff">Staff</option>
      </select>
    </div>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<script>
// 401 interceptor
const _origFetch = window.fetch;
window.fetch = async function(...args) {
  const res = await _origFetch.apply(this, args);
  if (res.status === 401 && !window.location.pathname.startsWith('/login')) {
    window.location.href = '/login.html';
    return res;
  }
  return res;
};

let users = [];
let editingId = null;

async function loadRolesDropdown() {
  try {
    const res = await fetch('/api/roles');
    const data = await res.json();
    const roles = data.roles || [];
    const sel = document.getElementById('f-role-id');
    sel.innerHTML = roles.map(r => `<option value="${esc(r.id)}">${esc(r.name)}</option>`).join('');
  } catch {}
}

async function loadUsers() {
  try {
    const res = await fetch('/api/users');
    const data = await res.json();
    if (!data.ok) { showTableError('Failed to load users.'); return; }
    users = data.users || [];
    renderTable();
    document.getElementById('user-count').textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`;
  } catch {
    showTableError('Network error.');
  }
}

function showTableError(msg) {
  document.getElementById('users-tbody').innerHTML = `<tr><td colspan="7" class="empty-state">${esc(msg)}</td></tr>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function roleLabel(u) {
  const name = u.role_name || u.role || 'Staff';
  let cls = 'badge-staff';
  if (u.role_id === 'role-administrator' || u.role === 'admin') cls = 'badge-admin';
  else if (u.role_id === 'role-readonly' || u.role === 'readonly') cls = 'badge-readonly';
  return `<span class="badge ${cls}">${esc(name)}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('users-tbody');
  if (users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No users found.</td></tr>';
    return;
  }

  tbody.innerHTML = users.map((u, i) => `
    <tr>
      <td><strong>${esc(u.username)}</strong></td>
      <td>${esc(u.display_name)}</td>
      <td>${roleLabel(u)}</td>
      <td class="pw-cell" title="${esc(u.password)}">${esc(u.password)}</td>
      <td>
        <span class="status-dot ${u.is_active ? 'dot-active' : 'dot-disabled'}"></span>
        ${u.is_active ? 'Active' : 'Disabled'}
      </td>
      <td>${u.first_login ? 'Yes' : 'No'}</td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-ghost btn-sm" onclick="openModal(${i})">Edit</button>
          <button class="btn btn-ghost btn-sm" onclick="resetPassword('${esc(u.id)}', '${esc(u.display_name)}')">Reset PW</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleActive('${esc(u.id)}', ${u.is_active})">${u.is_active ? 'Disable' : 'Enable'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${esc(u.id)}', '${esc(u.display_name)}')">Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openModal(idx) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add User';
  document.getElementById('m-username').value = '';
  document.getElementById('m-username').readOnly = false;
  document.getElementById('m-display-name').value = '';
  document.getElementById('m-password').value = '';
  document.getElementById('f-role-id').value = 'role-staff';
  document.getElementById('modal-error').textContent = '';
  document.getElementById('m-password-group').style.display = '';

  if (idx !== null && idx !== undefined) {
    const u = users[idx];
    editingId = u.id;
    document.getElementById('modal-title').textContent = 'Edit User';
    document.getElementById('m-username').value = u.username;
    document.getElementById('m-username').readOnly = true;
    document.getElementById('m-display-name').value = u.display_name;
    document.getElementById('f-role-id').value = u.role_id || 'role-staff';
    document.getElementById('m-password').value = u.password || '';
  }

  document.getElementById('modal').hidden = false;
}

function closeModal() {
  document.getElementById('modal').hidden = true;
}

async function saveUser() {
  const username = document.getElementById('m-username').value.trim().toLowerCase();
  const displayName = document.getElementById('m-display-name').value.trim();
  const password = document.getElementById('m-password').value;
  const role_id = document.getElementById('f-role-id').value;
  const errEl = document.getElementById('modal-error');
  errEl.textContent = '';

  if (!editingId && !username) { errEl.textContent = 'Username is required.'; return; }
  if (!displayName) { errEl.textContent = 'Display name is required.'; return; }

  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;

  try {
    let res;
    if (editingId) {
      const body = { display_name: displayName, role_id };
      if (password) body.password = password;
      res = await fetch(`/api/users/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } else {
      const body = { username, display_name: displayName, role_id };
      if (password) body.password = password;
      res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }

    const data = await res.json();
    if (data.ok) {
      closeModal();
      loadUsers();
    } else {
      errEl.textContent = data.error || 'Save failed.';
    }
  } catch {
    errEl.textContent = 'Network error.';
  }

  btn.disabled = false;
}

async function toggleActive(id, currentState) {
  if (!confirm(`${currentState ? 'Disable' : 'Enable'} this user?`)) return;
  try {
    const res = await fetch(`/api/users/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_active: !currentState }),
    });
    const data = await res.json();
    if (data.ok) loadUsers();
    else alert(data.error || 'Failed.');
  } catch { alert('Network error.'); }
}

async function resetPassword(id, displayName) {
  if (!confirm(`Reset password for ${displayName}? They will be prompted to set a new password on next login.`)) return;
  try {
    const res = await fetch(`/api/users/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ first_login: 1 }),
    });
    const data = await res.json();
    if (data.ok) { alert('Password reset. User must set a new password on next login.'); loadUsers(); }
    else alert(data.error || 'Failed.');
  } catch { alert('Network error.'); }
}

async function deleteUser(id, displayName) {
  if (!confirm(`Delete user ${displayName}? This will also end their active sessions.`)) return;
  try {
    const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) loadUsers();
    else alert(data.error || 'Failed.');
  } catch { alert('Network error.'); }
}

// Click-outside-close disabled — use Cancel button to close

// Header user display + logout
fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (d.ok && d.user) {
    const el = document.getElementById('hdr-user-name');
    if (el) el.textContent = d.user.displayName || d.user.username;
  }
}).catch(() => {});

document.getElementById('hdr-logout').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
});

loadRolesDropdown();
loadUsers();
</script>
</body>
</html>
