<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Role Management — xPanda Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #111827;
    --muted: #4b5563;
    --border: #d1d5db;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.07);
    --primary: #334155;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .topbar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
  }

  .topbar-logo { font-size: 18px; font-weight: 700; color: #0f172a; text-decoration: none; }

  .topbar-badge {
    background: #f1f5f9;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .topbar-title { flex: 1; }
  .topbar-title h1 { font-size: 20px; font-weight: 700; color: #0f172a; }
  .topbar-title p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .topbar-nav { display: flex; gap: 12px; align-items: center; font-size: 13px; }
  .topbar-nav a { color: var(--primary); text-decoration: none; font-weight: 600; }
  .topbar-nav a:hover { text-decoration: underline; }

  .header-user-bar {
    position: absolute; top: 10px; right: 16px;
    font-size: 12px; color: #5b6472;
    display: flex; align-items: center; gap: 8px;
  }
  .header-user-bar a { color: #dc2626; text-decoration: none; font-weight: 600; }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 18px 48px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
  }

  @media (max-width: 800px) {
    .wrap { grid-template-columns: 1fr; }
  }

  /* Role list */
  .roles-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .roles-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .roles-panel-header h2 { font-size: 15px; font-weight: 700; color: #0f172a; }

  .btn {
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #1e293b; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-ghost { background: transparent; color: var(--primary); border: 1px solid var(--border); }
  .btn-ghost:hover { background: #f1f5f9; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

  .role-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .role-card:hover { border-color: #94a3b8; }
  .role-card.selected { border-color: var(--primary); }

  .role-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .role-card-name { font-size: 14px; font-weight: 700; color: #0f172a; }
  .role-card-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .badge-system {
    background: #f1f5f9;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #64748b;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Permission editor */
  .editor-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .editor-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .editor-card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .editor-fields { display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .editor-field { display: flex; align-items: center; gap: 10px; }
  .editor-field label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; min-width: 90px; }
  .editor-field input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    outline: none;
  }
  .editor-field input:focus { border-color: #94a3b8; }
  .editor-field input[readonly] { background: #f8fafc; color: var(--muted); }

  .save-status {
    font-size: 12px;
    color: #16a34a;
    white-space: nowrap;
    align-self: flex-end;
    min-height: 20px;
  }

  .admin-notice {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #64748b;
    margin: 0 20px 16px;
  }

  /* Permission grid */
  .perm-grid {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .perm-header-row {
    display: grid;
    grid-template-columns: 1fr 80px 80px;
    padding: 10px 16px;
    font-weight: 600;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 2px solid var(--border);
  }

  .perm-group-header {
    background: #f1f5f9;
    padding: 8px 16px;
    font-weight: 700;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  .perm-row {
    display: grid;
    grid-template-columns: 1fr 80px 80px;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid #f1f5f9;
  }

  .perm-row:last-child { border-bottom: none; }

  .perm-label {
    font-size: 14px;
    padding-left: 16px;
  }

  .perm-toggle { text-align: center; }

  .perm-toggle input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #334155;
  }

  .perm-toggle input[type="checkbox"]:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .empty-editor {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    color: var(--muted);
    font-size: 14px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
  }
  .modal-overlay[hidden] { display: none; }
  .modal {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    padding: 28px 28px 24px;
    width: 100%; max-width: 400px;
  }
  .modal h2 { font-size: 18px; font-weight: 700; color: #0f172a; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px;
  }
  .form-group input {
    display: block; width: 100%; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit; color: var(--text);
    outline: none;
  }
  .form-group input:focus { border-color: #94a3b8; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .modal-error { color: #dc2626; font-size: 13px; margin-top: 8px; min-height: 18px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="/">xPanda</a>
  <span class="topbar-badge">xPanda Foam &bull; Admin</span>
  <div class="topbar-title">
    <h1>Role Management</h1>
    <p>Configure roles and module permissions</p>
  </div>
  <div class="topbar-nav">
    <a href="/admin/parts.html">Parts</a>
    <a href="/admin/activity-log.html">Activity Log</a>
    <a href="/admin/users.html">Users</a>
    <a href="/admin/roles.html">Roles</a>
    <a href="/">← Back to Platform</a>
  </div>
  <div class="header-user-bar">
    <span id="hdr-notif-bell" onclick="toggleNotifDropdown()" style="position:relative;cursor:pointer;font-size:18px;line-height:1;">🔔<span id="hdr-notif-badge" style="display:none;position:absolute;top:-4px;right:-6px;background:#dc2626;color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:16px;height:16px;text-align:center;line-height:16px;"></span></span>
    <div id="hdr-notif-dropdown" style="display:none;position:absolute;top:36px;right:0;width:340px;max-height:420px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.12);overflow:hidden;z-index:9999;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #e5e7eb;">
        <span style="font-weight:700;font-size:14px;">Notifications</span>
        <button onclick="markAllRead()" style="background:none;border:none;color:#3b82f6;font-size:12px;font-weight:600;cursor:pointer;">Mark all read</button>
      </div>
      <div id="hdr-notif-list" style="overflow-y:auto;max-height:360px;"></div>
    </div>
    <span id="hdr-user-name"></span>
    <a href="#" id="hdr-logout">Sign Out</a>
  </div>
</div>

<div class="wrap">
  <!-- Left: role list -->
  <div class="roles-panel">
    <div class="roles-panel-header">
      <h2>Roles</h2>
      <button class="btn btn-primary btn-sm" onclick="openAddRoleModal()">+ Add Role</button>
    </div>
    <div id="roles-list">
      <div style="color:var(--muted);font-size:14px;padding:12px 0;">Loading…</div>
    </div>
  </div>

  <!-- Right: permission editor -->
  <div class="editor-panel" id="editor-panel">
    <div class="empty-editor">Select a role to edit its permissions</div>
  </div>
</div>

<!-- Add Role Modal -->
<div class="modal-overlay" id="add-role-modal" hidden>
  <div class="modal">
    <h2>Add Role</h2>
    <div class="form-group">
      <label>Role Name <span style="color:#dc2626">*</span></label>
      <input type="text" id="new-role-name" placeholder="e.g. Logistics Manager" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="new-role-desc" placeholder="Optional description" autocomplete="off" />
    </div>
    <div class="modal-error" id="add-role-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddRoleModal()">Cancel</button>
      <button class="btn btn-primary" id="add-role-save-btn" onclick="saveNewRole()">Create Role</button>
    </div>
  </div>
</div>

<script>
const _origFetch = window.fetch;
window.fetch = async function(...args) {
  const res = await _origFetch.apply(this, args);
  if (res.status === 401 && !window.location.pathname.startsWith('/login')) {
    window.location.href = '/login.html';
    return res;
  }
  return res;
};

const NOTIFICATION_TYPE_LABELS = {
  'loading.assigned':   'Job assigned to loading',
  'loading.started':    'Trailer loading started',
  'loading.loaded':     'Trailer loaded',
  'loading.in_transit': 'Trailer in transit',
  'loading.delivered':  'Delivery confirmed',
};

const PERMISSION_LABELS = {
  'jobs':                      { group: 'Jobs',       label: 'Job Board' },
  'logistics.dashboard':       { group: 'Logistics',  label: 'Dashboard & Shipments' },
  'logistics.bol':             { group: 'Logistics',  label: 'BOL Generator' },
  'logistics.load-builder':    { group: 'Logistics',  label: 'Load Builder' },
  'logistics.loading':         { group: 'Logistics',  label: 'Loading Dashboard' },
  'logistics.loading.manage':  { group: 'Logistics',  label: 'Loading — Bay Management (manager)' },
  'production.calculators':    { group: 'Production', label: 'Calculators' },
  'production.inventory':      { group: 'Production', label: 'Inventory' },
  'qc':                        { group: 'QC',         label: 'Quality Control' },
  'safety':                    { group: 'Safety',     label: 'Safety Portal' },
  'reports':                   { group: 'Reports',    label: 'Reports & Analytics' },
  'admin':                     { group: 'Admin',      label: 'Administration' },
};

let allRoles = [];
let selectedRoleId = null;
let saveTimeout = null;

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadRoles() {
  try {
    const res = await fetch('/api/roles');
    const data = await res.json();
    allRoles = data.roles || [];
    renderRoleList();
    if (selectedRoleId) {
      const still = allRoles.find(r => r.id === selectedRoleId);
      if (still) selectRole(selectedRoleId);
    }
  } catch {
    document.getElementById('roles-list').innerHTML = '<div style="color:#dc2626;font-size:14px;">Failed to load roles.</div>';
  }
}

function renderRoleList() {
  const container = document.getElementById('roles-list');
  if (allRoles.length === 0) {
    container.innerHTML = '<div style="color:var(--muted);font-size:14px;">No roles found.</div>';
    return;
  }
  container.innerHTML = allRoles.map(r => `
    <div class="role-card${r.id === selectedRoleId ? ' selected' : ''}" onclick="selectRole('${esc(r.id)}')">
      <div class="role-card-top">
        <div>
          <div class="role-card-name">${esc(r.name)}</div>
          <div class="role-card-meta">${r.user_count || 0} user${(r.user_count || 0) !== 1 ? 's' : ''}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
          ${r.is_system ? '<span class="badge-system">System</span>' : `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteRole('${esc(r.id)}','${esc(r.name)}')">Delete</button>`}
        </div>
      </div>
      ${r.description ? `<div class="role-card-meta" style="margin-top:4px;">${esc(r.description)}</div>` : ''}
    </div>
  `).join('');
}

function selectRole(roleId) {
  selectedRoleId = roleId;
  renderRoleList();
  const role = allRoles.find(r => r.id === roleId);
  if (!role) return;
  renderPermissionEditor(role);
}

function renderPermissionEditor(role) {
  const panel = document.getElementById('editor-panel');
  const isAdmin = role.id === 'role-administrator';
  const isReadonly = role.id === 'role-administrator';
  let perms = {};
  try { perms = typeof role.permissions === 'string' ? JSON.parse(role.permissions) : (role.permissions || {}); } catch {}

  const groups = {};
  for (const [key, meta] of Object.entries(PERMISSION_LABELS)) {
    if (!groups[meta.group]) groups[meta.group] = [];
    groups[meta.group].push({ key, label: meta.label });
  }

  const gridRows = Object.entries(groups).map(([groupName, items]) => {
    const header = `<div class="perm-group-header">${esc(groupName)}</div>`;
    const rows = items.map(({ key, label }) => {
      const perm = perms[key] || { view: false, edit: false };
      const viewChecked = perm.view ? 'checked' : '';
      const editChecked = perm.edit ? 'checked' : '';
      const disabled = isAdmin ? 'disabled' : '';
      return `
        <div class="perm-row">
          <div class="perm-label">${esc(label)}</div>
          <div class="perm-toggle">
            <input type="checkbox" data-key="${esc(key)}" data-action="view" ${viewChecked} ${disabled} onchange="onPermissionToggle('${esc(key)}','view',this.checked)">
          </div>
          <div class="perm-toggle">
            <input type="checkbox" data-key="${esc(key)}" data-action="edit" ${editChecked} ${disabled} onchange="onPermissionToggle('${esc(key)}','edit',this.checked)">
          </div>
        </div>`;
    }).join('');
    return header + rows;
  }).join('');

  let notifTypes = [];
  try { notifTypes = JSON.parse(role.notification_types || '[]'); } catch {}

  const notifSection = `
    <div class="perm-grid" style="margin-top:16px;">
      <h4 style="margin:0 0 6px;font-size:14px;font-weight:700;color:#374151;">Notification Subscriptions</h4>
      <p style="margin:0 0 10px;font-size:12px;color:#6b7280;">Users with this role will receive these notifications</p>
      ${Object.entries(NOTIFICATION_TYPE_LABELS).map(([type, label]) => `
        <div class="perm-row">
          <div class="perm-label">${esc(label)}</div>
          <div class="perm-toggle" style="grid-column:span 2;text-align:center;">
            <input type="checkbox" data-notif-type="${esc(type)}" ${notifTypes.includes(type) ? 'checked' : ''}
              onchange="onNotifTypeToggle('${esc(type)}', this.checked)">
          </div>
        </div>`).join('')}
    </div>
  `;

  panel.innerHTML = `
    <div class="editor-card">
      <div class="editor-card-header">
        <div class="editor-fields">
          <div class="editor-field">
            <label>Name</label>
            <input type="text" id="ed-name" value="${esc(role.name)}" ${isAdmin ? 'readonly' : ''}
              onchange="onRoleFieldChange()" oninput="onRoleFieldChange()">
          </div>
          <div class="editor-field">
            <label>Description</label>
            <input type="text" id="ed-desc" value="${esc(role.description || '')}"
              onchange="onRoleFieldChange()" oninput="onRoleFieldChange()">
          </div>
        </div>
        <div class="save-status" id="save-status"></div>
      </div>
      ${isAdmin ? '<div class="admin-notice">Administrator has unrestricted access. Permission toggles are disabled.</div>' : ''}
    </div>
    <div class="perm-grid">
      <div class="perm-header-row">
        <div>Permission</div>
        <div style="text-align:center">View</div>
        <div style="text-align:center">Edit</div>
      </div>
      ${gridRows}
    </div>
    ${notifSection}
  `;
}

function onRoleFieldChange() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveRolePermissions(), 600);
}

function onNotifTypeToggle(type, checked) {
  const role = allRoles.find(r => r.id === selectedRoleId);
  if (!role) return;
  let notifTypes = [];
  try { notifTypes = JSON.parse(role.notification_types || '[]'); } catch {}
  if (checked) { if (!notifTypes.includes(type)) notifTypes.push(type); }
  else notifTypes = notifTypes.filter(t => t !== type);
  role.notification_types = JSON.stringify(notifTypes);
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveRolePermissions(), 500);
}

function onPermissionToggle(key, action, checked) {
  const role = allRoles.find(r => r.id === selectedRoleId);
  if (!role) return;
  let perms = {};
  try { perms = typeof role.permissions === 'string' ? JSON.parse(role.permissions) : (role.permissions || {}); } catch {}
  if (!perms[key]) perms[key] = { view: false, edit: false };

  if (action === 'view' && !checked) {
    perms[key].view = false;
    perms[key].edit = false;
    const editCb = document.querySelector(`input[data-key="${key}"][data-action="edit"]`);
    if (editCb) { editCb.checked = false; editCb.disabled = true; }
  } else if (action === 'view' && checked) {
    perms[key].view = true;
    const editCb = document.querySelector(`input[data-key="${key}"][data-action="edit"]`);
    if (editCb) editCb.disabled = false;
  } else {
    perms[key][action] = checked;
  }

  role.permissions = perms;

  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveRolePermissions(), 500);
}

async function saveRolePermissions() {
  const role = allRoles.find(r => r.id === selectedRoleId);
  if (!role) return;

  const statusEl = document.getElementById('save-status');
  if (statusEl) statusEl.textContent = 'Saving…';

  const nameInput = document.getElementById('ed-name');
  const descInput = document.getElementById('ed-desc');

  const payload = {
    id: role.id,
    permissions: typeof role.permissions === 'string' ? JSON.parse(role.permissions) : (role.permissions || {}),
    notification_types: role.notification_types || '[]',
  };
  if (nameInput && !nameInput.readOnly) payload.name = nameInput.value.trim();
  if (descInput) payload.description = descInput.value.trim();

  try {
    const res = await fetch('/api/roles', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.ok) {
      const idx = allRoles.findIndex(r => r.id === selectedRoleId);
      if (idx !== -1) {
        allRoles[idx] = { ...allRoles[idx], ...data.role };
        try { allRoles[idx].permissions = typeof data.role.permissions === 'string' ? JSON.parse(data.role.permissions) : data.role.permissions; } catch {}
      }
      if (statusEl) { statusEl.textContent = 'Saved ✓'; setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2000); }
      renderRoleList();
    } else {
      if (statusEl) statusEl.textContent = 'Error: ' + (data.error || 'Save failed');
    }
  } catch {
    if (statusEl) statusEl.textContent = 'Network error';
  }
}

function openAddRoleModal() {
  document.getElementById('new-role-name').value = '';
  document.getElementById('new-role-desc').value = '';
  document.getElementById('add-role-error').textContent = '';
  document.getElementById('add-role-modal').hidden = false;
  document.getElementById('new-role-name').focus();
}

function closeAddRoleModal() {
  document.getElementById('add-role-modal').hidden = true;
}

async function saveNewRole() {
  const name = document.getElementById('new-role-name').value.trim();
  const description = document.getElementById('new-role-desc').value.trim();
  const errEl = document.getElementById('add-role-error');
  errEl.textContent = '';

  if (!name) { errEl.textContent = 'Role name is required.'; return; }

  const btn = document.getElementById('add-role-save-btn');
  btn.disabled = true;

  const defaultPerms = {};
  for (const key of Object.keys(PERMISSION_LABELS)) {
    defaultPerms[key] = { view: false, edit: false };
  }

  try {
    const res = await fetch('/api/roles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description, permissions: defaultPerms }),
    });
    const data = await res.json();
    if (data.ok) {
      closeAddRoleModal();
      await loadRoles();
      if (data.role) selectRole(data.role.id);
    } else {
      errEl.textContent = data.error || 'Failed to create role.';
    }
  } catch {
    errEl.textContent = 'Network error.';
  }

  btn.disabled = false;
}

async function deleteRole(id, name) {
  if (!confirm(`Delete role "${name}"? Users assigned to this role will need to be reassigned.`)) return;
  try {
    const res = await fetch('/api/roles', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    const data = await res.json();
    if (data.ok) {
      if (selectedRoleId === id) {
        selectedRoleId = null;
        document.getElementById('editor-panel').innerHTML = '<div class="empty-editor">Select a role to edit its permissions</div>';
      }
      loadRoles();
    } else {
      alert(data.error || 'Delete failed.');
    }
  } catch {
    alert('Network error.');
  }
}

// Click-outside-close disabled — use Cancel button to close

document.getElementById('new-role-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveNewRole();
});

// Header
fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (d.ok && d.user) {
    const el = document.getElementById('hdr-user-name');
    if (el) el.textContent = d.user.displayName || d.user.username;
  }
}).catch(() => {});

document.getElementById('hdr-logout').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
});

loadRoles();

// Notification bell
let _notifOpen = false;
function toggleNotifDropdown() { _notifOpen = !_notifOpen; document.getElementById('hdr-notif-dropdown').style.display = _notifOpen ? '' : 'none'; if (_notifOpen) _loadNotifs(); }
document.addEventListener('click', (e) => { const b = document.getElementById('hdr-notif-bell'), d = document.getElementById('hdr-notif-dropdown'); if (b && d && !b.contains(e.target) && !d.contains(e.target)) { _notifOpen = false; d.style.display = 'none'; } });
async function markAllRead() { await fetch('/api/notifications/read', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ all: true }) }); _loadNotifs(); }
function handleNotifClick(id, type) { fetch('/api/notifications/read', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids: [id] }) }); if (type === 'loading_assignment') window.location.href = '/logistics/loading.html'; _notifOpen = false; document.getElementById('hdr-notif-dropdown').style.display = 'none'; }
async function _loadNotifs() {
  try {
    const d = await (await fetch('/api/notifications')).json(); if (!d.ok) return;
    const badge = document.getElementById('hdr-notif-badge'); if (badge) { badge.textContent = d.unreadCount > 99 ? '99+' : d.unreadCount; badge.style.display = d.unreadCount > 0 ? '' : 'none'; }
    const list = document.getElementById('hdr-notif-list'); if (!list) return;
    if (!d.notifications.length) { list.innerHTML = '<div style="padding:24px;text-align:center;color:#9ca3af;font-size:13px;">No notifications</div>'; return; }
    const e2 = s => { const el = document.createElement('div'); el.textContent = s||''; return el.innerHTML; };
    const ago = iso => { const m=Math.floor((Date.now()-new Date(iso))/60000); return m<1?'Just now':m<60?m+'m ago':Math.floor(m/60)<24?Math.floor(m/60)+'h ago':Math.floor(m/1440)+'d ago'; };
    list.innerHTML = d.notifications.map(n=>`<div style="padding:10px 14px;border-bottom:1px solid #f3f4f6;cursor:pointer;${n.is_read?'opacity:0.6;':'background:#eff6ff;'}" onclick="handleNotifClick('${n.id}','${n.entity_type}','${n.entity_id}')"><div style="font-size:13px;font-weight:${n.is_read?'400':'600'};color:#111827;">${e2(n.title)}</div><div style="font-size:12px;color:#6b7280;">${e2(n.message)}</div><div style="font-size:10px;color:#9ca3af;margin-top:4px;">${ago(n.created_at)}</div></div>`).join('');
  } catch {}
}
setInterval(() => { if (!_notifOpen) _loadNotifs(); }, 60000);
_loadNotifs();
</script>
