<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scrap Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/reports/reports-shared.css">
</head>

<body>

<script src="/reports/reports-header.js"></script>
<script>
document.getElementById('reports-page-title').textContent = 'Reports Dashboard';
</script>

<div class="reports-wrap">

<a class="reports-back-link" href="/reports/index.html">
← Back to Reports Dashboard
</a>

<div class="reports-section-intro">
<h2 class="reports-section-title">Scrap Analytics</h2>
<p class="reports-section-subtitle">
Monthly scrap totals and operational trend visibility.
</p>
</div>

<div class="card">

<div class="reports-field">
<label>Select Month</label>
<input type="month" id="monthPicker">
</div>

<div class="reports-actions">
<button class="btn primary" onclick="loadReport()">Load Report</button>
</div>

<p id="status" class="report-status"></p>

</div>

<div class="report-stats">

<div class="report-stat-card">
<div class="report-stat-label">Total Scrap</div>
<div class="report-stat-value" id="statScrap">--</div>
</div>

<div class="report-stat-card">
<div class="report-stat-label">Entries</div>
<div class="report-stat-value" id="statEntries">--</div>
</div>

</div>

<div class="card">
<h2>Scrap By Week</h2>

<div class="report-table-wrap">
<table class="report-table" id="weekTable">
<tr><th>Week</th><th>Board Ft</th></tr>
</table>
</div>

</div>

<div class="card">
<h2>Scrap By Reason</h2>

<div class="report-table-wrap">
<table class="report-table" id="reasonTable">
<tr><th>Reason</th><th>Board Ft</th></tr>
</table>
</div>

<div class="reports-platform-footer">
<a href="/">← Back to Operations Platform</a>
</div>

</div>

</div>

<script>

function num(v){
const n = Number(v);
return Number.isFinite(n) ? n : 0;
}

async function loadReport(){

const month = document.getElementById("monthPicker").value;
const status = document.getElementById("status");

if(!month){
status.textContent = "Select a month.";
status.classList.add("error");
return;
}

status.textContent = "Loading…";
status.classList.remove("error");

const res = await fetch(`/api/reports/scrap-summary?month=${month}`);
const data = await res.json();

if(!res.ok || !data.ok){
status.textContent = data.error || "Load failed";
status.classList.add("error");
return;
}

document.getElementById("statScrap").textContent =
num(data.total_scrap_board_ft).toFixed(2);

document.getElementById("statEntries").textContent =
num(data.entry_count);

const weekTable = document.getElementById("weekTable");
weekTable.innerHTML = "<tr><th>Week</th><th>Board Ft</th></tr>";

data.by_week.forEach(w=>{
weekTable.innerHTML += `
<tr>
<td>${w.week_number}</td>
<td>${num(w.scrap_board_ft).toFixed(2)}</td>
</tr>`;
});

const reasonTable = document.getElementById("reasonTable");
reasonTable.innerHTML = "<tr><th>Reason</th><th>Board Ft</th></tr>";

data.by_reason.forEach(r=>{
reasonTable.innerHTML += `
<tr>
<td>${r.scrap_reason}</td>
<td>${num(r.scrap_board_ft).toFixed(2)}</td>
</tr>`;
});

status.textContent = `Loaded ${month}`;

}

</script>

</body>
</html>
