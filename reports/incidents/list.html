<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Incident Reports — List</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="/reports/reports-shared.css">
</head>

<body>

<script src="/reports/reports-header.js"></script>
<script>
document.getElementById('reports-page-title').textContent = 'Incident Reports — List';
</script>

<div class="reports-wrap">

<a href="/reports/incidents/" class="reports-back-link">← Back to Incident Reports</a>

<div class="reports-section-intro">
  <h2 class="reports-section-title">Incident Reports — List</h2>
  <p class="reports-section-subtitle">
    Filtered incident lookup by year, type, month, and risk level.
  </p>
</div>

<div class="card">
  <div class="reports-actions">
    <div class="reports-field" style="min-width: 160px; margin-bottom: 0;">
      <label for="yearPicker">Select Year</label>
      <select id="yearPicker"></select>
    </div>

    <div class="reports-field" style="min-width: 160px; margin-bottom: 0;">
      <label for="typePicker">Incident Type</label>
      <select id="typePicker">
        <option value="">All Types</option>
        <option value="Fusion">Fusion</option>
        <option value="Density">Density</option>
        <option value="Tolerances">Tolerances</option>
        <option value="Packaging">Packaging</option>
        <option value="Delivery">Delivery</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="reports-field" style="min-width: 160px; margin-bottom: 0;">
      <label for="monthPicker">Month</label>
      <select id="monthPicker">
        <option value="">All Months</option>
      </select>
    </div>

    <div class="reports-field" style="min-width: 180px; margin-bottom: 0;">
      <label for="riskPicker">Risk Level</label>
      <select id="riskPicker">
        <option value="">All Risk Levels</option>
        <option value="1 - Low Risk">1 - Low Risk</option>
        <option value="2 - Medium Risk">2 - Medium Risk</option>
        <option value="3 - High Risk">3 - High Risk</option>
        <option value="Unspecified">Unspecified</option>
      </select>
    </div>

    <button class="btn primary" type="button" id="loadBtn">Load Report</button>
  </div>

  <p id="status" class="report-status"></p>
</div>

<div class="report-stats">
  <div class="report-stat-card">
    <div class="report-stat-label">Matching Incidents</div>
    <div class="report-stat-value" id="statCount">--</div>
  </div>
</div>

<div class="card">
  <h2>Incident Results</h2>
  <div class="report-table-wrap">
    <table class="report-table" id="incidentTable">
      <tr>
        <th>Date (Month)</th>
        <th>Customer</th>
        <th>Incident Type</th>
        <th>Risk Level</th>
        <th>Summary</th>
      </tr>
    </table>
  </div>
</div>

<div class="reports-platform-footer">
  <a href="/">← Back to Operations Platform</a>
</div>

</div>

<script>
function getQueryParams() {
  return new URLSearchParams(window.location.search);
}

function buildYearOptions() {
  const yearPicker = document.getElementById("yearPicker");
  const currentYear = new Date().getFullYear();

  yearPicker.innerHTML = "";

  for (let year = currentYear; year >= 2025; year--) {
    const opt = document.createElement("option");
    opt.value = String(year);
    opt.textContent = String(year);
    yearPicker.appendChild(opt);
  }

  yearPicker.value = String(currentYear);
}

function ensureSelectValue(select, value) {
  if (!value) return;

  const hasOption = Array.from(select.options).some(
    (option) => option.value === value,
  );

  if (!hasOption) {
    const opt = document.createElement("option");
    opt.value = value;
    opt.textContent = value;
    select.appendChild(opt);
  }

  select.value = value;
}

function buildMonthOptions() {
  const monthPicker = document.getElementById("monthPicker");
  monthPicker.innerHTML = '<option value="">All Months</option>';

  for (let month = 1; month <= 12; month++) {
    const monthValue = String(month).padStart(2, "0");
    const opt = document.createElement("option");
    opt.value = monthValue;
    opt.textContent = monthValue;
    monthPicker.appendChild(opt);
  }
}

function resetTable() {
  const table = document.getElementById("incidentTable");
  table.innerHTML = `
    <tr>
      <th>Date (Month)</th>
      <th>Customer</th>
      <th>Incident Type</th>
      <th>Risk Level</th>
      <th>Summary</th>
    </tr>
  `;
}

function initializeFiltersFromUrl() {
  const params = getQueryParams();
  const year = (params.get("year") || "").trim();
  const type = (params.get("type") || "").trim();
  const month = (params.get("month") || "").trim();
  const risk = (params.get("risk") || "").trim();

  if (year) {
    ensureSelectValue(document.getElementById("yearPicker"), year);
  }

  if (type) {
    ensureSelectValue(document.getElementById("typePicker"), type);
  }

  if (risk) {
    ensureSelectValue(document.getElementById("riskPicker"), risk);
  }

  if (month) {
    const monthPart = month.split("-")[1] || "";
    if (monthPart) {
      ensureSelectValue(document.getElementById("monthPicker"), monthPart);
    }

    if (!year && month.includes("-")) {
      ensureSelectValue(
        document.getElementById("yearPicker"),
        month.split("-")[0] || "",
      );
    }
  }
}

function buildIncidentListParams() {
  const year = document.getElementById("yearPicker").value;
  const type = document.getElementById("typePicker").value;
  const monthPart = document.getElementById("monthPicker").value;
  const risk = document.getElementById("riskPicker").value;

  const params = new URLSearchParams();

  if (year) params.set("year", year);
  if (type) params.set("type", type);
  if (monthPart && year) params.set("month", `${year}-${monthPart}`);
  if (risk) params.set("risk", risk);

  return params;
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function renderTable(items) {
  const table = document.getElementById("incidentTable");
  resetTable();

  if (!items.length) {
    table.innerHTML += `
      <tr>
        <td colspan="5">No incidents found for the selected filters.</td>
      </tr>
    `;
    return;
  }

  items.forEach((item) => {
    const detailUrl = `/reports/incidents/detail.html?id=${encodeURIComponent(item.incident_id)}`;

    table.innerHTML += `
      <tr>
        <td><a href="${detailUrl}"><strong>${escapeHtml(item.month || "")}</strong></a></td>
        <td>${escapeHtml(item.customer || "")}</td>
        <td>${escapeHtml(item.incident_type || "")}</td>
        <td>${escapeHtml(item.risk_level || "")}</td>
        <td>${escapeHtml(item.summary || "")}</td>
      </tr>
    `;
  });
}

async function loadIncidentList() {
  const status = document.getElementById("status");
  const params = buildIncidentListParams();
  const year = params.get("year");

  if (!year) {
    status.textContent = "Select a year.";
    status.classList.add("error");
    return;
  }

  status.textContent = "Loading...";
  status.classList.remove("error");
  window.history.replaceState(
    null,
    "",
    `${window.location.pathname}?${params.toString()}`,
  );

  try {
    const res = await fetch(`/api/reports/incidents-list?${params.toString()}`);
    const data = await res.json();

    if (!res.ok || !data.ok) {
      document.getElementById("statCount").textContent = "--";
      resetTable();
      status.textContent = "Unable to load incidents.";
      status.classList.add("error");
      return;
    }

    document.getElementById("statCount").textContent = String(data.count || 0);
    renderTable(data.items || []);
    status.textContent = `Loaded ${data.count || 0} incidents for ${year}`;
  } catch (err) {
    document.getElementById("statCount").textContent = "--";
    resetTable();
    status.textContent = "Unable to load incidents.";
    status.classList.add("error");
  }
}

document.getElementById("loadBtn").addEventListener("click", loadIncidentList);

document.addEventListener("DOMContentLoaded", () => {
  buildYearOptions();
  buildMonthOptions();
  initializeFiltersFromUrl();
  resetTable();
  loadIncidentList();
});
</script>

</body>
</html>
