#:schema node_modules/wrangler/config-schema.json
# Cutting React pilot — Next.js via OpenNext on Cloudflare Workers.
# CRITICAL: same D1 database_id and same R2 bucket as the legacy Pages app.
# That shared binding is what makes the strangler migration have no "integration day":
# both apps read/write the identical tables and bucket.

name = "xpanda-cutting-v2"
# Custom worker entry (not the raw OpenNext output): re-exports the generated fetch handler
# and adds the schedule-board cron `scheduled()` export. See custom-worker.ts.
main = "custom-worker.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

# ── Schedule board cron (P261) ──────────────────────────────────────────────────────
# Unattended ingestion of the Google-Sheet schedule into schedule_rows (see schedule-ingest.ts).
# Temporarily 5 min (was 15) while verifying the P261 hotfix landed correctly — revert once
# a poll is confirmed writing rows, no reason to poll Google 3x more often long-term.
[triggers]
crons = ["*/5 * * * *"]

[vars]
SCHEDULE_SHEET_ID = "1X57jb_FWPlYTwi3fMJ9I_Yc_meS8AAe4"

# OpenNext static assets
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ── SAME D1 as legacy (do not create a new database) ───────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "DB"
database_id = "21d6f47b-0be9-4006-8014-d154e41f91e8"

# ── SAME R2 bucket as legacy ────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "BOL_PHOTOS"
bucket_name = "xpanda-bol-photos"

# ── Routing topology (the cookie has no Domain attr, so SAME HOST is mandatory) ─────
# Workers routes take priority over the legacy Pages app for /v2/*.
# Everything else stays on Pages. *.workers.dev will NOT receive xpanda_session.

[[routes]]
pattern = "www.xpandaops.com/v2/*"
zone_name = "xpandaops.com"
